<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Blind / Low-Vision Travel + Scene-Memory Aid · on-device, never cloud (Millisecond Era)</title>
<style>
  :root { --bg:#0b0f14; --card:#141a21; --line:#283541; --txt:#e9f0f6; --mut:#8da2b5;
          --acc:#36a3ff; --good:#3fdf8f; --warn:#f4c152; --hot:#ff6b6b; --cool:#62b8ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(1200px 600px at 70% -10%,#15212e,transparent),var(--bg); color:var(--txt);
         font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif; }
  header { padding:22px 26px 16px; border-bottom:1px solid var(--line); }
  .brand { color:var(--mut); font-size:12px; letter-spacing:.14em; text-transform:uppercase; }
  h1 { margin:6px 0 0; font-size:23px; font-weight:800; } h1 span{ color:var(--acc); }
  .sub { color:var(--mut); font-size:13.5px; margin-top:7px; max-width:1120px; }
  .sub b{ color:#d4e2ee; }
  .pitch { background:linear-gradient(180deg,#15202c,#121922); border:1px solid var(--line); border-left:3px solid var(--acc);
           border-radius:12px; padding:14px 16px; margin:16px 26px 0; max-width:1180px; font-size:13.5px; color:#d4e2ee; }
  .pitch b{ color:var(--acc); } .pitch .k{ color:var(--good); font-weight:700; }
  .wrap { display:flex; gap:18px; padding:18px 26px; flex-wrap:wrap; align-items:flex-start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:17px; }
  .left { width:470px; } .right{ flex:1; min-width:380px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  select,input[type=text]{ background:#0b0f14; border:1px solid var(--line); color:var(--txt);
        border-radius:9px; padding:9px 11px; font-size:13.5px; }
  button { background:var(--acc); color:#04121f; border:0; border-radius:9px; padding:9px 15px;
        font-size:14px; cursor:pointer; font-weight:700; }
  button.sec { background:#1b2530; border:1px solid var(--line); color:var(--txt); font-weight:600; }
  button.hot { background:var(--hot); color:#1c0606; } button.warn{ background:var(--warn); color:#1c1300; }
  button:disabled { opacity:.38; cursor:not-allowed; }
  canvas#scene { width:100%; background:#0d1217; border:1px solid var(--line); border-radius:10px; display:block; }
  .stat { color:var(--mut); font-size:12px; }
  .ok { color:var(--good); } .bad{ color:var(--hot); } .wn{ color:var(--warn); }
  .meter { height:12px; border-radius:6px; background:#1b2530; overflow:hidden; margin-top:5px; }
  .meter > i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--good),var(--warn),var(--hot)); transition:width .12s; }
  /* the speaking pill + earcon */
  .speak { background:#0b0f14; border:1px solid var(--cool); border-radius:11px; padding:11px 13px; margin-top:11px; min-height:46px; }
  .speak.live { border-color:var(--good); box-shadow:0 0 0 2px rgba(63,223,143,.18); }
  .speak .big { font-size:16px; font-weight:800; color:var(--cool); }
  .speak .big.say{ color:var(--good); }
  .speak .q{ color:var(--mut); font-size:12px; margin-top:3px; }
  /* counter strip */
  .counter { display:flex; gap:12px; margin-top:11px; flex-wrap:wrap; }
  .cbox { flex:1; min-width:120px; background:#0b0f14; border:1px solid var(--line); border-radius:10px; padding:9px 11px; }
  .cbox .n{ font-size:21px; font-weight:800; } .cbox .l{ color:var(--mut); font-size:11.5px; }
  .cbox.naive .n{ color:var(--hot); } .cbox.actual .n{ color:var(--good); } .cbox.save .n{ color:var(--acc); }
  /* scene memory ledger */
  .membox { background:#0b0f14; border:1px solid var(--line); border-radius:11px; padding:12px; margin-bottom:12px; }
  .membig { font-size:19px; font-weight:800; } .membig small{ font-size:12px; color:var(--mut); font-weight:500; }
  .qcard { border-top:1px dashed var(--line); padding-top:13px; margin-top:13px; }
  .qcard h3 { margin:0 0 8px; font-size:14px; } .qcard h3 b{ color:var(--acc); }
  .ans { background:#0b0f14; border:1px solid var(--line); border-radius:9px; padding:11px; margin-top:7px; min-height:24px; font-size:14px; }
  .ans em{ color:var(--mut); font-style:normal; }
  .bar { display:inline-block; height:8px; background:var(--acc); border-radius:4px; vertical-align:middle; margin:0 6px; }
  .moat { background:#0b0f14; border:1px solid var(--good); border-radius:11px; padding:12px 14px; margin-top:13px; font-size:13px; }
  .moat b{ color:var(--good); }
  .honest { background:#141a21; border:1px dashed var(--warn); border-radius:11px;
        padding:12px 15px; margin:0 26px 20px; font-size:12.5px; color:#cdd9e4; max-width:1200px; }
  .honest b{ color:var(--warn); } code{ background:#1b2530; padding:1px 6px; border-radius:5px; font-size:12px; }
  .log { max-height:170px; overflow:auto; margin-top:7px; font:12px/1.6 ui-monospace,Menlo,monospace; }
  .log .l{ padding:2px 0; border-top:1px solid var(--line); color:#cfe3f5; }
  .log .l .t{ color:var(--mut); } .log .l.say .w{ color:var(--good); } .log .l.skip .w{ color:var(--mut); }
  footer{ color:var(--mut); font-size:12px; padding:0 26px 26px; max-width:1180px; }
  footer b{ color:var(--txt); }
  /* language toggle */
  .langtoggle{ position:fixed; top:12px; right:14px; z-index:50; display:flex; gap:4px; }
  .langtoggle .lt{ background:#1b2530; border:1px solid var(--line); color:var(--mut); padding:5px 11px;
        border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; }
  .langtoggle .lt.active{ background:var(--acc); color:#04121f; }
</style>
</head>
<body>
<div class="langtoggle">
  <button id="lang-en" class="lt active" onclick="setLang('en')">EN</button>
  <button id="lang-zh" class="lt" onclick="setLang('zh')">中</button>
</div>
<header>
  <div class="brand" data-i18n="brand"></div>
  <h1><span data-i18n-html="h1"></span></h1>
  <div class="sub" data-i18n-html="sub"></div>
</header>

<div class="pitch" data-i18n-html="pitch"></div>

<div class="honest" data-i18n-html="honest"></div>

<div class="wrap">
  <!-- LEFT: first-person scene + frugal speak router -->
  <div class="card left">
    <div class="row">
      <button id="play" data-i18n="btnPlay"></button>
      <button id="pause" class="sec" disabled data-i18n="btnPause"></button>
      <button id="count" class="warn" disabled data-i18n="btnCount"></button>
      <button id="reset" class="sec" data-i18n="btnReset"></button>
    </div>
    <canvas id="scene" width="470" height="300"></canvas>

    <div class="stat" style="margin-top:9px"><span data-i18n="surpriseLine"></span><span id="slbl" class="ok"></span></div>
    <div class="meter"><i id="sfill"></i></div>

    <div class="speak" id="speakBox">
      <div class="big" id="speakBig"></div>
      <div class="q" id="speakSub"></div>
    </div>

    <div class="counter">
      <div class="cbox naive"><div class="n" id="cNaive">0</div><div class="l" data-i18n-html="cNaiveLbl"></div></div>
      <div class="cbox actual"><div class="n" id="cActual">0</div><div class="l" data-i18n-html="cActualLbl"></div></div>
      <div class="cbox save"><div class="n" id="cSave">0%</div><div class="l" data-i18n-html="cSaveLbl"></div></div>
    </div>

    <div class="log" id="log"></div>
  </div>

  <!-- RIGHT: private editable scene memory -->
  <div class="card right">
    <div class="membox">
      <div class="membig" id="memsize"></div>
      <div class="stat" id="memnote"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n-html="q1Title"></h3>
      <div class="row">
        <select id="aObj"></select>
        <button id="aB" data-i18n="btnAsk"></button>
        <button id="aCup" class="sec" data-i18n="btnAskCup"></button>
        <button id="aKey" class="sec" data-i18n="btnAskKey"></button>
      </div>
      <div class="ans" id="aA"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n-html="q2Title"></h3>
      <div class="row">
        <select id="fObj"></select>
        <button id="fB" class="hot" data-i18n="btnForget"></button>
      </div>
      <div class="ans" id="fA"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n-html="q3Title"></h3>
      <div class="row">
        <button id="audit" class="sec" disabled data-i18n="btnAudit"></button>
        <button id="genall" class="sec" disabled data-i18n="btnExport"></button>
      </div>
      <div class="ans" id="auditA"></div>
    </div>

    <div class="moat" data-i18n-html="moat"></div>
  </div>
</div>

<footer data-i18n-html="footer"></footer>

<script>

}

// ───────── HDC core (pure ±1 VSA, verified lineage — identical to baby-safety / daily-memory demos) ─────────
const D = 8000;
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function strSeed(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
const _cb=new Map();
function itemHV(key){ if(_cb.has(key)) return _cb.get(key);
  const rng=mulberry32(strSeed(key)), v=new Float32Array(D);
  for(let i=0;i<D;i++) v[i]=rng()<0.5?-1:1; _cb.set(key,v); return v; }
function bind(a,b){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=a[i]*b[i]; return o; }
function cos(a,b){ let d=0,na=0,nb=0; for(let i=0;i<D;i++){ d+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-9); }
// scene-memory fact = bind(object, place); ledger M = Σ facts (real accumulator, exact subtract = forget)
// NOTE: objHV/placeHV keys use language-independent identity IDs (e.objId / e.placeId) so the
//       hypervectors are byte-identical across EN/ZH. Display strings live in SCRIPT.obj[LANG] etc.
function objHV(o){ return itemHV("obj:"+o); }
function placeHV(p){ return itemHV("place:"+p); }
function factHV(o,p){ return bind(objHV(o), placeHV(p)); }

let M = new Float32Array(D);
let PLACES = new Set();                 // place vocabulary (cleanup codebook) — holds placeId identity keys
function addFact(o,p){ const h=factHV(o,p); for(let i=0;i<D;i++) M[i]+=h[i]; PLACES.add(p); }
function subFact(o,p){ const h=factHV(o,p); for(let i=0;i<D;i++) M[i]-=h[i]; }
function recallPlace(o){                 // unbind object -> recover place (deterministic proof it's in M)
  const probe = bind(M, objHV(o));
  let best=null,bs=-2; for(const p of PLACES){ const s=cos(probe, placeHV(p)); if(s>bs){bs=s;best=p;} }
  return {place:best, s:bs};
}

// ───────── scripted walk: objects appear over time, each with an identity + spoken phrase ─────────
// kind: door/steps/chair/person/cup ; at=frame it appears ; objId/placeId = LANGUAGE-INDEPENDENT HV keys.
// obj/place/say are DISPLAY-ONLY {en,zh} and are never fed into the HDC algebra.
const SCRIPT=[
  {id:"door1",  kind:"door",   at:80,  objId:"door",   placeId:"front-left",
     obj:{en:"door",  zh:"门"},   place:{en:"front-left, ~3 steps",      zh:"左前方"},

     obj:{en:"steps", zh:"台阶"}, place:{en:"straight ahead, going down", zh:"正前方下行"},
     say:{en:"careful, steps going down straight ahead",   zh:"注意,正前方有下行台阶"},   peak:0.95, persist:true },
  {id:"chair1", kind:"chair",  at:330, objId:"chair",  placeId:"front-right",
     obj:{en:"chair", zh:"椅子"}, place:{en:"front-right",               zh:"右前方"},
     say:{en:"a chair to your front-right, you can go around it", zh:"右前方有一把椅子,可绕行"}, peak:0.78, persist:true },
  {id:"person1",kind:"person", at:450, objId:"person", placeId:"ahead-near",
     obj:{en:"person",zh:"人"},   place:{en:"approaching, straight ahead", zh:"正前方靠近"},
     say:{en:"someone is approaching, straight ahead",     zh:"有人正在靠近,正前方"},     peak:0.92, persist:false }, // person passes

     say:{en:"there's a cup on the table, to your right",  zh:"桌上有个杯子,在你右手边"},   peak:0.70, persist:true },
];
// helpers to read the display string for an entry in the current language
function objStr(e){ return e.obj[LANG]; }
function placeStr(e){ return e.place[LANG]; }
function sayStr(e){ return e.say[LANG]; }
function entryByObjId(objId){ return SCRIPT.find(e=>e.objId===objId); }
// node + browser share this exact constant so verified counts match the page
const TOTAL_FRAMES = 700;

let frame=0, playing=false, surprise=0, timer=null;
let activeObjs=[];                       // objects currently visible in scene (for drawing + count)
let spokenIds=new Set();                 // ★ fire-ONCE-per-object-by-IDENTITY (NOT a frame-gap)
let naiveCount=0, actualCount=0;         // naive = would-narrate-every-visible-frame ; actual = on-change
let walkX=0;
let lastSpoke=null;                      // remember the most-recently spoken entry (for repaint)

function reset(){
  frame=0; surprise=0; playing=false; activeObjs=[]; spokenIds=new Set();
  naiveCount=0; actualCount=0; walkX=0; lastSpoke=null;
  M=new Float32Array(D); PLACES=new Set();
  document.getElementById("play").disabled=false; document.getElementById("pause").disabled=true;
  document.getElementById("count").disabled=true; document.getElementById("audit").disabled=true; document.getElementById("genall").disabled=true;
  setSurprise(0, t('sLabelCalm')); setSpeak(null, t('speakSilentBig'), t('speakSilentSub'));

  updateCounters(); refreshSelectors(); renderMem(); drawScene();
}

function setSurprise(v,label){ surprise=v; document.getElementById("sfill").style.width=Math.min(100,v*100)+"%";
  const l=document.getElementById("slbl"); l.textContent=label; l.className = v>0.6?"bad":(v>0.3?"wn":"ok"); }
function setSpeak(say, big, sub){ const box=document.getElementById("speakBox");
  document.getElementById("speakBig").innerHTML = (say? '🗣 "'+say+'"' : big);
  document.getElementById("speakBig").className = "big"+(say?" say":"");
  document.getElementById("speakSub").innerHTML = sub||"";
  box.className = "speak"+(say?" live":""); }
function savePctStr(){ if(!naiveCount) return "0%"; const p=(1-actualCount/naiveCount)*100;
  return (p>=99.9?"99.9":p.toFixed(1))+"%"; }      // honest: never round up to a misleading flat 100%
function updateCounters(){
  document.getElementById("cNaive").textContent=naiveCount;
  document.getElementById("cActual").textContent=actualCount;
  document.getElementById("cSave").textContent=savePctStr();
}
function logLine(frame, say, phrase){
  const el=document.getElementById("log");
  const cls = say? "say":"skip";
  const w = say? ('🗣 '+phrase) : t('logSilent');
  el.insertAdjacentHTML("afterbegin", `<div class="l ${cls}"><span class="t">f${String(frame).padStart(3," ")}</span> <span class="w">${w}</span></div>`);
}

// per-frame visibility: an object is visible from .at; persistent ones stay, the person passes through
function visibleObjs(f){
  const out=[];
  for(const e of SCRIPT){
    if(f < e.at) continue;
    if(e.persist){ out.push(e); }
    else { if(f < e.at + 90) out.push(e); }   // person visible ~3s then passes
  }
  return out;
}

// ★ THE FRUGAL ROUTER, identity-keyed (shared logic with node verifier):
// every frame -> naive would narrate ALL visible objects (overwhelming);
// we speak ONLY for objects whose identity we have NOT spoken yet (change/novelty).
function routerStep(f){
  const vis = visibleObjs(f);
  naiveCount += vis.length;                     // naive: re-announces everything, every frame
  let spokeThisFrame=null, peak=0;
  for(const e of vis){
    if(!spokenIds.has(e.id)){                   // NOVEL object -> speak ONCE, bind into memory
      spokenIds.add(e.id);
      addFact(e.objId, e.placeId);              // bind using LANGUAGE-INDEPENDENT identity keys
      actualCount += 1;
      spokeThisFrame = e;
      peak = Math.max(peak, e.peak);
    }
  }
  return { vis, spokeThisFrame, peak };
}

function step(){
  frame++; walkX += 1.0;
  const r = routerStep(frame);
  activeObjs = r.vis;
  if(r.spokeThisFrame){
    const e=r.spokeThisFrame; lastSpoke=e;
    setSurprise(e.peak, t('sLabelChange'));
    setSpeak(sayStr(e), null, t('speakChange')(objStr(e), placeStr(e), e.objId, e.placeId, r.vis.length));
    logLine(frame, true, sayStr(e));
    refreshSelectors(); renderMem();
  } else {
    // nothing new -> stay silent; surprise decays
    setSurprise(Math.max(0, surprise*0.85), surprise>0.3?t('sLabelNotice'):t('sLabelCalm'));
    if(frame % 40 === 0 && r.vis.length) logLine(frame, false, null);  // sample a few "stayed silent" lines
  }
  updateCounters();
  drawScene();
  if(frame>=TOTAL_FRAMES){ pause();
    document.getElementById("count").disabled=false;
    document.getElementById("audit").disabled = spokenIds.size===0;
    document.getElementById("genall").disabled = spokenIds.size===0;
    setSpeak(null, t('walkDone'), t('walkDoneSub')(naiveCount, actualCount, savePctStr()));
  }
}

// ───────── scene drawing (first-person-ish: a corridor, objects slide toward viewer) ─────────
const cv=document.getElementById("scene"), ctx=cv.getContext("2d");
const W=cv.width, H=cv.height;
function drawScene(){
  ctx.fillStyle="#0d1217"; ctx.fillRect(0,0,W,H);
  // perspective floor + walls (first-person corridor)
  const cx=W/2, horizon=H*0.32;
  ctx.fillStyle="#0f161d"; ctx.beginPath(); ctx.moveTo(0,H); ctx.lineTo(W*0.30,horizon); ctx.lineTo(W*0.70,horizon); ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  ctx.strokeStyle="#1c2a36"; ctx.lineWidth=1;
  for(let i=1;i<6;i++){ const y=horizon+(H-horizon)*(i/6); ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.beginPath(); ctx.moveTo(cx,horizon); ctx.lineTo(cx,H); ctx.strokeStyle="#16222d"; ctx.stroke();
  // label
  ctx.fillStyle="#2a3947"; ctx.font="10px sans-serif"; ctx.textAlign="center";
  ctx.fillText(t('canvasLabel'), cx, H-8);

  // draw each currently-visible object at a position keyed to its place
  for(const e of activeObjs){ drawObject(e); }

  // top-left HUD: how many visible now
  ctx.fillStyle="#0b0f14cc"; ctx.fillRect(8,8,150,22);
  ctx.fillStyle="#8da2b5"; ctx.font="11px sans-serif"; ctx.textAlign="left";
  ctx.fillText(t('canvasHud')(activeObjs.length), 14, 23);
}
function placePos(placeId){
  // map a place identity to an approximate on-screen anchor (first-person)
  const cx=W/2;
  if(placeId==="front-left") return {x:cx-110, y:H*0.58};
  if(placeId==="table-top-right") return {x:cx+120, y:H*0.50};
  if(placeId==="front-right") return {x:cx+110, y:H*0.58};
  if(placeId==="ahead-down") return {x:cx, y:H*0.72};
  return {x:cx, y:H*0.55};
}
function drawObject(e){
  const {x,y}=placePos(e.placeId);
  ctx.save(); ctx.textAlign="center";
  const fresh = (frame - e.at) < 18;           // glow briefly when first announced
  const col = e.kind==="person" ? "#ff6b6b" : e.kind==="steps" ? "#f4c152" : "#62b8ff";
  if(fresh){ ctx.shadowColor=col; ctx.shadowBlur=16; }
  ctx.strokeStyle=col; ctx.fillStyle="#13202b"; ctx.lineWidth=2.4;
  if(e.kind==="door"){ roundRect(x-26,y-58,52,86,5); ctx.fill(); ctx.stroke();
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x+15,y-12,3,0,6.3); ctx.fill(); }
  else if(e.kind==="chair"){ roundRect(x-22,y-10,44,12,3); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-20,y-10); ctx.lineTo(x-20,y-46); ctx.lineTo(x+20,y-46); ctx.lineTo(x+20,y-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-18,y+2); ctx.lineTo(x-18,y+26); ctx.moveTo(x+18,y+2); ctx.lineTo(x+18,y+26); ctx.stroke(); }
  else if(e.kind==="steps"){ for(let i=0;i<3;i++){ roundRect(x-50+i*8, y-6+i*14, 100-i*16, 11, 2); ctx.fill(); ctx.stroke(); } }
  else if(e.kind==="person"){ // approaching figure (scale grows as it nears)
    const p=Math.min(1,(frame-e.at)/60), s=1+p*0.6;
    ctx.beginPath(); ctx.arc(x, y-44*s, 14*s, 0, 6.3); ctx.fill(); ctx.stroke();
    roundRect(x-16*s, y-30*s, 32*s, 60*s, 12); ctx.fill(); ctx.stroke(); }
  else if(e.kind==="cup"){ // a table edge + cup
    ctx.strokeStyle="#3a4b59"; roundRect(x-70,y+14,150,8,2); ctx.stroke();
    ctx.strokeStyle=col; roundRect(x-9,y-16,18,26,3); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+11,y-3,6,-1.3,1.3); ctx.stroke(); }
  ctx.shadowBlur=0;
  ctx.fillStyle=col; ctx.font="bold 11px sans-serif"; ctx.fillText(objStr(e)+" · "+placeStr(e), x, y+42);
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ───────── task trigger: thorough on-demand count (best-of-both) ─────────
document.getElementById("count").onclick=()=>{
  // the "thorough flash": front-end counts everything currently in view (on user demand only)
  const n=activeObjs.length;
  const list = activeObjs.map(e=>`${objStr(e)}(${placeStr(e)})`).join(LANG==='zh'?"、 ":", ") || t('countNone');
  setSpeak(null, t('countBig'), t('countBody')(n, list));
};

// ───────── controls ─────────
function play(){ if(playing) return; playing=true;
  document.getElementById("play").disabled=true; document.getElementById("pause").disabled=false;
  document.getElementById("count").disabled=false;
  timer=setInterval(step, 24); }
function pause(){ playing=false; document.getElementById("play").disabled=false; document.getElementById("pause").disabled=true;
  if(timer){ clearInterval(timer); timer=null; } }
document.getElementById("play").onclick=play;
document.getElementById("pause").onclick=pause;
document.getElementById("reset").onclick=()=>{ pause(); reset();
  document.getElementById("aA").innerHTML='<em>'+t('aA_resetEm')+'</em>';
  document.getElementById("fA").innerHTML='<em>'+t('fA_resetEm')+'</em>';
  document.getElementById("auditA").innerHTML='<em>'+t('auditA_resetEm')+'</em>'; };

// ───────── right panel: ask / forget / audit ─────────
const $=id=>document.getElementById(id);
function entriesSeen(){ return [...spokenIds].map(id=>SCRIPT.find(e=>e.id===id)).filter(Boolean); }
function fillSel(sel, entries){ if(!sel) return;
  if(!entries.length){ sel.innerHTML=`<option value="">—</option>`; return; }
  sel.innerHTML = entries.map(e=>`<option value="${e.objId}">${objStr(e)}</option>`).join(""); }
function refreshSelectors(){ const es=entriesSeen(); fillSel($("aObj"),es); fillSel($("fObj"),es); }
function renderMem(){
  const n=spokenIds.size;
  if(!n){ $("memsize").innerHTML=t('memEmpty')+' <small>'+t('memEmptySmall')+'</small>';
    $("memnote").innerHTML=t('memEmptyNote'); return; }
  const kb=(D/1024).toFixed(1);
  $("memsize").innerHTML=t('memFull')(D, kb, n);
  $("memnote").innerHTML=t('memFullNote')(n);
  setDetNote();
}
function bar(s){ const w=Math.max(0,Math.min(64,Math.round(s*128))); return `<span class="bar" style="width:${w}px"></span>`; }

// ask: takes an objId identity key; resolves place identity -> display string for the matched entry
function placeDisp(placeId){ const e=SCRIPT.find(x=>x.placeId===placeId); return e? placeStr(e) : placeId; }
function askObjId(objId){
  if(!spokenIds.size){ $("aA").innerHTML='<em>'+t('askObjPrompt')+'</em>'; return; }
  const e=entryByObjId(objId);
  const disp = e? objStr(e) : objId;
  const rec=recallPlace(objId);
  $("aA").innerHTML = rec.s>0.08
    ? t('askFound')(disp, placeDisp(rec.place), bar(rec.s), rec.s.toFixed(3))
    : t('askNotFound')(disp, rec.s.toFixed(3));
}
$("aB").onclick=()=>askObjId($("aObj").value);
$("aCup").onclick=()=>{ if(!spokenIds.size){ $("aA").innerHTML='<em>'+t('askPrompt')+'</em>'; return; }
  const rec=recallPlace("cup");
  $("aA").innerHTML = rec.s>0.08 ? t('askCupFound')(placeDisp(rec.place), bar(rec.s), rec.s.toFixed(3))
    : t('askCupNone'); };
$("aKey").onclick=()=>{ if(!spokenIds.size){ $("aA").innerHTML='<em>'+t('askPrompt')+'</em>'; return; }
  // keys weren't in the walk -> honest "don't know" (knows it doesn't know)
  const rec=recallPlace("key");
  $("aA").innerHTML = rec.s>0.08 ? t('askKeyFound')(placeDisp(rec.place), bar(rec.s), rec.s.toFixed(3))
    : t('askKeyNone')(rec.s.toFixed(3)); };

// forget (object removed from scene)
$("fB").onclick=()=>{ const objId=$("fObj").value; if(!spokenIds.size){ $("fA").innerHTML='<em>'+t('askPrompt')+'</em>'; return; }
  const e=entryByObjId(objId); if(!e){ $("fA").innerHTML='<em>'+t('fA_noObj')+'</em>'; return; }
  const before=recallPlace(objId);
  subFact(e.objId, e.placeId);
  const after=recallPlace(objId);
  $("fA").innerHTML=t('forgetDone')(objStr(e), e.objId, e.placeId, after.s.toFixed(3), before.s.toFixed(3));
  renderMem(); };

// audit determinism
$("audit").onclick=()=>{
  const es=entriesSeen();
  let out=t('auditHeader')+"\n", allsame=true;
  for(const e of es){ const a=recallPlace(e.objId).s, b=recallPlace(e.objId).s; const same=(a===b); allsame=allsame&&same;
    out+=t('auditLine')(objStr(e), a.toFixed(6), b.toFixed(6), same)+"\n"; }
  out+= es.length? t('auditVerdict')(allsame) : t('auditNone');
  $("auditA").innerHTML=`<div style="white-space:pre-wrap;font:12px/1.5 ui-monospace,Menlo,monospace;color:#cfe3f5">${out}</div>`;
};
$("genall").onclick=()=>{
  const es=entriesSeen();
  const lines=[ t('exportTitle'),
    t('exportGen')(new Date().toLocaleString(LANG==='zh'?"zh-CN":"en-US")), t('exportDevice'),
    t('exportSpoke')(actualCount, naiveCount),
    t('exportKept'), ""];
  es.forEach((e,k)=>{ const r=recallPlace(e.objId); lines.push(t('exportItem')(k+1, objStr(e), placeDisp(r.place), r.s.toFixed(3))); });
  lines.push("", t('exportFoot'));
  $("auditA").innerHTML=`<div style="white-space:pre-wrap;font:12px/1.5 ui-monospace,Menlo,monospace;color:#cfe3f5">${lines.join("\n")}</div>`;
};

function setDetNote(){
  const dn=$("detnote"); if(!dn) return;
  if(!spokenIds.size){ dn.textContent=""; return; }
  const a=recallPlace("door").s, b=recallPlace("door").s;
  dn.innerHTML = t('detNote')(a.toFixed(6), b.toFixed(6), a===b);
}

// repaint all dynamic text in the current language, preserving demo state
function repaintDynamic(){
  // speak pill: reflect current state
  if(playing===false && frame>=TOTAL_FRAMES && spokenIds.size){
    setSpeak(null, t('walkDone'), t('walkDoneSub')(naiveCount, actualCount, savePctStr()));
  } else if(lastSpoke && spokenIds.has(lastSpoke.id) && playing){
    const e=lastSpoke;
    setSpeak(sayStr(e), null, t('speakChange')(objStr(e), placeStr(e), e.objId, e.placeId, activeObjs.length));
  } else {
    setSurprise(surprise, surprise>0.6? t('sLabelChange') : (surprise>0.3? t('sLabelNotice') : t('sLabelCalm')));
    setSpeak(null, t('speakSilentBig'), t('speakSilentSub'));
  }
  // labelled surprise text without changing the meter value when not speaking
  const sl=$("slbl"); if(sl && !(lastSpoke && playing)) sl.textContent = surprise>0.6? t('sLabelChange') : (surprise>0.3? t('sLabelNotice') : t('sLabelCalm'));
  updateCounters(); refreshSelectors(); renderMem(); drawScene();
  // reset the static-ish answer panels to their language-correct init/empty text
  if(!spokenIds.size){
    $("aA").innerHTML='<em>'+t('askA_init')+'</em>';
    $("fA").innerHTML='<em>'+t('fA_init')+'</em>';
    $("auditA").innerHTML='<em>'+t('auditA_init')+'</em>';
  }
}

// init
applyStatic();
reset();
$("aA").innerHTML='<em>'+t('askA_init')+'</em>';
$("fA").innerHTML='<em>'+t('fA_init')+'</em>';
$("auditA").innerHTML='<em>'+t('auditA_init')+'</em>';
</script>
