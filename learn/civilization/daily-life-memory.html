<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daily-Life Memory · your day, remembered by your glasses (Millisecond Era)</title>
<style>
  :root { --bg:#0b0f14; --card:#141a21; --line:#283541; --txt:#e9f0f6; --mut:#8da2b5;
          --acc:#36a3ff; --good:#3fdf8f; --warn:#f4c152; --hot:#ff6b6b; --cool:#62b8ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(1200px 600px at 70% -10%,#15212e,transparent),var(--bg); color:var(--txt);
         font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif; }
  header { padding:22px 26px 16px; border-bottom:1px solid var(--line); }
  .brand { color:var(--mut); font-size:12px; letter-spacing:.14em; text-transform:uppercase; }
  h1 { margin:6px 0 0; font-size:23px; font-weight:800; } h1 span{ color:var(--acc); }
  .sub { color:var(--mut); font-size:13.5px; margin-top:7px; max-width:1120px; }
  .sub b{ color:#d4e2ee; }
  .pitch { background:linear-gradient(180deg,#15202c,#121922); border:1px solid var(--line); border-left:3px solid var(--acc);
           border-radius:12px; padding:14px 16px; margin:16px 26px 0; max-width:1180px; font-size:13.5px; color:#d4e2ee; }
  .pitch b{ color:var(--acc); } .pitch .k{ color:var(--good); font-weight:700; }
  .wrap { display:flex; gap:18px; padding:18px 26px; flex-wrap:wrap; align-items:flex-start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:17px; }
  .panel { flex:1; min-width:372px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  select,input[type=text]{ background:#0b0f14; border:1px solid var(--line); color:var(--txt);
        border-radius:9px; padding:9px 11px; font-size:13.5px; }
  button { background:var(--acc); color:#04121f; border:0; border-radius:9px; padding:9px 15px;
        font-size:14px; cursor:pointer; font-weight:700; }
  button.sec { background:#1b2530; border:1px solid var(--line); color:var(--txt); font-weight:600; }
  button.hot { background:var(--hot); color:#1c0606; } button.warn{ background:var(--warn); color:#1c1300; }
  button:disabled { opacity:.38; cursor:not-allowed; }
  .stat { color:var(--mut); font-size:12px; }
  .ok { color:var(--good); } .bad{ color:var(--hot); } .wn{ color:var(--warn); }
  .membox { background:#0b0f14; border:1px solid var(--line); border-radius:11px; padding:13px; margin-bottom:13px; }
  .membig { font-size:21px; font-weight:800; } .membig small{ font-size:12.5px; color:var(--mut); font-weight:500; }
  .day { max-height:300px; overflow:auto; margin-top:6px; }
  .ev { display:flex; gap:9px; align-items:flex-start; padding:7px 0; border-top:1px solid var(--line); font-size:13.5px; }
  .ev .ent { color:var(--acc); font-weight:700; min-width:74px; }
  .ev .at { color:var(--mut); min-width:54px; } .ev .v{ color:var(--txt); }
  .ev.b .ent{ color:#c08cff; }
  .qcard { border-top:1px dashed var(--line); padding-top:13px; margin-top:13px; }
  .qcard h3 { margin:0 0 8px; font-size:14px; } .qcard h3 b{ color:var(--acc); }
  .ans { background:#0b0f14; border:1px solid var(--line); border-radius:9px; padding:11px; margin-top:7px; min-height:24px; font-size:14px; }
  .ans em{ color:var(--mut); font-style:normal; }
  .bar { display:inline-block; height:8px; background:var(--acc); border-radius:4px; vertical-align:middle; margin:0 6px; }
  .moat { background:#0b0f14; border:1px solid var(--good); border-radius:11px; padding:12px 14px; margin-top:13px; font-size:13px; }
  .moat b{ color:var(--good); }
  /* change-gate strip */
  .gate { background:#0b0f14; border:1px solid var(--line); border-radius:11px; padding:13px; margin-top:13px; }
  .gate canvas{ width:100%; background:#11161c; border:1px solid var(--line); border-radius:8px; display:block; margin-top:8px; }
  .gate .meta{ display:flex; gap:14px; margin-top:8px; flex-wrap:wrap; }
  .gate .meta b{ color:var(--txt); } .gate .big{ font-size:18px; font-weight:800; }
  .honest { background:#141a21; border:1px dashed var(--warn); border-radius:11px;
        padding:12px 15px; margin:0 26px 20px; font-size:12.5px; color:#cdd9e4; max-width:1200px; }
  .honest b{ color:var(--warn); } code{ background:#1b2530; padding:1px 6px; border-radius:5px; font-size:12px; }
  footer{ color:var(--mut); font-size:12px; padding:0 26px 26px; max-width:1180px; }
  footer b{ color:var(--txt); }
  /* language toggle */
  .langtoggle{ position:fixed; top:12px; right:14px; z-index:50; display:flex; gap:4px; }
  .langtoggle .lt{ background:#1b2530; border:1px solid var(--line); color:var(--mut); padding:5px 11px;
        border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; }
  .langtoggle .lt.active{ background:var(--acc); color:#04121f; }
</style>
</head>
<body>
<div class="langtoggle">
  <button id="lang-en" class="lt active" onclick="setLang('en')">EN</button>
  <button id="lang-zh" class="lt" onclick="setLang('zh')">中</button>
</div>
<header>
  <div class="brand" data-i18n="brand"></div>
  <h1><span data-i18n="h1"></span></h1>
  <div class="sub" data-i18n-html="sub"></div>
</header>

<div class="pitch" data-i18n-html="pitch"></div>

<div class="honest" data-i18n-html="honest"></div>

<div class="wrap">
  <!-- LEFT: the day + change-gated capture -->
  <div class="card panel">
    <div class="row">
      <button id="sample" data-i18n="btnSample"></button>
      <button id="merge" class="sec" data-i18n="btnMerge"></button>
      <button id="sep" class="sec" disabled data-i18n="btnSep"></button>
      <button id="clear" class="sec" data-i18n="btnClear"></button>
    </div>
    <div class="membox">
      <div class="membig" id="memsize"></div>
      <div class="stat" id="memnote"></div>
    </div>
    <div class="stat" data-i18n-html="dayCaption"></div>
    <div class="day" id="day"></div>

    <!-- change-gated capture visualization -->
    <div class="gate">
      <div class="stat" data-i18n-html="gateHead"></div>
      <canvas id="gateCv" width="520" height="92"></canvas>
      <div class="meta">
        <div><span class="stat" data-i18n="gSeenLbl"></span> <span class="big" id="gFrames">0</span></div>
        <div><span class="stat" data-i18n="gStoredLbl"></span> <span class="big ok" id="gStored">0</span></div>
        <div><span class="stat" data-i18n="gSkipLbl"></span> <span class="big" id="gSkip">0</span></div>
        <div><span class="stat" data-i18n="gSaveLbl"></span> <span class="big ok" id="gSave">0%</span></div>
      </div>
      <div class="stat" id="gLive" style="margin-top:6px"></div>
    </div>
  </div>

  <!-- RIGHT: interactions -->
  <div class="card panel">
    <div class="qcard">
      <h3 data-i18n-html="q1Title"></h3>
      <div class="row">
        <select id="aE"></select><select id="aR"></select>
        <button id="aB" data-i18n="btnAsk"></button>
        <button id="aKey" class="sec" data-i18n="btnAskKey"></button>
        <button id="aCar" class="sec" data-i18n="btnAskCar"></button>
        <button id="aProm" class="sec" data-i18n="btnAskProm"></button>
      </div>
      <div class="ans" id="aA"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n-html="q2Title"></h3>
      <div class="row">
        <button id="bLock" class="sec" data-i18n="btnLock"></button>
        <button id="bMed" class="sec" data-i18n="btnMed"></button>
        <button id="bEat" class="sec" data-i18n="btnEat"></button>
      </div>
      <div class="ans" id="bA"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n-html="q3Title"></h3>
      <div class="row">
        <select id="fE"></select>
        <button id="fB" class="hot" data-i18n="btnForget"></button>
      </div>
      <div class="ans" id="fA"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n-html="q4Title"></h3>
      <div class="row">
        <select id="wE"></select><select id="wR"></select>
        <input type="text" id="wV" style="flex:1;min-width:120px" />
        <button id="wPrev" class="sec" data-i18n="btnPreview"></button>
        <button id="wCommit" class="warn" disabled data-i18n="btnCommit"></button>
        <button id="undo" class="sec" disabled data-i18n="btnUndo"></button>
      </div>
      <div class="ans" id="wA"></div>
    </div>

    <div class="moat">
      <b data-i18n="moatHead"></b>
      <span data-i18n-html="moatBody"></span>
      <span id="detnote"></span>
      <span data-i18n-html="moatTail"></span>
      <br><span data-i18n-html="moatLast"></span>
    </div>
  </div>
</div>

<footer data-i18n-html="footer"></footer>

<script>
// ───────── i18n dictionary (DISPLAY TEXT ONLY — never used as HV keys) ─────────
const I18N = {

            "② <b>“Episodic-memory Q&A” itself is not trivial, and big models can do complex Q&A</b> — we are not smarter than them. Our moat = <b>on-device + private + reversible (you delete) + deterministic (provably exact)</b>. " +
            "③ <b>Capacity is a theorem (~D/20)</b>: D=10,000 comfortably holds ~500 experiences; once full it crosstalks — it is not “remember everything.” " +

    memEmptyNote: "All of this day's little things = this <b>one</b> vector; raw images / recordings are not kept (private).",

    forgetNoEntity: '<em>No such entity.</em>',

// ───────── HDC core (pure ±1 VSA, verified lineage: t8_app_editable_memory.py all-exact) ─────────
const D = 10000;
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function strSeed(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
const _cb=new Map();
function itemHV(key){ if(_cb.has(key)) return _cb.get(key);
  const rng=mulberry32(strSeed(key)), v=new Float32Array(D);
  for(let i=0;i<D;i++) v[i]=rng()<0.5?-1:1; _cb.set(key,v); return v; }
function bindMul(a,b){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=a[i]*b[i]; return o; }
function cosine(a,b){ let dot=0,na=0,nb=0; for(let i=0;i<D;i++){ dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return dot/(Math.sqrt(na)*Math.sqrt(nb)+1e-9); }
function entHV(e){ return itemHV("ent:"+e); }
function relHV(r){ return itemHV("rel:"+r); }
function valHV(v){ return itemHV("val:"+v); }
function factHV(e,r,v){ return bindMul(bindMul(entHV(e), relHV(r)), valHV(v)); }

// ───────── memory state ─────────
let M=new Float32Array(D);
let LEDGER=[];                       // [{e,r,v,b}] b=true if family member's
let SEEN=new Set();                  // value vocabulary (for cleanup)
let UNDO=[]; let bRows=null; let preview=null;

function addFact(e,r,v,b){ const h=factHV(e,r,v); for(let i=0;i<D;i++) M[i]+=h[i];
  LEDGER.push({e,r,v,b:!!b}); SEEN.add(v); }
function subFact(e,r,v){ const h=factHV(e,r,v); for(let i=0;i<D;i++) M[i]-=h[i];
  const i=LEDGER.findIndex(x=>x.e===e&&x.r===r&&x.v===v); if(i>=0) LEDGER.splice(i,1); }
function entities(b){ return [...new Set(LEDGER.filter(x=>b===undefined||x.b===b).map(x=>x.e))]; }
function relsOf(e){ return [...new Set(LEDGER.filter(x=>x.e===e).map(x=>x.r))]; }
function valOf(e,r){ const f=LEDGER.find(x=>x.e===e&&x.r===r); return f?f.v:null; }

function recall(e,r){                                 // unbind -> value (cleanup vs seen values)
  const probe=bindMul(bindMul(M, entHV(e)), relHV(r));
  let best=null,bs=-2; for(const v of SEEN){ const s=cosine(probe, valHV(v)); if(s>bs){ bs=s; best=v; } }
  return { v:best, s:bs };
}

}

// ③ surgical forget a private moment / person
$("fB").onclick=()=>{ const e=$("fE").value; const rows=LEDGER.filter(x=>x.e===e);
  if(!rows.length){ $("fA").innerHTML=t('forgetNoEntity'); return; }
  const removed=rows.map(x=>({...x})); removed.forEach(x=>subFact(x.e,x.r,x.v));
  UNDO.push({label:t('forgetUndo')(dE(e)), do:()=>removed.forEach(x=>addFact(x.e,x.r,x.v,x.b))}); $("undo").disabled=false;
  const other=entities().find(x=>x!==e);
  const q=rows[0], after=recall(e,q.r);
  const oinfo=other? t('forgetOther')(dE(other), dV(recall(other,relsOf(other)[0]).v)) : '';
  $("fA").innerHTML=t('forgetDone')(dE(e), removed.length, dR(q.r), after.s.toFixed(3), oinfo);
  refreshAll(); };

// ④ counterfactual / undo
$("wPrev").onclick=()=>{ const e=$("wE").value, r=$("wR").value, vNew=($("wV").value||"").trim();
  if(!vNew){ $("wA").innerHTML=t('cfNoNew'); return; }
  const vOld=valOf(e,r); if(vOld==null){ $("wA").innerHTML=t('cfNoRel')(dE(e), dR(r)); return; }
  const fOld=factHV(e,r,vOld), fNew=factHV(e,r,vNew), Sp=new Float32Array(D);
  for(let i=0;i<D;i++) Sp[i]=M[i]-fOld[i]+fNew[i];
  const probe=bindMul(bindMul(Sp,entHV(e)),relHV(r)); const cand=new Set([...SEEN,vNew]);
  let best=null,bs=-2; for(const v of cand){ const s=cosine(probe,valHV(v)); if(s>bs){bs=s;best=v;} }
  const other=LEDGER.find(x=>!(x.e===e&&x.r===r)); let intact="";
  if(other){ const op=bindMul(bindMul(Sp,entHV(other.e)),relHV(other.r));
    let ob=null,obs=-2; for(const v of SEEN){ const s=cosine(op,valHV(v)); if(s>obs){obs=s;ob=v;} }
    intact=t('cfIntact')(dE(other.e), dR(other.r), dV(ob)); }
  preview={e,r,vOld,vNew};
  // best may be vNew (a user-typed value not in DISP_VAL) — fall back to raw via dV()
  $("wA").innerHTML=t('cfPreview')(dE(e), dR(r), dV(vOld), dV(best), bar(bs), intact);
  $("wCommit").disabled=false; };
$("wCommit").onclick=()=>{ if(!preview) return; const {e,r,vOld,vNew}=preview;
  subFact(e,r,vOld); addFact(e,r,vNew);
  UNDO.push({label:t('cfUndoLabel')(dE(e), dR(r)), do:()=>{ subFact(e,r,vNew); addFact(e,r,vOld); }}); $("undo").disabled=false;
  $("wA").innerHTML=t('cfCommitted')(dE(e), dR(r), dV(vNew));
  $("wCommit").disabled=true; preview=null; refreshAll(); };
$("undo").onclick=()=>{ const u=UNDO.pop(); if(!u) return; u.do(); $("undo").disabled=!UNDO.length;
  $("wA").innerHTML=t('undoDone')(u.label); refreshAll(); };

function doClear(){ M=new Float32Array(D); LEDGER=[]; SEEN=new Set(); UNDO=[]; bRows=null; preview=null;
  $("undo").disabled=true; $("wCommit").disabled=true; $("sep").disabled=true; refreshAll();

  $("fA").innerHTML=t('q3Cleared'); $("wA").innerHTML=t('q4Cleared');
  resetGate(); }

// ───────── ⑤ change-gated capture (drives a small animation, ALSO driven in node) ─────────
// model a stream of "frames"; identical-to-previous frames are SKIPPED (µW), changed frames STORED.
const gcv=$("gateCv"), gctx=gcv?gcv.getContext("2d"):null;
// a frame = a small fingerprint number. repeated value = static scene = skip.
const FRAME_STREAM = [10,10,10,10,10, 23, 23,23,23, 41, 41,41,41,41,41, 58, 58,58, 77];
let gState=null;

function gateScan(stream){
  // returns {seen, stored, skipped, marks[]} ; mark.stored=true if frame differed from prev
  let prev=null, seen=0, stored=0, skipped=0; const marks=[];
  for(const f of stream){ seen++; const changed=(f!==prev);
    if(changed){ stored++; marks.push({v:f,stored:true}); prev=f; }
    else { skipped++; marks.push({v:f,stored:false}); } }
  return {seen, stored, skipped, marks};
}
function resetGate(){ gState=null; if($("gFrames")){ $("gFrames").textContent="0"; $("gStored").textContent="0";
  $("gSkip").textContent="0"; $("gSave").textContent="0%"; }
  if(gctx){ gctx.fillStyle="#11161c"; gctx.fillRect(0,0,gcv.width,gcv.height); }
  if($("gLive")) $("gLive").innerHTML=t('gateInit'); }

function drawGate(idx){
  if(!gctx) return; const W=gcv.width,H=gcv.height; gctx.fillStyle="#11161c"; gctx.fillRect(0,0,W,H);
  const n=FRAME_STREAM.length, bw=Math.floor((W-20)/n), top=14, bh=46;
  for(let i=0;i<n;i++){ const m=gState.marks[i]; const x=10+i*bw;
    const shown = i<=idx;
    if(!shown){ gctx.fillStyle="#1b2530"; }
    else if(m.stored){ gctx.fillStyle = (i===idx)?"#3fdf8f":"#256b48"; }
    else { gctx.fillStyle = (i===idx)?"#33424f":"#202a34"; }
    gctx.fillRect(x, top, bw-3, bh);
    if(shown){ gctx.fillStyle = m.stored? "#0b160f" : "#7d8ea0"; gctx.font="9px sans-serif"; gctx.textAlign="center";
      gctx.fillText(m.stored?t('gateStore'):t('gateSkip'), x+(bw-3)/2, top+bh/2+3); }
  }
  // legend
  gctx.textAlign="left"; gctx.font="11px sans-serif";
  gctx.fillStyle="#3fdf8f"; gctx.fillRect(10, top+bh+12, 12,12); gctx.fillStyle="#8da2b5"; gctx.fillText(t('gateLegChanged'), 28, top+bh+22);
  gctx.fillStyle="#202a34"; gctx.fillRect(190, top+bh+12, 12,12); gctx.fillStyle="#8da2b5"; gctx.fillText(t('gateLegSkipped'), 208, top+bh+22);
}
function runGate(done){
  gState=gateScan(FRAME_STREAM); let i=0;
  const tick=()=>{ if(i>=FRAME_STREAM.length){
      const r=gState; const pct=Math.round(r.skipped/r.seen*100);
      $("gLive").innerHTML=t('gateDone')(r.seen, r.stored, r.skipped, pct);
      if(done) done(); return; }
    const seenN=i+1; let st=0,sk=0; for(let k=0;k<=i;k++){ gState.marks[k].stored?st++:sk++; }
    $("gFrames").textContent=seenN; $("gStored").textContent=st; $("gSkip").textContent=sk;
    $("gSave").textContent=Math.round(sk/seenN*100)+"%";
    drawGate(i); i++; setTimeout(tick, 80); };
  tick();
}

// detnote: surface a tiny live determinism proof line in the moat box
function setDetNote(){ // (filled after sample load — re-query bit-identical)
  if(!LEDGER.length){ $("detnote").textContent=""; return; }
  const a=recall("钥匙","位置").s, b=recall("钥匙","位置").s;
  $("detnote").innerHTML = t('detNote')(a.toFixed(6), b.toFixed(6), a===b);
}
const _origRefresh = refreshAll;
refreshAll = function(){ _origRefresh(); setDetNote(); };

// repaint all dynamic text in the current language, preserving demo state
function repaintDynamic(){
  refreshAll();               // re-renders day ledger, mem box, selectors, detnote in current LANG
  // re-render the gate strip + its live text in the current language
  if(gState){
    drawGate(FRAME_STREAM.length-1);
    const r=gState; const pct=Math.round(r.skipped/r.seen*100);
    $("gLive").innerHTML=t('gateDone')(r.seen, r.stored, r.skipped, pct);
  } else {
    resetGate();
  }
}
