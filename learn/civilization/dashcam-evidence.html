<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashcam · Violation Evidence Assistant (Millisecond Era)</title>
<style>
  :root { --bg:#0b0f14; --card:#141a21; --line:#283541; --txt:#e9f0f6; --mut:#8da2b5;
          --acc:#36a3ff; --good:#3fdf8f; --warn:#f4c152; --hot:#ff6b6b; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif; }
  header { padding:18px 24px 14px; border-bottom:1px solid var(--line); }
  .brand { color:var(--mut); font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
  h1 { margin:6px 0 0; font-size:21px; font-weight:800; } h1 span{ color:var(--acc); }
  .sub { color:var(--mut); font-size:13px; margin-top:6px; max-width:1120px; }
  .wrap { display:flex; gap:18px; padding:18px 24px; flex-wrap:wrap; align-items:flex-start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:13px; padding:15px; }
  .left { width:430px; } .right{ flex:1; min-width:380px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  button { background:var(--acc); color:#04121f; border:0; border-radius:9px; padding:9px 14px;
        font-size:14px; cursor:pointer; font-weight:700; }
  button.sec { background:#1b2530; border:1px solid var(--line); color:var(--txt); font-weight:600; }
  button.hot { background:var(--hot); color:#1c0606; } button.warn{ background:var(--warn); color:#1c1300; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  canvas#road { width:100%; background:#11161c; border:1px solid var(--line); border-radius:10px; display:block; }
  .stat { color:var(--mut); font-size:12px; }
  .ok{ color:var(--good); } .bad{ color:var(--hot); } .wn{ color:var(--warn); }
  .meter { height:12px; border-radius:6px; background:#1b2530; overflow:hidden; margin-top:5px; }
  .meter > i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--good),var(--warn),var(--hot)); transition:width .1s; }
  .ev { border:1px solid var(--line); border-radius:11px; padding:11px; margin-bottom:11px; background:#0b0f14; }
  .ev.flash { border-color:var(--hot); box-shadow:0 0 0 2px rgba(255,107,107,.25); }
  .ev .top { display:flex; gap:9px; align-items:center; margin-bottom:7px; }
  .plate { font-weight:800; font-size:15px; letter-spacing:1px; background:#0b3; color:#fff; padding:2px 9px; border-radius:5px; background:linear-gradient(#1565c0,#0d47a1); }
  .vtype { color:var(--hot); font-weight:700; } .vtime{ color:var(--mut); font-size:12px; margin-left:auto; }
  .thumbs { display:flex; gap:6px; margin:6px 0; } .thumbs img{ width:96px; height:60px; border-radius:5px; border:1px solid var(--line); object-fit:cover; }
  .evbtns { display:flex; gap:7px; margin-top:6px; }
  .report { white-space:pre-wrap; background:#0b0f14; border:1px solid var(--line); border-radius:9px; padding:11px; font:12.5px/1.5 ui-monospace,Menlo,monospace; color:#cfe3f5; margin-top:8px; max-height:220px; overflow:auto; }
  .moat { background:#0b0f14; border:1px solid var(--good); border-radius:11px; padding:11px 13px; margin-top:12px; font-size:13px; }
  .moat b{ color:var(--good); }
  .honest { background:#141a21; border:1px dashed var(--warn); border-radius:11px;
        padding:12px 14px; margin:0 24px 18px; font-size:12.5px; color:#cdd9e4; max-width:1200px; }
  .honest b{ color:var(--warn); } code{ background:#1b2530; padding:1px 6px; border-radius:5px; font-size:12px; }
  .audit { font:12px/1.5 ui-monospace,Menlo,monospace; color:var(--mut); white-space:pre-wrap; }
  /* language toggle */
  .langtoggle{ position:fixed; top:12px; right:14px; z-index:50; display:flex; gap:4px; }
  .langtoggle .lt{ background:#1b2530; border:1px solid var(--line); color:var(--mut); padding:5px 11px;
        border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; }
  .langtoggle .lt.active{ background:var(--acc); color:#04121f; }
</style>
</head>

let LANG = (function(){ try{ return localStorage.getItem('msEraLang') || ((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en'); }catch(e){ return 'en'; } })();
function t(k){ return I18N[LANG][k]; }
function applyStatic(){
  document.getElementById('htmlRoot').lang = LANG;
  document.title = t('docTitle');

  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18nHtml]; if(typeof v==='string') el.innerHTML=v; });
}
function setLang(l){
  if(l!==LANG){ LANG=l; try{ localStorage.setItem('msEraLang',l); }catch(e){} }
  document.getElementById('lang-en').classList.toggle('active', l==='en');
  document.getElementById('lang-zh').classList.toggle('active', l==='zh');
  applyStatic(); repaintDynamic();
}

// ───────── violation type IDs (language-independent HV keys) + display labels ─────────
// TYPE_IDS are byte-identical across languages on purpose — they are bound into HV memory.
const TYPE_IDS = ["cut_in","solid_line","unsafe_dist"];
const TYPE_LABEL_KEY = { cut_in:"typeCutIn", solid_line:"typeSolidLine", unsafe_dist:"typeUnsafeDist" };
function typeLabel(id){ return t(TYPE_LABEL_KEY[id]); }

// ───────── HDC core (pure ±1 VSA, verified lineage) ─────────
const D = 8000;
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function strSeed(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
const _cb=new Map();
function itemHV(key){ if(_cb.has(key)) return _cb.get(key);
  const rng=mulberry32(strSeed(key)), v=new Float32Array(D);
  for(let i=0;i<D;i++) v[i]=rng()<0.5?-1:1; _cb.set(key,v); return v; }
function bind(a,b){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=a[i]*b[i]; return o; }
function cos(a,b){ let d=0,na=0,nb=0; for(let i=0;i<D;i++){ d+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-9); }
// evidence fact = bind(plate, time, type); ledger M = Σ facts (real accumulator, exact subtract = forget)
function factHV(plate, tkey, type){ return bind(bind(itemHV("plate:"+plate), itemHV("t:"+tkey)), itemHV("type:"+type)); }
let M = new Float32Array(D);
function addFact(f){ const h=factHV(f.plate,f.tkey,f.type); for(let i=0;i<D;i++) M[i]+=h[i]; }
function subFact(f){ const h=factHV(f.plate,f.tkey,f.type); for(let i=0;i<D;i++) M[i]-=h[i]; }
function recallType(plate, tkey){            // unbind plate+time -> recover violation type (deterministic proof it's in M)
  const probe = bind(bind(M, itemHV("plate:"+plate)), itemHV("t:"+tkey));
  let best=null,bs=-2; for(const ty of TYPE_IDS){ const s=cos(probe, itemHV("type:"+ty)); if(s>bs){bs=s;best=ty;} }
  return {type:best, s:bs};
}

// ───────── scene (top-down dashcam sim) ─────────
const cv=document.getElementById("road"), ctx=cv.getContext("2d");
const W=cv.width, H=cv.height, LANES=[100,200,300];   // x-centers of 3 lanes
const MY_LANE=1, MY_Y=H-90;
let cars=[], simT=0, frame=0, playing=false, road_y=0, surprise=0, lastFlash=-99, evidence=[], plateCnt=0;
// PLATE_PREFIX is language-independent identity data (part of the generated plate HV key) — NOT translated.
const PLATE_PREFIX=["沪A","沪B","苏E","浙A","沪C"];

function plateFor(seed){ const r=mulberry32(seed+777); const p=PLATE_PREFIX[Math.floor(r()*PLATE_PREFIX.length)];
  let s=""; const ch="ABCDEFGHJKLMNPQRSTUVWXYZ0123456789"; for(let i=0;i<5;i++) s+=ch[Math.floor(r()*ch.length)]; return p+"·"+s; }

function reset(){
  cars=[]; simT=0; frame=0; road_y=0; surprise=0; lastFlash=-99; evidence=[]; plateCnt=0;
  M=new Float32Array(D);
  // ambient traffic
  for(let i=0;i<4;i++) cars.push({lane:Math.floor(Math.random()*3), y:Math.random()*H, vy:0.4+Math.random()*0.6, x:LANES[0], col:"#5b6b7a", id:1000+i, cutting:null});
  // scripted violators (the cut-in events): sit just AHEAD of me, merge into my lane w/o signal
  cars.push({lane:2, y:MY_Y-58, vy:0.0, x:LANES[2], col:"#e74c3c", id:1, cutting:{at:140, fromLane:2, toLane:1, type:"cut_in", signal:false}, done:false});
  cars.push({lane:0, y:MY_Y-52, vy:0.0, x:LANES[0], col:"#e67e22", id:2, cutting:{at:430, fromLane:0, toLane:1, type:"solid_line", signal:false}, done:false});
  renderEvidence(); drawFrame(); setSurprise(0,t('sCalm'));
  document.getElementById("live").innerHTML=t('liveInit');
}

function setSurprise(v,label){ surprise=v; document.getElementById("sfill").style.width=Math.min(100,v*100)+"%";
  const l=document.getElementById("slbl"); l.textContent=label; l.className = v>0.6?"bad":(v>0.3?"wn":"ok"); }

function step(){
  frame++; simT=frame/30; road_y=(road_y+2)%40;
  let maxSurprise=0, flagged=null;
  for(const c of cars){
    // ambient relative motion
    c.y += (c.vy);
    if(c.y> H+40){ c.y=-40; c.lane=Math.floor(Math.random()*3); }
    // scripted cut-in
    if(c.cutting && !c.done){
      const cut=c.cutting;
      if(frame>=cut.at && frame<cut.at+45){
        const p=(frame-cut.at)/45;            // lateral slide from->to
        c.x = LANES[cut.fromLane] + (LANES[cut.toLane]-LANES[cut.fromLane])*p;
        c.lane = (p>0.5)? cut.toLane : cut.fromLane;
        // surprise = lateral intrusion into MY lane while just ahead, no signal
        // (predictive-residual style: an unsignalled merge into my gap is exactly the un-predicted event)
        const ahead = (c.y < MY_Y+14) && (MY_Y - c.y < 95);
        const lat = 1 - Math.min(1, Math.abs(c.x - LANES[MY_LANE])/55);
        if(ahead && lat>0.15 && !cut.signal){
          const s = 0.4 + 0.6*lat;
          if(s>maxSurprise){ maxSurprise=s; flagged=c; }
        }
      } else if(frame>=cut.at+45){ c.x=LANES[cut.toLane]; c.lane=cut.toLane; c.done=true; }
    } else { c.x = LANES[c.lane]; }
  }
  // surprise router: flash on spike (predictive-residual style: the cut-in is unpredicted) with refractory gap
  if(maxSurprise>0.6 && frame-lastFlash>40 && flagged){ captureEvidence(flagged); lastFlash=frame; }
  setSurprise(maxSurprise, maxSurprise>0.6?t('sViolation'):(maxSurprise>0.3?t('sCaution'):t('sCalm')));
  drawFrame();
  if(frame>620){ pause(); document.getElementById("live").innerHTML=t('driveEnd'); }
}

function drawFrame(){
  ctx.fillStyle="#11161c"; ctx.fillRect(0,0,W,H);
  // lane markers (dashed) + solid edges
  ctx.strokeStyle="#33424f"; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(50,0); ctx.lineTo(50,H); ctx.moveTo(W-50,0); ctx.lineTo(W-50,H); ctx.stroke();
  ctx.setLineDash([18,18]); ctx.strokeStyle="#4a5b6b"; ctx.lineWidth=2;
  for(const lx of [150,250]){ ctx.beginPath(); for(let y=-40+road_y;y<H;y+=40){ ctx.moveTo(lx,y); ctx.lineTo(lx,y+18);} ctx.stroke(); }
  ctx.setLineDash([]);
  // other cars
  for(const c of cars){ drawCar(c.x,c.y,c.col, c.cutting&&!c.done&&Math.abs(c.x-LANES[MY_LANE])<55); }
  // my car
  drawCar(LANES[MY_LANE],MY_Y,"#2f81f7",false,true);
}
function drawCar(x,y,col,danger,me){
  ctx.fillStyle=col; ctx.strokeStyle=danger?"#ff6b6b":(me?"#9fd0ff":"#0008"); ctx.lineWidth=danger?3:1.5;
  roundRect(x-17,y-28,34,56,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle="rgba(180,210,255,.5)"; roundRect(x-13,y-20,26,16,3); ctx.fill();
  if(me){ ctx.fillStyle="#9fd0ff"; ctx.font="9px sans-serif"; ctx.textAlign="center"; ctx.fillText(t('myCar'),x,y+5); }
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function snapThumb(){ const tmp=document.createElement("canvas"); tmp.width=96; tmp.height=60;
  tmp.getContext("2d").drawImage(cv,0,0,W,H,0,0,96,60); return tmp.toDataURL("image/jpeg",0.6); }

function captureEvidence(c){
  const cut=c.cutting; const plate=plateFor(c.id*31+7); const tkey=Math.floor(simT*10)/10;
  const thumbs=[snapThumb()];
  // a couple more frames for the "clip"
  setTimeout(()=>{ if(playing){} },0);
  const ev={ plate, type:cut.type, time:fmtTime(tkey), tkey:String(tkey), lane:"middle", thumbs, removed:false };
  // capture 2 more thumbs over next frames
  ev._needThumbs=2;
  evidence.push(ev); addFact(ev);
  // grab follow-up thumbs
  let n=0; const grab=()=>{ if(n<2 && ev.thumbs.length<3){ ev.thumbs.push(snapThumb()); n++; setTimeout(grab,120);} else renderEvidence(); };
  setTimeout(grab,120);
  renderEvidence();
  document.getElementById("live").innerHTML=t('captured')(typeLabel(cut.type), plate, ev.time);
}
function fmtTime(tk){ const d=new Date(2026,5,11,8,30,Math.floor(tk)); return d.toTimeString().slice(0,8)+"."+String(Math.floor((tk%1)*10)); }

function renderEvidence(){
  const live=evidence.filter(e=>!e.removed);
  document.getElementById("memstat").textContent = live.length? t('memFull')(live.length) : t('memEmpty');
  document.getElementById("genall").disabled = live.length===0;
  document.getElementById("audit").disabled = live.length===0;
  const el=document.getElementById("evlist");
  if(!evidence.length){ el.innerHTML='<div class="stat">'+t('evlistInit')+'</div>'; return; }
  el.innerHTML = evidence.map((e,i)=> e.removed? `<div class="ev"><span class="stat">${t('evRemoved')(e.plate, typeLabel(e.type))}</span></div>` :
    `<div class="ev flash"><div class="top"><span class="plate">${e.plate}</span> <span class="vtype">${typeLabel(e.type)}</span><span class="vtime">${e.time}</span></div>
       <div class="thumbs">${e.thumbs.map(t=>`<img src="${t}">`).join("")}</div>
       <div class="evbtns"><button class="sec" onclick="proveIn(${i})">${t('btnProve')}</button>
         <button class="hot" onclick="markFalse(${i})">${t('btnMarkFalse')}</button></div>
       <div class="audit" id="aud${i}"></div></div>`).join("");
}
window.proveIn=(i)=>{ const e=evidence[i]; const r=recallType(e.plate, e.tkey);
  document.getElementById("aud"+i).textContent = t('proveOut')(typeLabel(r.type), r.s.toFixed(3)); };
window.markFalse=(i)=>{ const e=evidence[i]; if(e.removed) return; subFact(e); e.removed=true; renderEvidence();
  const r=recallType(e.plate, e.tkey);
  document.getElementById("live").innerHTML=t('markFalseOut')(e.plate, r.s.toFixed(3)); };

document.getElementById("genall").onclick=()=>{
  const live=evidence.filter(e=>!e.removed);
  const lines=[ t('reportHead'),
    t('repGen')(new Date().toLocaleString(LANG==='zh'?"zh-CN":"en-US")), t('repSource'),
    t('repReporter'), t('repCount')(live.length), ""];
  live.forEach((e,k)=> lines.push(t('repItem')(k+1, e.plate, typeLabel(e.type), e.time, t('laneMiddle'))));
  lines.push("", t('repNote'));
  document.getElementById("reportbox").innerHTML = `<div class="report">${lines.join("\n")}</div>
     <div class="stat" style="margin-top:6px">${t('reportFoot')}</div>`;
};
document.getElementById("audit").onclick=()=>{
  const live=evidence.filter(e=>!e.removed);
  let out=t('auditHead')+"\n";
  let allsame=true;
  for(const e of live){ const a=recallType(e.plate,e.tkey).s, b=recallType(e.plate,e.tkey).s; const same=(a===b); allsame=allsame&&same;
    out+=t('auditLine')(e.plate, a.toFixed(6), b.toFixed(6), same)+"\n"; }
  out+= live.length? t('auditVerdict')(allsame) : t('auditNoEv');
  document.getElementById("auditbox").innerHTML=`<div class="report">${out}</div>`;
};

// repaint all dynamic text in the current language, preserving demo state
function repaintDynamic(){
  setSurprise(surprise, surprise>0.6?t('sViolation'):(surprise>0.3?t('sCaution'):t('sCalm')));
  renderEvidence();
  // re-render the live line only if it is still the default prompt (don't clobber a fresh capture/end message)
}

// controls
let timer=null;
function play(){ if(playing) return; playing=true; document.getElementById("play").disabled=true; document.getElementById("pause").disabled=false;
  timer=setInterval(step,33); }
function pause(){ playing=false; document.getElementById("play").disabled=false; document.getElementById("pause").disabled=true; if(timer){clearInterval(timer);timer=null;} }
document.getElementById("play").onclick=play;
document.getElementById("pause").onclick=pause;
document.getElementById("reset").onclick=()=>{ pause(); reset(); document.getElementById("reportbox").innerHTML=""; document.getElementById("auditbox").innerHTML=""; document.getElementById("live").textContent=t('resetMsg'); };

// init
applyStatic();
reset();
</script>
