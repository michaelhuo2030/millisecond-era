<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anti-Poaching Sentinel · solar · on-device · no cloud (Millisecond Era)</title>
<style>
  :root { --bg:#0b0f14; --card:#141a21; --line:#283541; --txt:#e9f0f6; --mut:#8da2b5;
          --acc:#36a3ff; --good:#3fdf8f; --warn:#f4c152; --hot:#ff6b6b; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif; }
  header { padding:18px 24px 14px; border-bottom:1px solid var(--line); }
  .brand { color:var(--mut); font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
  h1 { margin:6px 0 0; font-size:21px; font-weight:800; } h1 span{ color:var(--acc); }
  .sub { color:var(--mut); font-size:13px; margin-top:6px; max-width:1120px; }
  .wrap { display:flex; gap:18px; padding:18px 24px; flex-wrap:wrap; align-items:flex-start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:13px; padding:15px; }
  .left { width:430px; } .right{ flex:1; min-width:380px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  button { background:var(--acc); color:#04121f; border:0; border-radius:9px; padding:9px 14px;
        font-size:14px; cursor:pointer; font-weight:700; }
  button.sec { background:#1b2530; border:1px solid var(--line); color:var(--txt); font-weight:600; }
  button.hot { background:var(--hot); color:#1c0606; } button.warn{ background:var(--warn); color:#1c1300; }
  button.good { background:var(--good); color:#04140c; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  canvas#bush { width:100%; background:#0c1410; border:1px solid var(--line); border-radius:10px; display:block; }
  .stat { color:var(--mut); font-size:12px; }
  .ok{ color:var(--good); } .bad{ color:var(--hot); } .wn{ color:var(--warn); }
  .meter { height:12px; border-radius:6px; background:#1b2530; overflow:hidden; margin-top:5px; }
  .meter > i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--good),var(--warn),var(--hot)); transition:width .1s; }
  .eye { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .pill { font-size:11px; padding:3px 9px; border-radius:11px; border:1px solid var(--line); background:#0b0f14; color:var(--mut); }
  .pill b{ color:var(--txt); font-weight:700; }
  .pill.alert{ border-color:var(--hot); color:var(--hot); }
  .pill.solar{ border-color:var(--good); color:var(--good); }
  .ev { border:1px solid var(--line); border-radius:11px; padding:11px; margin-bottom:11px; background:#0b0f14; }
  .ev.flash { border-color:var(--hot); box-shadow:0 0 0 2px rgba(255,107,107,.25); }
  .ev .top { display:flex; gap:9px; align-items:center; margin-bottom:7px; }
  .etag { font-weight:800; font-size:14px; letter-spacing:.5px; padding:2px 9px; border-radius:5px; background:linear-gradient(#b3261e,#7a160f); color:#fff; }
  .etag.amber{ background:linear-gradient(#a9710b,#7a4f08); } .etag.blue{ background:linear-gradient(#1565c0,#0d47a1); } .etag.teal{ background:linear-gradient(#0e7490,#0a4f63); }
  .etype { color:var(--hot); font-weight:700; } .etime{ color:var(--mut); font-size:12px; margin-left:auto; }
  .spec { display:flex; gap:6px; margin:6px 0; align-items:flex-end; }
  .spec canvas{ width:130px; height:48px; border-radius:5px; border:1px solid var(--line); background:#070b0e; }
  .thumbs { display:flex; gap:6px; margin:6px 0; } .thumbs img{ width:96px; height:64px; border-radius:5px; border:1px solid var(--line); object-fit:cover; }
  .evbtns { display:flex; gap:7px; margin-top:6px; flex-wrap:wrap; }
  .report { white-space:pre-wrap; background:#0b0f14; border:1px solid var(--line); border-radius:9px; padding:11px; font:12.5px/1.5 ui-monospace,Menlo,monospace; color:#cfe3f5; margin-top:8px; max-height:260px; overflow:auto; }
  .moat { background:#0b0f14; border:1px solid var(--good); border-radius:11px; padding:11px 13px; margin-top:12px; font-size:13px; }
  .moat b{ color:var(--good); }
  .sig { background:#0b0f14; border:1px solid var(--acc); border-radius:11px; padding:11px 13px; margin-top:12px; font-size:12.5px; }
  .sig b{ color:var(--acc); }
  .sig .siglist{ display:flex; gap:6px; margin:7px 0; flex-wrap:wrap; }
  .sigchip{ font-size:11px; padding:3px 9px; border-radius:11px; border:1px solid var(--line); background:#11161c; color:var(--txt); }
  .sigchip.dead{ text-decoration:line-through; color:var(--mut); border-style:dashed; }
  .sigchip.fresh{ border-color:var(--good); color:var(--good); }
  .honest { background:#141a21; border:1px dashed var(--warn); border-radius:11px;
        padding:12px 14px; margin:0 24px 18px; font-size:12.5px; color:#cdd9e4; max-width:1200px; }
  .honest b{ color:var(--warn); } code{ background:#1b2530; padding:1px 6px; border-radius:5px; font-size:12px; }
  .audit { font:12px/1.5 ui-monospace,Menlo,monospace; color:var(--mut); white-space:pre-wrap; }
  /* language toggle */
  .langtoggle{ position:fixed; top:12px; right:14px; z-index:50; display:flex; gap:4px; }
  .langtoggle .lt{ background:#1b2530; border:1px solid var(--line); color:var(--mut); padding:5px 11px;
        border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; }
  .langtoggle .lt.active{ background:var(--acc); color:#04121f; }
</style>
</head>
<body>
<div class="langtoggle">
  <button id="lang-en" class="lt active" onclick="setLang('en')">EN</button>
  <button id="lang-zh" class="lt" onclick="setLang('zh')">中</button>
</div>
<header>
  <div class="brand" data-i18n="brand"></div>
  <h1><span data-i18n="h1"></span></h1>
  <div class="sub" data-i18n-html="sub"></div>
</header>

<div class="honest" data-i18n-html="honest"></div>

<div class="wrap">
  <div class="card left">
    <div class="row">
      <button id="play" data-i18n="btnPlay"></button>
      <button id="pause" class="sec" disabled data-i18n="btnPause"></button>
      <button id="reset" class="sec" data-i18n="btnReset"></button>
    </div>
    <canvas id="bush" width="400" height="430"></canvas>
    <div class="eye">
      <span class="pill solar" id="pSolar"></span>
      <span class="pill" id="pAcou"></span>
      <span class="pill" id="pTherm"></span>
    </div>
    <div class="stat" style="margin-top:10px"><span data-i18n="surpriseLine"></span><span id="slbl" class="ok"></span></div>
    <div class="meter"><i id="sfill"></i></div>
    <div class="stat" id="live" style="margin-top:8px"></div>
  </div>

  <div class="card right">
    <div class="row">
      <b style="font-size:15px" data-i18n="panelH"></b>
      <span class="stat" id="memstat"></span>
      <button id="genall" class="warn" style="margin-left:auto" disabled data-i18n="btnGenAll"></button>
      <button id="audit" class="sec" disabled data-i18n="btnAudit"></button>
    </div>
    <div id="evlist"></div>
    <div id="reportbox"></div>
    <div id="auditbox"></div>

    <div class="sig">
      <b data-i18n="sigTitle"></b>
      <div class="siglist" id="siglist"></div>
      <div class="stat" id="sigmsg"></div>
      <div class="evbtns" style="margin-top:8px">
        <button id="evolve" class="good" disabled data-i18n="btnEvolve"></button>
        <button id="restoreSig" class="sec" disabled data-i18n="btnRestoreSig"></button>
      </div>
    </div>

    <div class="moat" data-i18n-html="moat"></div>
  </div>
</div>

let LANG = (function(){ try{ return localStorage.getItem('msEraLang') || ((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en'); }catch(e){ return 'en'; } })();
function t(k){ return I18N[LANG][k]; }
function applyStatic(){
  document.getElementById('htmlRoot').lang = LANG;
  document.title = t('docTitle');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18n]; if(typeof v==='string') el.textContent=v; });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18nHtml]; if(typeof v==='string') el.innerHTML=v; });
}
function setLang(l){
  if(l!==LANG){ LANG=l; try{ localStorage.setItem('msEraLang',l); }catch(e){} }
  document.getElementById('lang-en').classList.toggle('active', l==='en');
  document.getElementById('lang-zh').classList.toggle('active', l==='zh');
  applyStatic(); repaintDynamic();
}

// ───────── HDC core (pure ±1 VSA, verified lineage — identical to dashcam / home-safety) ─────────
const D = 8000;
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function strSeed(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
const _cb=new Map();
function itemHV(key){ if(_cb.has(key)) return _cb.get(key);
  const rng=mulberry32(strSeed(key)), v=new Float32Array(D);
  for(let i=0;i<D;i++) v[i]=rng()<0.5?-1:1; _cb.set(key,v); return v; }
function bind(a,b){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=a[i]*b[i]; return o; }
function cos(a,b){ let d=0,na=0,nb=0; for(let i=0;i<D;i++){ d+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-9); }

// ── HV-IDENTITY KEYS (language-independent on purpose; display via TYPE_DISP) ──
// internal threat-type identity keys fed into itemHV / factHV / specCanvas — MUST be byte-identical across languages.
const TYPE_GUNSHOT = "枪声";
const TYPE_VEHICLE = "偷猎车辆";
const TYPE_SNARE   = "陌生绊线";
const TYPE_HERD    = "大象群";   // benign distractor; display-only, never stored
const TYPES=[TYPE_GUNSHOT, TYPE_VEHICLE, TYPE_SNARE];   // alarm-worthy threat types (NOT TYPE_HERD — benign)
// map an internal type key → its localized display label
function typeDisp(type){
  if(type===TYPE_GUNSHOT) return t('typeGunshot');
  if(type===TYPE_VEHICLE) return t('typeVehicle');
  if(type===TYPE_SNARE)   return t('typeSnare');
  if(type===TYPE_HERD)    return t('typeHerd');
  return type;
}
// map a signature key (gunshot/vehicle/snare) → localized chip label
function sigDisp(key){
  if(key==='gunshot') return t('sigLabelGunshot');
  if(key==='vehicle') return t('sigLabelVehicle');
  if(key==='snare')   return t('sigLabelSnare');
  return key;
}

// event-record fact = bind(threatType, timeKey); ledger M = Σ facts (real accumulator, exact subtract = forget)
function factHV(type, tkey){ return bind(itemHV("type:"+type), itemHV("t:"+tkey)); }
let M = new Float32Array(D);
function addFact(f){ const h=factHV(f.type,f.tkey); for(let i=0;i<D;i++) M[i]+=h[i]; }
function subFact(f){ const h=factHV(f.type,f.tkey); for(let i=0;i<D;i++) M[i]-=h[i]; }
function recallType(tkey){            // unbind time -> recover threat type (deterministic proof it's in M)
  const probe = bind(M, itemHV("t:"+tkey));
  let best=null,bs=-2; for(const ty of TYPES){ const s=cos(probe, itemHV("type:"+ty)); if(s>bs){bs=s;best=ty;} }
  return {type:best, s:bs};
}

// ───────── editable threat-signature library S = Σ signatureHV (the in-field moat) ─────────
// each signature is an item-HV; the matcher compares an incoming event's signature against S.
// forget old (subtract) + add new (add) = poachers evolve, no retraining, no hauling the sentinel back.
let SIG = new Float32Array(D);
let sigSet = [];   // [{key, alive}]  — label rendered via sigDisp(key)
function sigAdd(key){ const h=itemHV("sig:"+key); for(let i=0;i<D;i++) SIG[i]+=h[i]; sigSet.push({key,alive:true}); }
function sigDrop(key){ const h=itemHV("sig:"+key); for(let i=0;i<D;i++) SIG[i]-=h[i];
  const e=sigSet.find(s=>s.key===key && s.alive); if(e) e.alive=false; }
function sigMatch(key){ return cos(SIG, itemHV("sig:"+key)); }   // is this signature currently armed?

// ───────── scene (top-down patch of bush with a water-hole, at night) ─────────
const cv=document.getElementById("bush"), ctx=cv.getContext("2d");
const W=cv.width, H=cv.height;
// scripted timeline (frame-keyed). Each event: window [at, at+dur]; surprise = predicted-vs-observed divergence.
// benign:true => should NOT alarm (change-of-the-RIGHT-kind test: not just any motion).
// sigKey => which threat-signature must be ARMED in SIG for this to fire (the editable moat).
const SCRIPT=[
  {at:90,  dur:55, kind:"gunshot",  type:TYPE_GUNSHOT, peak:0.95, benign:false, sigKey:"gunshot"},
  {at:230, dur:90, kind:"vehicle",  type:TYPE_VEHICLE, peak:0.88, benign:false, sigKey:"vehicle"},
  {at:400, dur:100,kind:"herd",     type:TYPE_HERD,    peak:0.34, benign:true,  sigKey:null},     // benign distractor — learned to ignore
  {at:560, dur:80, kind:"snare",    type:TYPE_SNARE,   peak:0.83, benign:false, sigKey:"snare"},  // new tactic — only fires AFTER signature edited in
];
let t_sec=0, frame=0, playing=false, surprise=0, evidence=[], firedAt=new Set();
// eye-state (modeled / simulated upstream recognizer outputs) — semantic codes, localized at render
let solarState="day", acouState="calm", thermState="calm";
let acouSpike=0, heatX=-60, heatY=0, herdPhase=-1, snarePulse=0, waterRipple=0, gunFlash=0, nightT=0;

function reset(){
  t_sec=0; frame=0; surprise=0; evidence=[]; firedAt=new Set();
  acouSpike=0; heatX=-60; herdPhase=-1; snarePulse=0; waterRipple=0; gunFlash=0; nightT=0;
  solarState="day"; acouState="calm"; thermState="calm";
  M=new Float32Array(D);
  // reset signature library to factory state (gunshot + vehicle armed; snare NOT yet known)
  SIG=new Float32Array(D); sigSet=[];
  sigAdd("gunshot");
  sigAdd("vehicle");
  evolved=false; document.getElementById("evolve").disabled=false; document.getElementById("restoreSig").disabled=true;
  renderSig();
  renderEvidence(); updateEye(); drawFrame(); setSurprise(0,"calm");
}

function setSurprise(v,labelCode){ surprise=v; document.getElementById("sfill").style.width=Math.min(100,v*100)+"%";
  surpriseLabelCode=labelCode;
  const l=document.getElementById("slbl"); l.textContent=surpLabel(labelCode); l.className = v>0.6?"bad":(v>0.3?"wn":"ok"); }
let surpriseLabelCode="calm";
function surpLabel(code){
  if(code==="alarm") return t('surpAlarm');
  if(code==="benign") return t('surpBenign');
  if(code==="unarmed") return t('surpUnarmed');
  if(code==="note") return t('surpNote');
  return t('surpCalm');
}

function updateEye(){
  // solar
  const pSolar=document.getElementById("pSolar");
  pSolar.innerHTML="<span>"+(LANG==='zh'?"太阳能: ":"Solar: ")+"</span><b>"+(solarState==="day"?t('solarDayB'):t('solarNightB'))+"</b>";
  pSolar.className="pill solar";
  // acoustic
  const acouTxt = acouState==="calm" ? t('acouCalmB')
    : acouState==="gunshot" ? t('acouGunshot')
    : acouState==="vehicle" ? t('acouVehicle')
    : acouState==="herd"    ? t('acouHerd')
    : acouState==="snare"   ? t('acouSnare') : t('acouCalmB');
  const pAcou=document.getElementById("pAcou");
  pAcou.innerHTML=t('acouLabel')+"<b>"+acouTxt+"</b>";
  pAcou.className="pill"+(acouState!=="calm"?" alert":"");
  // thermal
  const thermTxt = thermState==="calm" ? t('thermCalmB')
    : thermState==="vehicle" ? t('thermVehicle')
    : thermState==="herd"    ? t('thermHerd')
    : thermState==="snare"   ? t('thermSnare') : t('thermCalmB');
  const pTherm=document.getElementById("pTherm");
  pTherm.innerHTML=t('thermLabel')+"<b>"+thermTxt+"</b>";
  pTherm.className="pill"+(thermState!=="calm"?" alert":"");
}

function activeEvent(){ for(const e of SCRIPT){ if(frame>=e.at && frame<e.at+e.dur) return e; } return null; }

function step(){
  frame++; t_sec=frame/30; waterRipple+=0.12; nightT+=0.01; if(gunFlash>0) gunFlash-=0.12;
  // default calm night each frame; the scripted event overrides
  solarState = frame<60? "day" : "night";
  acouState="calm"; thermState="calm";
  acouSpike=0; heatX=-60; herdPhase=-1; snarePulse=0;
  let s=0, ev=activeEvent(), flagType=null, isBenign=false, evSigKey=null;
  if(ev){
    const p=(frame-ev.at)/ev.dur;                 // 0..1 progress through the event window
    const ramp = Math.min(1, p/0.18);             // quick onset = the un-predicted change
    s = ev.peak * ramp;
    flagType = ev.type; isBenign = ev.benign; evSigKey = ev.sigKey;
    if(ev.kind==="gunshot"){   // acoustic spike against ambient forest noise = predictive residual
      acouSpike = Math.min(1, ramp*1.1); acouState="gunshot"; if(p<0.25) gunFlash=1; }
    if(ev.kind==="vehicle"){   // new heat source + motion entering the patch = thermal anomaly
      heatX = -60 + Math.min(1,p/0.5)*180; heatY = 70; thermState="vehicle"; acouState="vehicle"; }
    if(ev.kind==="herd"){      // BENIGN: large warm motion, but it's the RIGHT kind of change → learned to ignore
      herdPhase = p; thermState="herd"; acouState="herd"; }
    if(ev.kind==="snare"){     // new tactic: a quiet, unfamiliar disturbance signature (tripwire / branch snap)
      snarePulse = Math.min(1, ramp); acouState="snare"; thermState="snare"; }
  }
  // ── surprise ROUTER ──
  // (a) benign herd: it IS a change, but it matches a learned-benign pattern → suppress to a low "note" level, never alarm.
  // (b) threat: alarm only if its signature is currently ARMED in the editable library SIG.
  //     snare fires ONLY after the ranger edits the signature in (poachers evolve → no retraining, in-field edit).
  let armed = true;
  if(ev && !isBenign && evSigKey){ armed = sigMatch(evSigKey) > 0.5; }   // signature present in library?
  const wouldAlarm = ev && !isBenign && s>0.6 && armed;
  // once-per-event-window (keyed by event onset) = refractory by IDENTITY, can't double-fire mid-window.
  if(wouldAlarm && !firedAt.has(ev.at) && flagType){ captureEvent(flagType); firedAt.add(ev.at); }
  // display level: benign caps at "note"; un-armed threat shows as un-recognized murmur (caps at note)
  let disp = s;
  if(isBenign) disp = Math.min(s, 0.45);
  else if(ev && !armed) disp = Math.min(s, 0.5);
  let lbl = "calm";
  if(disp>0.6) lbl="alarm";
  else if(isBenign && disp>0.3) lbl="benign";
  else if(ev && !isBenign && !armed && disp>0.3) lbl="unarmed";
  else if(disp>0.3) lbl="note";
  setSurprise(disp, lbl);
  updateEye(); drawFrame();
  if(frame>700){ pause(); document.getElementById("live").innerHTML=t('liveDone'); }
}

function drawFrame(){
  // night ground tint
  ctx.fillStyle = frame<60 ? "#12201a" : "#0c1410"; ctx.fillRect(0,0,W,H);
  // subtle ground texture (scrub dots)
  ctx.fillStyle = frame<60 ? "#1a2c22" : "#10180f";
  const tr=mulberry32(42);
  for(let i=0;i<60;i++){ const x=tr()*W, y=tr()*H, r=1+tr()*2; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }
  // border / patch boundary
  ctx.strokeStyle="#27402f"; ctx.lineWidth=6; roundRect(16,16,W-32,H-32,16); ctx.stroke();
  // caption
  ctx.fillStyle="#2a3947"; ctx.font="10px sans-serif"; ctx.textAlign="center";
  ctx.fillText(t('capEdge'), W/2, H-26);

  drawWaterHole(150, 250);
  drawBushes();
  drawSentinel(W-58, 56);                 // the solar sensor "eye"

  // ── scripted overlays ──
  if(acouSpike>0) drawAcousticSpike(acouSpike);
  if(heatX>-50)   drawVehicle(heatX, heatY);
  if(herdPhase>=0) drawHerd(herdPhase);
  if(snarePulse>0) drawSnare(110, 350, snarePulse);
  if(gunFlash>0)  { ctx.fillStyle="rgba(255,107,107,"+(gunFlash*0.18)+")"; ctx.fillRect(0,0,W,H); }
}

function drawSentinel(x,y){
  ctx.save();
  // solar panel
  ctx.fillStyle = frame<60 ? "#2a4a8a" : "#16233f"; ctx.strokeStyle="#3a4b59"; ctx.lineWidth=2;
  roundRect(x-22,y-12,44,22,3); ctx.fill(); ctx.stroke();
  ctx.strokeStyle="#0c1410"; ctx.lineWidth=1;
  for(let gx=-14;gx<=14;gx+=10){ ctx.beginPath(); ctx.moveTo(x+gx,y-12); ctx.lineTo(x+gx,y+10); ctx.stroke(); }
  // sensor head + listening rings
  ctx.fillStyle="#1b2530"; ctx.strokeStyle="#46586a"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x, y+22, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  const live = surprise>0.6;
  ctx.strokeStyle = live? "rgba(255,107,107,.7)" : "rgba(63,223,143,.35)";
  for(let k=1;k<=2;k++){ ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(x, y+22, 8+k*(7+Math.sin(waterRipple)*1.5), -Math.PI*0.9, -Math.PI*0.1); ctx.stroke(); }
  ctx.fillStyle = frame<60? "#3fdf8f" : "#8da2b5"; ctx.font="9px sans-serif"; ctx.textAlign="center";
  ctx.fillText(t('capSentinel'), x, y+44);
  ctx.restore();
}

function drawWaterHole(x,y){
  ctx.save();
  ctx.fillStyle="#0e2230"; ctx.strokeStyle="#163848"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(x,y,52,34,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.strokeStyle="rgba(60,130,160,.4)"; ctx.lineWidth=1;
  const rr=8+Math.sin(waterRipple)*4;
  ctx.beginPath(); ctx.ellipse(x,y,rr+14,rr+8,0,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle="#274050"; ctx.font="10px sans-serif"; ctx.textAlign="center"; ctx.fillText(t('capWater'), x, y+4);
  ctx.restore();
}

function drawBushes(){
  ctx.save();
  const spots=[[70,90],[330,300],[60,330],[280,140],[200,80]];
  ctx.fillStyle = frame<60 ? "#1d3326" : "#13211a";
  for(const [x,y] of spots){
    for(let i=0;i<5;i++){ const a=i/5*Math.PI*2; ctx.beginPath();
      ctx.arc(x+Math.cos(a)*9, y+Math.sin(a)*7, 8, 0, Math.PI*2); ctx.fill(); }
  }
  ctx.restore();
}

function drawAcousticSpike(lvl){
  // a thin red spike crossing the patch (gunshot = sudden acoustic transient)
  ctx.save();
  ctx.strokeStyle="rgba(255,107,107,"+(0.5+lvl*0.4)+")"; ctx.lineWidth=2;
  ctx.beginPath();
  const baseY=200; let x=30;
  ctx.moveTo(x, baseY);
  const rng=mulberry32(7+Math.floor(frame/3));
  while(x<W-30){ const amp = (Math.abs(x-200)<40)? lvl*70 : (rng()-0.5)*8;
    ctx.lineTo(x, baseY - amp); x+=8; }
  ctx.stroke();
  ctx.fillStyle="#ff6b6b"; ctx.font="bold 11px sans-serif"; ctx.textAlign="center";
  ctx.fillText(t('capGunSpike'), 200, baseY-72);
  ctx.restore();
}

function drawVehicle(x,y){
  ctx.save();
  // heat signature halo
  const g=ctx.createRadialGradient(x,y,4,x,y,30);
  g.addColorStop(0,"rgba(255,140,60,.85)"); g.addColorStop(1,"rgba(255,140,60,0)");
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,30,0,Math.PI*2); ctx.fill();
  // vehicle body
  ctx.fillStyle="#3a2b1b"; ctx.strokeStyle="#ff6b6b"; ctx.lineWidth=2.5;
  roundRect(x-16,y-10,32,20,4); ctx.fill(); ctx.stroke();
  // headlight cones
  ctx.fillStyle="rgba(255,220,120,.25)";
  ctx.beginPath(); ctx.moveTo(x+16,y-6); ctx.lineTo(x+44,y-16); ctx.lineTo(x+44,y+4); ctx.closePath(); ctx.fill();
  ctx.fillStyle="#ff6b6b"; ctx.font="bold 10px sans-serif"; ctx.textAlign="center";
  ctx.fillText(t('capVehicle'), x, y+26);
  ctx.restore();
}

function drawHerd(p){
  // BENIGN: a group of large warm bodies moving across (big motion, but the RIGHT kind of change)
  ctx.save();
  const baseX = 40 + p*260;
  const herd=[[0,0],[26,14],[-22,18],[10,-16],[40,2]];
  for(const [dx,dy] of herd){
    const x=baseX+dx, y=180+dy;
    const g=ctx.createRadialGradient(x,y,3,x,y,18);
    g.addColorStop(0,"rgba(120,180,150,.55)"); g.addColorStop(1,"rgba(120,180,150,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.fill();
    // elephant-ish body
    ctx.fillStyle="#5b6e60"; ctx.strokeStyle="#3fdf8f"; ctx.lineWidth=1.5;
    roundRect(x-13,y-8,26,17,8); ctx.fill(); ctx.stroke();
  }
  ctx.fillStyle="#3fdf8f"; ctx.font="bold 10px sans-serif"; ctx.textAlign="center";
  ctx.fillText(t('capHerd'), baseX+8, 152);
  ctx.restore();
}

function drawSnare(x,y,lvl){
  ctx.save();
  // a faint tripwire line + a small snapped-branch marker (quiet, unfamiliar disturbance)
  ctx.strokeStyle="rgba(244,193,82,"+(0.3+lvl*0.5)+")"; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(x-30,y+18); ctx.lineTo(x+70,y-10); ctx.stroke(); ctx.setLineDash([]);
  // disturbance pulse
  ctx.strokeStyle="rgba(244,193,82,"+(0.6*lvl)+")"; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x+20,y+4, 6+lvl*16, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle="#f4c152"; ctx.font="bold 10px sans-serif"; ctx.textAlign="center";
  ctx.fillText(t('capSnare'), x+20, y+34);
  ctx.restore();
}

function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ── spectrogram thumbnail: a tiny deterministic spectrogram derived from the threat type + time ──
// NOTE: 'type' is the internal HV-key (TYPE_*), so the spectrogram is identical across languages.
function specCanvas(type, tkey){
  const c=document.createElement("canvas"); c.width=130; c.height=48; const g=c.getContext("2d");
  g.fillStyle="#070b0e"; g.fillRect(0,0,130,48);
  const rng=mulberry32(strSeed(type+"|"+tkey));
  const cols=44, rows=14, cw=130/cols, rh=48/rows;
  // type shapes the spectro: gunshot=broadband transient burst; vehicle=low-freq bands; snare=sparse high ticks
  for(let cx=0;cx<cols;cx++){
    for(let ry=0;ry<rows;ry++){
      let e=rng()*0.25;
      const center = cols*0.42;
      if(type===TYPE_GUNSHOT){ const burst = Math.exp(-Math.pow((cx-center)/4,2)); e += burst*(0.5+rng()*0.5); }
      else if(type===TYPE_VEHICLE){ if(ry>rows-5){ e += (0.4+rng()*0.4)*Math.max(0,1-Math.abs(cx-center)/22); } }
      else if(type===TYPE_SNARE){ if(ry<5 && rng()<0.25){ e += 0.5+rng()*0.4; } }
      const v=Math.min(1,e);
      const r=Math.floor(20+v*235), gg=Math.floor(20+v*120), b=Math.floor(40+v*40);
      g.fillStyle=`rgb(${r},${gg},${b})`; g.fillRect(cx*cw, (rows-1-ry)*rh, cw+0.5, rh+0.5);
    }
  }
  g.strokeStyle="#283541"; g.strokeRect(0.5,0.5,129,47);
  return c.toDataURL("image/png");
}

function tagClass(type){
  if(type===TYPE_GUNSHOT) return "";          // red
  if(type===TYPE_VEHICLE) return "amber";
  return "blue";                              // TYPE_SNARE
}

function captureEvent(type){
  const tkey=Math.floor(t_sec*10)/10;
  const ev={ type, time:fmtTime(tkey), tkey:String(tkey), spec:specCanvas(type,tkey), removed:false };
  evidence.push(ev); addFact(ev);
  renderEvidence();
  document.getElementById("live").innerHTML=t('liveCapture')(typeDisp(type), ev.time);
}
function fmtTime(tk){ const d=new Date(2026,5,12,2,10,Math.floor(tk)); return d.toTimeString().slice(0,8)+"."+String(Math.floor((tk%1)*10)); }

function renderEvidence(){
  const live=evidence.filter(e=>!e.removed);
  document.getElementById("memstat").textContent = live.length? t('memFull')(live.length) : t('memEmpty');
  document.getElementById("genall").disabled = live.length===0;
  document.getElementById("audit").disabled = live.length===0;
  const el=document.getElementById("evlist");
  if(!evidence.length){ el.innerHTML='<div class="stat">'+t('evEmpty')+'</div>'; return; }
  el.innerHTML = evidence.map((e,i)=> e.removed? `<div class="ev"><span class="stat">${t('evRemoved')(typeDisp(e.type), e.time)}</span></div>` :
    `<div class="ev flash"><div class="top"><span class="etag ${tagClass(e.type)}">${t('evThreatTag')}</span> <span class="etype">${typeDisp(e.type)}</span><span class="etime">${e.time}</span></div>
       <div class="spec"><img src="${e.spec}" alt="${t('evSpecAlt')}" style="width:130px;height:48px;border-radius:5px;border:1px solid var(--line)"><span class="stat">${t('evSpecCaption')}</span></div>
       <div class="stat">${t('evBody')}</div>
       <div class="evbtns"><button class="sec" onclick="proveIn(${i})">${t('btnProve')}</button>
         <button class="hot" onclick="markFalse(${i})">${t('btnMarkFalse')}</button></div>
       <div class="audit" id="aud${i}"></div></div>`).join("");
}
window.proveIn=(i)=>{ const e=evidence[i]; const r=recallType(e.tkey);
  document.getElementById("aud"+i).textContent = t('proveOut')(typeDisp(r.type), r.s.toFixed(3)); };
window.markFalse=(i)=>{ const e=evidence[i]; if(e.removed) return; subFact(e); e.removed=true; renderEvidence();
  const r=recallType(e.tkey);
  document.getElementById("live").innerHTML=t('liveDeleted')(typeDisp(e.type), e.time, r.s.toFixed(3)); };

// ── editable threat signatures (the in-field moat) ──
let evolved=false;
function renderSig(){
  const el=document.getElementById("siglist");
  el.innerHTML = sigSet.map(s=> `<span class="sigchip ${s.alive? (s.key==='snare'?'fresh':'') : 'dead'}">${s.alive?'●':'○'} ${sigDisp(s.key)}</span>`).join("");
}
document.getElementById("evolve").onclick=()=>{
  if(evolved) return; evolved=true;
  // poachers switched from rifle to silent snares → forget the gunshot signature, add the tripwire/branch-snap signature.
  sigDrop("gunshot");
  sigAdd("snare");
  renderSig();
  const dG=sigMatch("gunshot"), dS=sigMatch("snare");
  document.getElementById("sigmsg").innerHTML=t('sigMsgEvolved')(dG.toFixed(3), dS.toFixed(3));
  document.getElementById("restoreSig").disabled=false;
  document.getElementById("evolve").disabled=true;
};
document.getElementById("restoreSig").onclick=()=>{ reset(); document.getElementById("reportbox").innerHTML=""; document.getElementById("auditbox").innerHTML="";
  document.getElementById("sigmsg").innerHTML=t('sigMsgInit'); };

document.getElementById("genall").onclick=()=>{
  const live=evidence.filter(e=>!e.removed);
  const lines=[ t('reportTitle'),
    t('repGen')(new Date().toLocaleString(LANG==='zh'?"zh-CN":"en-US")),
    t('repDevice'),
    t('repReserve'),
    t('repCount')(live.length), t('repKept'), ""];
  live.forEach((e,k)=> lines.push(t('repLine')(k+1, typeDisp(e.type), e.time)));
  lines.push("", t('repNote'));
  document.getElementById("reportbox").innerHTML = `<div class="report">${lines.join("\n")}</div>
     <div class="stat" style="margin-top:6px">${t('reportFoot')}</div>`;
};
document.getElementById("audit").onclick=()=>{
  const live=evidence.filter(e=>!e.removed);
  let out=t('auditHeader');
  let allsame=true;
  for(const e of live){ const a=recallType(e.tkey).s, b=recallType(e.tkey).s; const same=(a===b); allsame=allsame&&same;
    out+=t('auditLine')(e.time, typeDisp(e.type), a.toFixed(6), b.toFixed(6), same); }
  out+= live.length? t('auditVerdict')(allsame? t('auditPass') : t('auditFail')) : t('auditNoEvents');
  document.getElementById("auditbox").innerHTML=`<div class="report">${out}</div>`;
};

// controls
let timer=null;
function play(){ if(playing) return; playing=true; document.getElementById("play").disabled=true; document.getElementById("pause").disabled=false;
  timer=setInterval(step,33); }
function pause(){ playing=false; document.getElementById("play").disabled=false; document.getElementById("pause").disabled=true; if(timer){clearInterval(timer);timer=null;} }
document.getElementById("play").onclick=play;
document.getElementById("pause").onclick=pause;
document.getElementById("reset").onclick=()=>{ pause(); reset(); document.getElementById("reportbox").innerHTML=""; document.getElementById("auditbox").innerHTML=""; document.getElementById("live").innerHTML=t('liveIntro'); };

// repaint all dynamic text in the current language, preserving demo state
function repaintDynamic(){
  // surprise label + eye pills
  document.getElementById("slbl").textContent = surpLabel(surpriseLabelCode);
  updateEye();
  // live line: keep intro unless an event/done has overridden it (re-render intro if still default-ish)
  // we re-render evidence & signature (which carry localized text), and redraw the canvas
  renderEvidence(); renderSig();
  // sig message: only the init message is safely re-localizable without state; evolved message persists as-is
  if(!evolved){ document.getElementById("sigmsg").innerHTML=t('sigMsgInit'); }
  drawFrame();
  // live intro re-localize when the watch hasn't started and nothing captured/deleted
  if(frame===0 && evidence.length===0){ document.getElementById("live").innerHTML=t('liveIntro'); }
}

// init
applyStatic();
reset();
document.getElementById("live").innerHTML=t('liveIntro');
</script>
