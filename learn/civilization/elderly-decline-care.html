<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Elderly Gait · Decline Tracking + Fall Alert (Millisecond Era)</title>
<style>
  :root { --bg:#0b0f14; --card:#141a21; --line:#283541; --txt:#e9f0f6; --mut:#8da2b5;
          --acc:#36a3ff; --good:#3fdf8f; --warn:#f4c152; --hot:#ff6b6b; --cool:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif; }
  header { padding:18px 24px 14px; border-bottom:1px solid var(--line); }
  .brand { color:var(--mut); font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
  h1 { margin:6px 0 0; font-size:21px; font-weight:800; } h1 span{ color:var(--acc); }
  .sub { color:var(--mut); font-size:13px; margin-top:6px; max-width:1120px; }
  .wrap { display:flex; gap:18px; padding:18px 24px; flex-wrap:wrap; align-items:flex-start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:13px; padding:15px; }
  .left { width:440px; } .right{ flex:1; min-width:380px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  button { background:var(--acc); color:#04121f; border:0; border-radius:9px; padding:9px 14px;
        font-size:14px; cursor:pointer; font-weight:700; }
  button.sec { background:#1b2530; border:1px solid var(--line); color:var(--txt); font-weight:600; }
  button.hot { background:var(--hot); color:#1c0606; } button.warn{ background:var(--warn); color:#1c1300; }
  button.good { background:var(--good); color:#04121f; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  canvas#gait { width:100%; background:#11161c; border:1px solid var(--line); border-radius:10px; display:block; }
  .stat { color:var(--mut); font-size:12px; }
  .ok{ color:var(--good); } .bad{ color:var(--hot); } .wn{ color:var(--warn); }
  .meter { height:13px; border-radius:7px; background:#1b2530; overflow:hidden; margin-top:5px; }
  .meter > i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--good),var(--warn),var(--hot)); transition:width .12s; }
  .pillrow { display:flex; gap:8px; margin-top:9px; flex-wrap:wrap; }
  .pill { background:#0b0f14; border:1px solid var(--line); border-radius:9px; padding:7px 11px; font-size:12px; }
  .pill b{ font-size:15px; }
  .ev { border:1px solid var(--line); border-radius:11px; padding:11px; margin-bottom:11px; background:#0b0f14; }
  .ev.flash { border-color:var(--hot); box-shadow:0 0 0 2px rgba(255,107,107,.25); }
  .ev.soft { border-color:var(--warn); box-shadow:0 0 0 2px rgba(244,193,82,.18); }
  .ev .top { display:flex; gap:9px; align-items:center; margin-bottom:6px; }
  .etag { font-weight:800; font-size:13px; padding:2px 9px; border-radius:5px; }
  .etag.fall{ background:linear-gradient(#c0392b,#922b21); color:#fff; }
  .etag.decl{ background:linear-gradient(#b9770e,#8a5a0a); color:#fff; }
  .etime{ color:var(--mut); font-size:12px; margin-left:auto; }
  .evbtns { display:flex; gap:7px; margin-top:6px; flex-wrap:wrap; }
  .report { white-space:pre-wrap; background:#0b0f14; border:1px solid var(--line); border-radius:9px; padding:11px; font:12.5px/1.5 ui-monospace,Menlo,monospace; color:#cfe3f5; margin-top:8px; max-height:240px; overflow:auto; }
  .moat { background:#0b0f14; border:1px solid var(--good); border-radius:11px; padding:11px 13px; margin-top:12px; font-size:13px; }
  .moat b{ color:var(--good); }
  .honest { background:#141a21; border:1px dashed var(--warn); border-radius:11px;
        padding:12px 14px; margin:0 24px 18px; font-size:12.5px; color:#cdd9e4; max-width:1200px; }
  .honest b{ color:var(--warn); } code{ background:#1b2530; padding:1px 6px; border-radius:5px; font-size:12px; }
  .audit { font:12px/1.5 ui-monospace,Menlo,monospace; color:var(--mut); white-space:pre-wrap; }
  /* power panel */
  .power { background:#0b0f14; border:1px solid var(--line); border-radius:11px; padding:13px; margin-top:12px; }
  .power h3 { margin:0 0 4px; font-size:14px; } .power h3 span{ color:var(--acc); }
  .pbar { position:relative; height:30px; border-radius:7px; background:#1b2530; margin:8px 0 3px; overflow:hidden; }
  .pbar > i { display:block; height:100%; border-radius:7px; }
  .pbar .lab { position:absolute; top:0; left:9px; line-height:30px; font-size:12.5px; font-weight:700; color:#04121f; white-space:nowrap; }
  .pbar .lab.r{ color:var(--txt); }
  .pdense > i { background:linear-gradient(90deg,#ff6b6b,#c0392b); width:100%; }
  .psparse > i { background:linear-gradient(90deg,var(--good),#1f9e63); }
  .pnote { font-size:11.5px; color:var(--mut); margin-top:7px; }
  .bigx { color:var(--good); font-weight:800; }
  .telos { background:#0b0f14; border:1px solid var(--cool); border-radius:11px; padding:11px 13px; margin:0 24px 22px; font-size:13px; max-width:1200px; color:#cdd9e4; }
  .telos b{ color:var(--cool); }
  /* language toggle */
  .langtoggle{ position:fixed; top:12px; right:14px; z-index:50; display:flex; gap:4px; }
  .langtoggle .lt{ background:#1b2530; border:1px solid var(--line); color:var(--mut); padding:5px 11px;
        border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; }
  .langtoggle .lt.active{ background:var(--acc); color:#04121f; }
</style>
</head>
<body>
<div class="langtoggle">
  <button id="lang-en" class="lt active" onclick="setLang('en')">EN</button>
  <button id="lang-zh" class="lt" onclick="setLang('zh')">中</button>
</div>
<header>
  <div class="brand" data-i18n="brand"></div>
  <h1><span data-i18n-html="h1"></span></h1>
  <div class="sub" data-i18n-html="sub"></div>
</header>

<div class="honest" data-i18n-html="honest"></div>

<div class="telos" data-i18n-html="telos"></div>

<div class="wrap">
  <div class="card left">
    <div class="row">
      <button id="learn" class="good" data-i18n="btnLearn"></button>
    </div>
    <div class="row">
      <button id="play" disabled data-i18n="btnPlay"></button>
      <button id="pause" class="sec" disabled data-i18n="btnPause"></button>
      <button id="reset" class="sec" data-i18n="btnReset"></button>
    </div>
    <canvas id="gait" width="412" height="200"></canvas>
    <div class="pillrow">
      <div class="pill"><span data-i18n="pillCad"></span> <b id="cad">—</b><span class="stat" data-i18n="pillCadUnit"></span></div>
      <div class="pill"><span data-i18n="pillVar"></span> <b id="varv">—</b></div>
      <div class="pill"><span data-i18n="pillBase"></span> <b id="basev" class="ok"></b></div>
    </div>
    <div class="stat" style="margin-top:11px"><span data-i18n="surpriseLine"></span><span id="slbl" class="ok"></span></div>
    <div class="meter"><i id="sfill"></i></div>
    <div class="stat" id="live" style="margin-top:9px"></div>

    <div class="power">
      <h3 data-i18n-html="powerTitle"></h3>
      <div class="pbar pdense"><i></i><span class="lab" data-i18n-html="powerDense"></span></div>
      <div class="pbar psparse"><i id="spbar"></i><span class="lab r" id="splab" data-i18n-html="powerSparse"></span></div>
      <div class="pnote">
        <span data-i18n-html="powerNote"></span><br>
        <span data-i18n-html="powerBattery"></span>
        <span id="dutylab" class="stat"></span>
      </div>
    </div>
  </div>

  <div class="card right">
    <div class="row">
      <b style="font-size:15px" data-i18n="ledgerH"></b>
      <span class="stat" id="memstat"></span>
      <button id="newshoes" class="warn" style="margin-left:auto" disabled data-i18n="btnNewShoes"></button>
    </div>
    <div class="row">
      <button id="genall" class="sec" disabled data-i18n="btnGenAll"></button>
      <button id="audit" class="sec" disabled data-i18n="btnAudit"></button>
    </div>
    <div id="evlist"></div>
    <div id="reportbox"></div>
    <div id="auditbox"></div>

    <div class="moat" data-i18n-html="moat"></div>
  </div>
</div>

let LANG = (function(){ try{ return localStorage.getItem('msEraLang') || ((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en'); }catch(e){ return 'en'; } })();

// ───────── HDC core (pure ±1 VSA, verified lineage) ─────────
const D = 8000;
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function strSeed(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
const _cb=new Map();
function itemHV(key){ if(_cb.has(key)) return _cb.get(key);
  const rng=mulberry32(strSeed(key)), v=new Float32Array(D);
  for(let i=0;i<D;i++) v[i]=rng()<0.5?-1:1; _cb.set(key,v); return v; }
function bind(a,b){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=a[i]*b[i]; return o; }
function cos(a,b){ let d=0,na=0,nb=0; for(let i=0;i<D;i++){ d+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-9); }

// ── encode a gait window into an HV ──────────────────────────────────────────
// We encode PHASE-INVARIANT gait FEATURES (cadence + step-to-step variability +
// amplitude envelope), bound to feature-keys, then sign-bundle. Encoding raw
// samples by absolute position would make surprise dominated by where in the
// step cycle the window happened to start (incidental phase), not by the actual
// decline signal. Feature encoding makes surprise track cadence-slowing /
// variability-rising — the real fall precursor. (encoding = apparatus.)
const NPOS = 30;                       // samples per gait window (≈1s @30Hz)
const NLEV = 24;                       // quantization levels per feature
const SPREAD = 5;                       // thermometer half-width: adjacent levels overlap → smooth surprise
function levHV(name,q){ return itemHV("lev:"+name+":"+q); }     // per-feature level codebook
// graded "thermometer" level: bind a continuous feature to a weighted bundle of
// neighboring level-HVs. Adjacent feature values share most levels → cosine moves
// smoothly (a slightly slower gait is slightly surprising, not catastrophically),
// which also kills quantization-edge jitter on short noisy windows.
function levelBundle(name, x, lo, hi, acc){
  const u = Math.max(0,Math.min(1,(x-lo)/(hi-lo)));
  const center = u*(NLEV-1);
  for(let q=0;q<NLEV;q++){
    const w = Math.max(0, 1 - Math.abs(q-center)/SPREAD);   // triangular window
    if(w>0){ const h=levHV(name,q); for(let i=0;i<D;i++) acc[i]+=w*h[i]; }
  }
}
// extract phase-invariant features from a raw window
function gaitFeatures(win){
  const n=win.length;
  // dominant step frequency via zero-crossing rate of the (mean-removed) signal
  let mean=0; for(const v of win) mean+=v; mean/=n;
  let zc=0; for(let i=1;i<n;i++){ if((win[i-1]-mean)*(win[i]-mean)<0) zc++; }
  const cad = zc;                                         // ~ proportional to cadence
  // step-to-step variability: std of successive differences
  let md=0,vd=0,cnt=0; const diffs=[];
  for(let i=1;i<n;i++){ const d=Math.abs(win[i]-win[i-1]); diffs.push(d); md+=d; cnt++; }
  md/=cnt; for(const d of diffs) vd+=(d-md)*(d-md); const vstd=Math.sqrt(vd/cnt);
  // amplitude envelope (peak-to-peak)
  let mn=1e9,mx=-1e9; for(const v of win){ if(v<mn)mn=v; if(v>mx)mx=v; }
  const amp = mx-mn;
  return {cad, vstd, amp};
}
function encodeGait(win){               // win: array of floats in [-1,1]
  const f=gaitFeatures(win);
  // bundle graded feature levels (robust, smooth, phase-invariant)
  const acc=new Float32Array(D);
  levelBundle("cad", f.cad,  4,   22,  acc);
  levelBundle("var", f.vstd, 0.02, 0.55, acc);
  levelBundle("amp", f.amp,  1.0,  2.6,  acc);
  // sign-bundle → ±1 HV (deterministic; ties→+1)
  const out=new Float32Array(D); for(let i=0;i<D;i++) out[i]= acc[i]>=0?1:-1; return out;
}

// ── event ledger: M = Σ bind(eventType, timeKey) ; forget = exact subtraction ──
// EVENT TYPE IDs are LANGUAGE-INDEPENDENT HV keys (byte-identical across languages,
// so the stored vectors never change). Display names come from t('etypeDecline'|'etypeFall').
const ETYPE_DECLINE = "decline-gait-change";   // HV identity (was "衰退-步态变化")
const ETYPE_FALL    = "fall";                  // HV identity (was "跌倒")
const ETYPES=[ETYPE_DECLINE, ETYPE_FALL];
function etypeName(id){ return id===ETYPE_FALL ? t('etypeFall') : t('etypeDecline'); }
function eventHV(etype,tkey){ return bind(itemHV("evt:"+etype), itemHV("t:"+tkey)); }
let M=new Float32Array(D);
function addEvent(etype,tkey){ const h=eventHV(etype,tkey); for(let i=0;i<D;i++) M[i]+=h[i]; }
function subEvent(etype,tkey){ const h=eventHV(etype,tkey); for(let i=0;i<D;i++) M[i]-=h[i]; }
function recallEvent(tkey){             // unbind time → recover event type (deterministic proof it's in M)
  const probe=bind(M, itemHV("t:"+tkey));
  let best=null,bs=-2; for(const e of ETYPES){ const s=cos(probe, itemHV("evt:"+e)); if(s>bs){bs=s;best=e;} }
  return {type:best, s:bs};
}

// ───────── gait simulation (animated cadence waveform) ─────────
const cv=document.getElementById("gait"), ctx=cv.getContext("2d");
const W=cv.width, H=cv.height, MID=H/2;
const $=id=>document.getElementById(id);

let baseline=null;                 // learned normal gait HV ("Maria_normal")
let baseCad=0, baseVar=0;          // displayed baseline stats
let phase=0, playing=false, timer=null;
let week=0, frame=0;               // timeline progress
let surprise=0, lastDecl=-999, fallAt=-1, fallDone=false;
let events=[];                     // ledger entries {type,tkey,time,s,removed}
let sampleBuf=[];                  // rolling raw samples for the encode window
let trace=[];                      // visible waveform points
const TIMELINE_FRAMES=900;         // ~ "several weeks" compressed
const FALL_FRAME=560;              // scripted real fall (sharp spike)

// gait params evolve over the timeline: cadence slows, variability rises (decline precursor)
function progress(){ return Math.min(1, frame/TIMELINE_FRAMES); }
function curCadence(){ // steps/min: starts ~108, declines toward ~78
  if(!playing && !baseline) return 108;
  return 108 - 30*progress();
}
function curVariability(){ return 0.04 + 0.30*progress(); } // step-to-step variability grows

// one gait sample: near-sinusoidal step signal + variability noise + optional fall spike
function gaitSample(f, cadence, variability){
  const stepHz = cadence/60;                 // steps per second
  const dt = 1/30;                            // 30 fps
  phase += 2*Math.PI*stepHz*dt;
  // base waveform: skewed sine = heel-strike / swing
  let v = Math.sin(phase) + 0.25*Math.sin(2*phase);
  v *= 0.7;
  // step-to-step variability (random amplitude + timing jitter)
  const jr = mulberry32((f*2654435761)>>>0);
  v += (jr()-0.5)*2*variability;
  // scripted FALL: sharp spike then flatline-ish
  if(fallAt>=0 && f>=fallAt && f<fallAt+10){
    const k=(f-fallAt);
    v += (k<3? 2.6 : (k<6? -2.2 : 0.0)) ;     // violent spike then collapse
  }
  return Math.max(-1.3, Math.min(1.3, v));
}

function pushSample(s){
  sampleBuf.push(s); if(sampleBuf.length>NPOS) sampleBuf.shift();
  trace.push(s); if(trace.length>W) trace.shift();
}

function learnNormal(){
  // collect a clean window at the healthy cadence and bind it as Maria_normal
  const win=[]; let ph=0; const stepHz=108/60, dt=1/30;
  const jr=mulberry32(strSeed("Maria_normal_seed"));
  for(let p=0;p<NPOS;p++){ ph+=2*Math.PI*stepHz*dt;
    let v=(Math.sin(ph)+0.25*Math.sin(2*ph))*0.7 + (jr()-0.5)*2*0.04;
    win.push(Math.max(-1,Math.min(1,v))); }
  baseline=encodeGait(win);
  baseCad=108; baseVar=0.04;
  $("basev").textContent=t('baseLearned'); $("basev").className="ok";
  $("play").disabled=false; $("newshoes").disabled=false;
  spEMA=0; setSurprise(0,t('lblCalm'));
  $("cad").textContent="108"; $("varv").textContent="0.04";
  $("live").innerHTML=t('liveAfterLearn');
  // seed the rolling trace so canvas isn't empty
  sampleBuf=[...win]; trace=[]; for(let p=0;p<NPOS;p++) trace.push(win[p]);
  drawFrame();
}

function setSurprise(v,label){ surprise=v; $("sfill").style.width=Math.min(100,v*100)+"%";
  const l=$("slbl"); l.textContent=label; l.className = v>0.55?"bad":(v>0.28?"wn":"ok"); }

const DECL_TH=0.42;                 // soft "decline rising" alert threshold (well above healthy ~0.07)
let spEMA=0;                        // smoothed surprise (the meter reads the trend, not per-step jitter)
function curSurprise(){
  if(!baseline || sampleBuf.length<NPOS) return 0;
  const hv=encodeGait(sampleBuf);
  return Math.max(0, 1 - cos(hv, baseline));
}

function step(){
  frame++;
  const cad=curCadence(), variability=curVariability();
  const s=gaitSample(frame, cad, variability);
  pushSample(s);
  // update stats
  $("cad").textContent=cad.toFixed(0);
  $("varv").textContent=variability.toFixed(2);
  // surprise from deviation vs learned normal, smoothed (EMA) so the trend reads clearly
  const raw=curSurprise();
  spEMA = spEMA + 0.12*(raw - spEMA);
  let sp=spEMA;
  // amplify the fall window into a sharp surprise spike (instant, not smoothed)
  const inFall = (fallAt>=0 && frame>=fallAt && frame<fallAt+10);
  if(inFall) sp=Math.max(raw, 0.92);
  setSurprise(sp, sp>0.55?(inFall?t('lblFall'):t('lblDeclineRising')):(sp>DECL_TH?t('lblDriftWatch'):t('lblCalm')));

  // ── surprise router fires (the ONLY moments power is spent writing) ──
  // WARMUP: skip the first ~1 week while the rolling buffer + EMA settle (no false decline at t≈0).
  const WARMUP=70;
  if(inFall && !fallDone){ logEvent(ETYPE_FALL, sp); fallDone=true; lastDecl=frame; }
  else if(sp>DECL_TH && !inFall && frame>WARMUP && frame-lastDecl>120){ logEvent(ETYPE_DECLINE, sp); lastDecl=frame; }

  drawFrame();
  updateDuty();
  if(frame>=TIMELINE_FRAMES){ pause();
    $("live").innerHTML=t('liveTimelineEnd'); }
}

function logEvent(etype, sp){
  const wk=(frame/TIMELINE_FRAMES*6).toFixed(1);      // map timeline → ~6 weeks
  const tkey=String(frame);
  const ev={ type:etype, tkey, week:wk, s:sp, removed:false };
  events.push(ev); addEvent(etype, tkey);
  renderEvents();
  const timeStr=t('weekLabel')(wk);
  if(etype===ETYPE_FALL){
    $("live").innerHTML=t('liveFall')(sp.toFixed(2), timeStr);
  } else {
    $("live").innerHTML=t('liveDecline')(sp.toFixed(2), timeStr);
  }
}

// ───────── canvas ─────────
function drawFrame(){
  ctx.fillStyle="#11161c"; ctx.fillRect(0,0,W,H);
  // mid line + grid
  ctx.strokeStyle="#222d38"; ctx.lineWidth=1;
  for(let y=MID-60;y<=MID+60;y+=30){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle="#33424f"; ctx.beginPath(); ctx.moveTo(0,MID); ctx.lineTo(W,MID); ctx.stroke();
  // surprise-tinted waveform
  const tint = surprise>0.55? "#ff6b6b" : (surprise>0.28? "#f4c152" : "#3fdf8f");
  ctx.strokeStyle=tint; ctx.lineWidth=2; ctx.beginPath();
  for(let i=0;i<trace.length;i++){ const x=i, y=MID - trace[i]*55;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
  ctx.stroke();
  // label
  ctx.fillStyle="#8da2b5"; ctx.font="11px ui-monospace,monospace"; ctx.textAlign="left";
  ctx.fillText(baseline? t('canvasGait') : t('canvasUnlearned'), 8, 16);
  if(playing||frame>0){ ctx.textAlign="right"; ctx.fillText(t('canvasTimeline')(Math.round(progress()*100), (progress()*6).toFixed(1)), W-8, 16); }
}

// ───────── power / duty-cycle live note ─────────
function updateDuty(){
  // sparse path power scales with how often we write (event density) — but stays ~µW; show duty
  $("spbar").style.width = (1.6/587*100*8+6)+"%";   // visually small but visible (exaggerated for legibility, labeled)
  $("dutylab").textContent = events.length? t('dutyNote')(events.length) : "";
}

// ───────── ledger UI ─────────
function renderEvents(){
  const live=events.filter(e=>!e.removed);
  $("memstat").textContent = live.length? t('memFull')(live.length) : t('memEmpty');
  const has=live.length>0;
  $("genall").disabled=!has; $("audit").disabled=!has;
  const el=$("evlist");
  if(!events.length){ el.innerHTML='<div class="stat">'+t('evInitShort')+'</div>'; return; }
  el.innerHTML=events.map((e,i)=>{
    const ename=etypeName(e.type);
    const timeStr=t('weekLabel')(e.week);
    if(e.removed) return `<div class="ev"><span class="stat">${t('evRemoved')(ename,timeStr)}</span></div>`;
    const isFall=e.type===ETYPE_FALL;
    return `<div class="ev ${isFall?'flash':'soft'}">
      <div class="top"><span class="etag ${isFall?'fall':'decl'}">${isFall?t('tagFall'):t('tagDecline')}</span>
        <span class="${isFall?'bad':'wn'}">${ename}</span><span class="etime">${timeStr} · ${t('evSurprise')(e.s.toFixed(2))}</span></div>
      <div class="evbtns">
        <button class="sec" onclick="proveIn(${i})">${t('btnProve')}</button>
        <button class="hot" onclick="markFalse(${i})">${t('btnMarkFalse')}</button></div>
      <div class="audit" id="aud${i}"></div></div>`;
  }).join("");
}
window.proveIn=(i)=>{ const e=events[i]; const r=recallEvent(e.tkey);
  $("aud"+i).textContent=t('proveLine')(etypeName(r.type), r.s.toFixed(3)); };
window.markFalse=(i)=>{ const e=events[i]; if(e.removed) return; subEvent(e.type,e.tkey); e.removed=true; renderEvents();
  const r=recallEvent(e.tkey);
  $("live").innerHTML=t('liveFalseRemoved')(etypeName(e.type), t('weekLabel')(e.week), r.s.toFixed(3)); };

// ───────── editable baseline: new shoes → re-learn normal ─────────
$("newshoes").onclick=()=>{
  // re-learn baseline at the CURRENT cadence/variability (the "new normal" after new shoes)
  const cad=curCadence(), variability=Math.min(0.10, curVariability());  // shoes change feel, not decline
  const win=[]; let ph=0; const stepHz=cad/60, dt=1/30;
  const jr=mulberry32(strSeed("Maria_newshoes_"+frame));
  for(let p=0;p<NPOS;p++){ ph+=2*Math.PI*stepHz*dt;
    let v=(Math.sin(ph)+0.25*Math.sin(2*ph))*0.7 + (jr()-0.5)*2*0.05;
    win.push(Math.max(-1,Math.min(1,v))); }
  baseline=encodeGait(win); baseCad=cad; baseVar=variability;
  $("basev").textContent=t('baseLearnedShoes'); $("basev").className="ok";
  spEMA=0; setSurprise(0,t('lblCalmReset'));
  $("live").innerHTML=t('liveNewShoes');
};

$("audit").onclick=()=>{
  const live=events.filter(e=>!e.removed);
  let out=t('auditHead')+"\n", allsame=true;
  for(const e of live){ const a=recallEvent(e.tkey).s, b=recallEvent(e.tkey).s; const same=(a===b); allsame=allsame&&same;
    out+=t('auditLine')(etypeName(e.type), t('weekLabel')(e.week), a.toFixed(6), b.toFixed(6), same)+"\n"; }
  out+= live.length? t('auditVerdict')(allsame) : t('auditNone');
  $("auditbox").innerHTML=`<div class="report">${out}</div>`;
};

// ───────── controls ─────────
function play(){ if(playing || !baseline) return; playing=true;
  $("play").disabled=true; $("pause").disabled=false; timer=setInterval(step,33); }
function pause(){ playing=false; $("play").disabled=!baseline; $("pause").disabled=true; if(timer){clearInterval(timer);timer=null;} }
function reset(){
  pause(); baseline=null; phase=0; frame=0; week=0; surprise=0; spEMA=0; lastDecl=-999;
  fallAt=FALL_FRAME; fallDone=false; events=[]; sampleBuf=[]; trace=[]; M=new Float32Array(D);
  $("basev").textContent=t('baseUnlearned'); $("basev").className="ok";
  $("cad").textContent="—"; $("varv").textContent="—";
  $("play").disabled=true; $("newshoes").disabled=true;
  $("reportbox").innerHTML=""; $("auditbox").innerHTML="";
  setSurprise(0,t('lblNotLearned')); $("slbl").className="ok";
  renderEvents(); updateDuty(); drawFrame();
  $("live").innerHTML=t('liveReset');
}
$("learn").onclick=()=>{ if(!baseline){ fallAt=FALL_FRAME; fallDone=false; } learnNormal(); };
$("play").onclick=play;
$("pause").onclick=pause;
$("reset").onclick=reset;

// repaint all dynamic text in the current language, preserving demo state
function repaintDynamic(){
  // baseline label
  if(!baseline){ $("basev").textContent=t('baseUnlearned'); }
  // surprise label re-derive from current surprise value
  let lbl;
  if(!baseline) lbl=t('lblNotLearned');
  else if(surprise>0.55) lbl=t('lblDeclineRising');   // (fall window is transient; trend label is the stable read)
  else if(surprise>DECL_TH) lbl=t('lblDriftWatch');
  else lbl=t('lblCalm');
  setSurprise(surprise, lbl);
  renderEvents(); updateDuty(); drawFrame();
  // re-render any open report/audit boxes is non-trivial; live line shows current-lang init if empty
  if(!events.length && !baseline){ $("live").innerHTML=t('liveReset'); }
}

applyStatic();
reset();
</script>
