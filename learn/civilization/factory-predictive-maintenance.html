<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Factory Predictive Maintenance · change is the signal (Millisecond Era)</title>
<style>
  :root { --bg:#0b0f14; --card:#141a21; --line:#283541; --txt:#e9f0f6; --mut:#8da2b5;
          --acc:#36a3ff; --good:#3fdf8f; --warn:#f4c152; --hot:#ff6b6b; --cool:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif; }
  header { padding:18px 24px 14px; border-bottom:1px solid var(--line); }
  .brand { color:var(--mut); font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
  h1 { margin:6px 0 0; font-size:21px; font-weight:800; } h1 span{ color:var(--acc); }
  .sub { color:var(--mut); font-size:13px; margin-top:6px; max-width:1120px; }
  .wrap { display:flex; gap:18px; padding:18px 24px; flex-wrap:wrap; align-items:flex-start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:13px; padding:15px; }
  .left { width:520px; } .right{ flex:1; min-width:360px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  button { background:var(--acc); color:#04121f; border:0; border-radius:9px; padding:9px 14px;
        font-size:14px; cursor:pointer; font-weight:700; }
  button.sec { background:#1b2530; border:1px solid var(--line); color:var(--txt); font-weight:600; }
  button.hot { background:var(--hot); color:#1c0606; } button.warn{ background:var(--warn); color:#1c1300; }
  button.good{ background:var(--good); color:#04210f; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  canvas#spec { width:100%; background:#11161c; border:1px solid var(--line); border-radius:10px; display:block; }
  .stat { color:var(--mut); font-size:12px; }
  .ok{ color:var(--good); } .bad{ color:var(--hot); } .wn{ color:var(--warn); }
  .meter { height:14px; border-radius:7px; background:#1b2530; overflow:hidden; margin-top:5px; }
  .meter > i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--good),var(--warn),var(--hot)); transition:width .12s; }
  .gauges { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
  .gauge { flex:1; min-width:130px; background:#0b0f14; border:1px solid var(--line); border-radius:10px; padding:9px 11px; }
  .gauge .k{ color:var(--mut); font-size:11px; } .gauge .v{ font-size:18px; font-weight:800; margin-top:2px; }
  .panel-h { font-size:15px; font-weight:800; }
  .alert { border:1px solid var(--line); border-radius:11px; padding:12px 13px; margin-bottom:11px; background:#0b0f14; }
  .alert.fire { border-color:var(--hot); box-shadow:0 0 0 2px rgba(255,107,107,.22); background:#1a0d0e; }
  .alert .top { display:flex; gap:9px; align-items:center; margin-bottom:6px; }
  .badge { font-weight:800; font-size:12px; letter-spacing:.5px; padding:2px 9px; border-radius:5px;
        background:linear-gradient(#b3261e,#7a160f); color:#fff; }
  .badge.ok{ background:linear-gradient(#1b7f4a,#0d5a31); }
  .when{ color:var(--mut); font-size:12px; margin-left:auto; }
  .report { white-space:pre-wrap; background:#0b0f14; border:1px solid var(--line); border-radius:9px; padding:11px;
        font:12.5px/1.5 ui-monospace,Menlo,monospace; color:#cfe3f5; margin-top:8px; max-height:230px; overflow:auto; }
  .moat { background:#0b0f14; border:1px solid var(--good); border-radius:11px; padding:11px 13px; margin-top:12px; font-size:13px; }
  .moat b{ color:var(--good); }
  .honest { background:#141a21; border:1px dashed var(--warn); border-radius:11px;
        padding:12px 14px; margin:0 24px 18px; font-size:12.5px; color:#cdd9e4; max-width:1200px; }
  .honest b{ color:var(--warn); } code{ background:#1b2530; padding:1px 6px; border-radius:5px; font-size:12px; }
  .audit { font:12px/1.5 ui-monospace,Menlo,monospace; color:var(--mut); white-space:pre-wrap; }
  .slider { width:100%; accent-color:var(--cool); }
  .legend{ display:flex; gap:14px; font-size:11.5px; color:var(--mut); margin-top:6px; flex-wrap:wrap; }
  .legend i{ display:inline-block; width:11px; height:11px; border-radius:2px; vertical-align:middle; margin-right:4px; }
  .cf { border-top:1px dashed var(--line); margin-top:13px; padding-top:12px; }
  .cf h3{ margin:0 0 7px; font-size:14px; } .cf h3 b{ color:var(--cool); }
  /* language toggle */
  .langtoggle{ position:fixed; top:12px; right:14px; z-index:50; display:flex; gap:4px; }
  .langtoggle .lt{ background:#1b2530; border:1px solid var(--line); color:var(--mut); padding:5px 11px;
        border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; }
  .langtoggle .lt.active{ background:var(--acc); color:#04121f; }
</style>
</head>
<body>
<div class="langtoggle">
  <button id="lang-en" class="lt active" onclick="setLang('en')">EN</button>
  <button id="lang-zh" class="lt" onclick="setLang('zh')">中</button>
</div>
<header>
  <div class="brand" data-i18n="brand"></div>
  <h1><span data-i18n="h1"></span></h1>
  <div class="sub" data-i18n-html="sub"></div>
</header>

<div class="honest" data-i18n-html="honest"></div>

<div class="wrap">
  <!-- LEFT: live spectrum + surprise -->
  <div class="card left">
    <div class="row">
      <button id="learn" class="good" data-i18n="btnLearn"></button>
      <button id="run" disabled data-i18n="btnRun"></button>
      <button id="pause" class="sec" disabled data-i18n="btnPause"></button>
      <button id="reset" class="sec" data-i18n="btnReset"></button>
    </div>
    <canvas id="spec" width="500" height="270"></canvas>
    <div class="legend">
      <span><i style="background:#2c3a47"></i><span data-i18n="legCur"></span></span>
      <span><i style="background:#3fdf8f"></i><span data-i18n="legBase"></span></span>
      <span><i style="background:#ff6b6b"></i><span data-i18n="legFault"></span></span>
    </div>

    <div class="stat" style="margin-top:11px"><span data-i18n-html="surpriseLine"></span>
      <span id="slbl" class="ok"></span></div>
    <div class="meter"><i id="sfill"></i></div>

    <div class="gauges">
      <div class="gauge"><div class="k" data-i18n="gHrs"></div><div class="v" id="ghrs">0 h</div></div>
      <div class="gauge"><div class="k" data-i18n="gLoad"></div><div class="v" id="gload">100%</div></div>
      <div class="gauge"><div class="k" data-i18n="gSurp"></div><div class="v" id="gsurp">—</div></div>
      <div class="gauge"><div class="k" data-i18n="gRul"></div><div class="v" id="grul">—</div></div>
    </div>

    <div class="cf">
      <h3 data-i18n-html="cfTitle"></h3>
      <div class="row">
        <span class="stat" style="width:70px" data-i18n="loadLbl"></span>
        <input id="loadSlider" class="slider" type="range" min="60" max="100" value="100" step="5">
        <span id="loadVal" style="font-weight:800;width:52px;text-align:right">100%</span>
      </div>
      <div class="stat" id="cfNote"></div>
    </div>
  </div>

  <!-- RIGHT: baseline memory + alerts -->
  <div class="card right">
    <div class="row">
      <span class="panel-h" data-i18n="panelH"></span>
      <span class="stat" id="memstat" style="margin-left:auto"></span>
    </div>

    <div class="alert" id="baseCard">
      <div class="top"><span class="badge ok" id="baseBadge"></span>
        <b id="baseName"></b><span class="when" id="baseWhen"></span></div>
      <div class="stat" id="baseTxt"></div>
    </div>

    <div class="row">
      <button id="replace" class="warn" disabled data-i18n="btnReplace"></button>
      <button id="report" class="sec" disabled data-i18n="btnReport"></button>
      <button id="audit" class="sec" disabled data-i18n="btnAudit"></button>
    </div>

    <div id="alertlist"></div>
    <div id="reportbox"></div>
    <div id="auditbox"></div>

    <div class="moat" data-i18n-html="moat"></div>
  </div>
</div>

    repTrigger: (s,th)=>`触发：预测残差 1−cos = ${s} > 阈值 ${th} (变化触发，非绝对幅值)`,
    repAnomaly: (bin)=>`异常：轴承外圈谐波 BPFO(第 ${bin} 阶) 持续增长`,
    repLoad: (l)=>`当前负载：${l}%`,
    repRul: (txt)=>`预估剩余寿命：${txt}`,
    repAction: "建议动作：排期更换轴承 NU-308；可临时降载延缓(见反事实)",
    repNote1: "说明：本工单在车间边缘节点(太阳能供电)本地生成，频谱不上云；",
    repNote2: "是否派工/停机由 Rita(厂长)决定 —— 无自动停机。",
    reportFoot: "这份工单在你手里，本机留存。要派才派 —— 没有自动停机。",
    auditOut: (a,b,same,bitsame,verdict)=>`确定性自检(同一查询跑两遍，逐位比较)：
  surprise(残差)  ${a} == ${b}   ${same?"✓":"✗"}
  unbind(M,机器ID)→基线指纹  逐位一致  ${bitsame?"✓":"✗"}

结论：${verdict}`,
    auditPass: "全部比特一致 ✓ —— 同一频谱每次得到同一残差，基线可从 M 精确还原，可审计复核。",
    auditFail: "出现不一致 ✗",
    moat: "<b>现场可见的护城河：</b>太阳能边缘自治(µW、无 IT、无云订阅) · <b>变化触发</b>(预测残差，绝对阈值会在负载变化时狂误报) · <b>现场可编辑基线</b>(换完轴承一键重学，不回厂) · 端上私有(频谱不上云) · <b>反事实 what-if</b>(降载看时间线右移，零重训)。<br>解放谁：Rita —— 印度一家中型纺织厂的厂长(150 台织机，停机一天约 $2,000)；以及车间里的工人(机器突然爆裂会伤人)。全球 10 亿+ 工厂工人。",
    machineMemH: "织机"
  }
};
let LANG = (function(){ try{ return localStorage.getItem('msEraLang') || ((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en'); }catch(e){ return 'en'; } })();
function t(k){ return I18N[LANG][k]; }
function applyStatic(){
  document.getElementById('htmlRoot').lang = LANG;
  document.title = t('docTitle');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18n]; if(typeof v==='string') el.textContent=v; });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18nHtml]; if(typeof v==='string') el.innerHTML=v; });
}
function setLang(l){
  if(l!==LANG){ LANG=l; try{ localStorage.setItem('msEraLang',l); }catch(e){} }
  document.getElementById('lang-en').classList.toggle('active', l==='en');
  document.getElementById('lang-zh').classList.toggle('active', l==='zh');
  applyStatic(); repaintDynamic();
}

// ───────── HDC core (pure ±1 VSA, verified lineage) ─────────
const D = 8000;
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function strSeed(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
const _cb=new Map();
function itemHV(key){ if(_cb.has(key)) return _cb.get(key);
  const rng=mulberry32(strSeed(key)), v=new Float32Array(D);
  for(let i=0;i<D;i++) v[i]=rng()<0.5?-1:1; _cb.set(key,v); return v; }
function bind(a,b){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=a[i]*b[i]; return o; }
function cos(a,b){ let d=0,na=0,nb=0; for(let i=0;i<D;i++){ d+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-9); }

// ── encode a spectrum (NBINS magnitudes) into one HV ──
const NBINS = 24, NLEV = 64;
const _LO = itemHV("levanchor:lo"), _HI = itemHV("levanchor:hi");
const _levCache = new Map();
function levelHV(mag){
  const q = Math.round(Math.max(0,Math.min(1,mag))*NLEV);
  if(_levCache.has(q)) return _levCache.get(q);
  const order = itemHV("levperm");
  const idx = Array.from({length:D}, (_,i)=>i)
    .sort((a,b)=> (order[a]!==order[b]? order[a]-order[b] : a-b));
  const nHi = Math.round(D * q / NLEV);
  const v = new Float32Array(D);
  for(let i=0;i<D;i++) v[i]=_LO[i];
  for(let i=0;i<nHi;i++) v[idx[i]]=_HI[idx[i]];
  _levCache.set(q, v); return v;
}
function encodeSpectrum(spec){
  const acc=new Float32Array(D);
  for(let b=0;b<spec.length;b++){
    const f=bind(itemHV("bin:"+b), levelHV(spec[b]));
    for(let i=0;i<D;i++) acc[i]+=f[i];
  }
  const hv=new Float32Array(D);
  for(let i=0;i<D;i++) hv[i]= acc[i]>=0 ? 1 : -1;
  return hv;
}
// machine memory: M = bind(machineID, baselineFingerprint).  NOTE: MACHINE_ID is an
// internal HV key — language-independent on purpose, so the vectors never change.
const MACHINE_ID = "machine#L-07/NU-308";
let M = null;
let baselineSpec = null;
function storeBaseline(spec){
  baselineSpec = spec.slice();
  const fp = encodeSpectrum(spec);
  M = bind(itemHV("machine:"+MACHINE_ID), fp);
}
function recallBaselineFP(){
  return bind(M, itemHV("machine:"+MACHINE_ID));
}
function surpriseOf(spec){
  if(!M) return 0;
  const cur = encodeSpectrum(spec);
  return 1 - cos(cur, recallBaselineFP());
}

// ───────── physical model ─────────
const BASE_PEAKS = [ {bin:2,amp:0.62}, {bin:5,amp:0.40}, {bin:9,amp:0.30}, {bin:14,amp:0.22} ];
const FAULT_BIN  = 7;
const ALERT_TH = 0.06, WARN_TH = 0.025;
let opHours=0, degr=0, loadPct=100, running=false, learned=false, alerted=false;
let surprise=0, timer=null, alerts=[], baselineLearnedAt=null;

function growthRate(){ const L=loadPct/100; return 0.0019 * Math.pow(L,2.5); }

function currentSpectrum(forDegr){
  const dg = (forDegr===undefined)? degr : forDegr;
  const spec=new Float32Array(NBINS);
  for(let b=0;b<NBINS;b++) spec[b]=0.05 + 0.03*Math.abs(Math.sin(b*1.7+0.3));
  for(const p of BASE_PEAKS){ spec[p.bin]=Math.max(spec[p.bin], p.amp + 0.015*Math.sin(opHours*0.3+p.bin)); }
  const fault = Math.min(0.95, dg);
  spec[FAULT_BIN]   = Math.max(spec[FAULT_BIN],   fault);
  spec[FAULT_BIN-1] = Math.max(spec[FAULT_BIN-1], fault*0.45);
  spec[FAULT_BIN+1] = Math.max(spec[FAULT_BIN+1], fault*0.45);
  spec[FAULT_BIN+7] = Math.max(spec[FAULT_BIN+7], fault*0.30);
  return spec;
}

function estimateRUL(atLoad){
  if(degr<=0.02) return null;
  const L=(atLoad===undefined?loadPct:atLoad)/100;
  const rate = 0.0019*Math.pow(L,2.5);
  const remaining = Math.max(0, 0.92 - degr);
  const hrs = rate>1e-9 ? remaining/rate : Infinity;
  const days = hrs/24;
  return {hrs, days};
}

// ───────── chart ─────────
const cv=document.getElementById("spec"), ctx=cv.getContext("2d");
const CW=cv.width, CH=cv.height, PADL=34, PADB=26, PADT=14, PADR=12;
function plotX(b){ return PADL + (CW-PADL-PADR)*(b/(NBINS-1)); }
function plotY(v){ return CH-PADB - (CH-PADB-PADT)*Math.min(1,v); }
function drawChart(){
  ctx.fillStyle="#11161c"; ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle="#212c36"; ctx.lineWidth=1; ctx.fillStyle="#6f8499"; ctx.font="10px sans-serif";
  ctx.textAlign="right"; ctx.textBaseline="middle";
  for(let g=0;g<=4;g++){ const y=PADT+(CH-PADB-PADT)*g/4; const v=(1-g/4).toFixed(2);
    ctx.beginPath(); ctx.moveTo(PADL,y); ctx.lineTo(CW-PADR,y); ctx.stroke();
    ctx.fillText(v, PADL-5, y); }
  ctx.textAlign="center"; ctx.textBaseline="top";
  ctx.fillText(t('chartX'), (PADL+CW-PADR)/2, CH-13);
  const spec=currentSpectrum();
  const bw=(CW-PADL-PADR)/NBINS*0.66;
  if(baselineSpec){
    ctx.strokeStyle="#3fdf8f"; ctx.lineWidth=2; ctx.beginPath();
    for(let b=0;b<NBINS;b++){ const x=plotX(b), y=plotY(baselineSpec[b]); b?ctx.lineTo(x,y):ctx.moveTo(x,y); }
    ctx.stroke();
  }
  for(let b=0;b<NBINS;b++){
    const x=plotX(b), y=plotY(spec[b]);
    const isFault = (b===FAULT_BIN || b===FAULT_BIN-1 || b===FAULT_BIN+1 || b===FAULT_BIN+7);
    const grew = baselineSpec ? (spec[b]-baselineSpec[b]) : 0;
    ctx.fillStyle = (isFault && grew>0.05) ? "#ff6b6b" : "#2c3a47";
    ctx.fillRect(x-bw/2, y, bw, (CH-PADB)-y);
  }
  if(degr>0.12){
    const x=plotX(FAULT_BIN), y=plotY(currentSpectrum()[FAULT_BIN]);
    ctx.fillStyle="#ff6b6b"; ctx.font="10px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="bottom";
    ctx.fillText(t('chartFault'), x, y-3);
  }
}

// ───────── UI ─────────
const $=id=>document.getElementById(id);
function setSurprise(v){
  surprise=v;
  let pct=Math.min(100, Math.round(v/(ALERT_TH/0.62)*100));
  $("sfill").style.width=pct+"%";
  const l=$("slbl");
  if(!learned){ l.textContent=t('surpUnlearned'); l.className="ok"; }
  else if(v>ALERT_TH){ l.textContent=t('surpAlert'); l.className="bad"; }
  else if(v>WARN_TH){ l.textContent=t('surpWarn'); l.className="wn"; }
  else { l.textContent=t('surpHealthy'); l.className="ok"; }
  $("gsurp").textContent = learned ? v.toFixed(3) : "—";
  $("gsurp").className = "v "+(v>ALERT_TH?"bad":(v>WARN_TH?"wn":"ok"));
}
function machineDisp(){ return t('machineDisp'); }
function refreshMem(){
  $("memstat").textContent = M ? t('memFull')(machineDisp()) : t('memEmpty');
}
function refreshRUL(){
  const r=estimateRUL();
  $("grul").textContent = r ? (r.days>900? t('rul2y') : (r.days>=1? t('rulDays')(r.days.toFixed(0)) : t('rulHrs')(r.hrs.toFixed(0)))) : "—";
  $("grul").className = "v "+(r && r.days<30 ? "bad" : (r && r.days<90 ? "wn":"ok"));
}

function tick(){
  opHours += 1;
  degr += growthRate();
  const spec=currentSpectrum();
  const s = surpriseOf(spec);
  setSurprise(s);
  $("ghrs").textContent = opHours.toLocaleString()+" h";
  drawChart(); refreshRUL();
  if(learned && s>ALERT_TH && !alerted){ raiseAlert(s); alerted=true; }
  if(degr>=0.92){ pause(); failNow(); }
  if(opHours>2600){ pause(); }
}

function raiseAlert(s){
  const r=estimateRUL();
  const ev={ id:alerts.length+1, hours:opHours, surprise:s, degr:degr,
    days: r? r.days : null, faultBin:FAULT_BIN };
  alerts.push(ev); renderAlerts();
  $("report").disabled=false; $("audit").disabled=false;
}
function failNow(){
  $("slbl").textContent=t('failNow'); $("slbl").className="bad";
}

function renderAlerts(){
  const el=$("alertlist");
  if(!alerts.length){ el.innerHTML='<div class="stat">'+t('alertInit')+'</div>'; return; }
  el.innerHTML = alerts.map(a=>{
    const dtxt = a.days==null? t('estimating') : (a.days>=1? t('rulDays')(a.days.toFixed(0)) : t('rulHrs')((a.days*24).toFixed(0)));
    return `<div class="alert fire"><div class="top"><span class="badge">${t('alertBadge')}</span>
      <b>${t('alertTitle')(a.faultBin)}</b><span class="when">${t('alertWhen')(a.hours.toLocaleString())}</span></div>
      <div class="stat">${t('alertBody')(a.surprise.toFixed(3), ALERT_TH, dtxt)}</div>
      <div class="audit" id="aud${a.id}"></div></div>`; }).join("");
}

// ── controls ──
$("learn").onclick=()=>{
  degr = Math.max(degr, 0.0);
  const spec=currentSpectrum();
  storeBaseline(spec);
  learned=true; baselineLearnedAt=opHours;
  $("run").disabled=false; $("replace").disabled=false;
  $("baseBadge").textContent=t('badgeLearned'); $("baseBadge").className="badge ok";
  $("baseWhen").textContent=t('baseWhen')(opHours);
  $("baseTxt").innerHTML=t('baseTxtLearned')(D);
  setSurprise(surpriseOf(spec)); refreshMem(); drawChart();
};
$("run").onclick=()=>{ if(running||!learned) return; running=true;
  $("run").disabled=true; $("pause").disabled=false; $("learn").disabled=true;
  timer=setInterval(tick, 90); };
function pause(){ running=false; $("pause").disabled=true; if(timer){clearInterval(timer);timer=null;}
  if(learned && degr<0.92 && opHours<2600) $("run").disabled=false; }
$("pause").onclick=pause;

$("replace").onclick=()=>{
  pause();
  degr=0; alerted=false;
  const spec=currentSpectrum();
  storeBaseline(spec);
  const s=surpriseOf(spec); setSurprise(s);
  $("baseWhen").textContent=t('baseWhenRelearn')(opHours);
  $("baseTxt").innerHTML=t('baseTxtReplaced')(s.toFixed(3));
  if(alerts.length){ alerts.forEach(a=>a.resolved=true); }
  alerts=[]; renderAlerts(); $("report").disabled=true; $("audit").disabled=true;
  drawChart(); refreshMem(); refreshRUL();
  $("run").disabled=false;
};

// counterfactual load slider
$("loadSlider").oninput=()=>{
  loadPct=+$("loadSlider").value; $("loadVal").textContent=loadPct+"%"; $("gload").textContent=loadPct+"%";
  updateCfNote();
  refreshRUL();
};
function updateCfNote(){
  const now=estimateRUL(loadPct), full=estimateRUL(100);
  if(degr<=0.02 || !now || !full){
    $("cfNote").innerHTML = t('cfNotePre')(loadPct);
  } else {
    const gain = Math.max(0, now.days - full.days);
    $("cfNote").innerHTML = t('cfNoteLive')(loadPct, now.days.toFixed(0), full.days.toFixed(0), gain.toFixed(0));
  }
}

$("report").onclick=()=>{
  const a=alerts[0]; const r=estimateRUL();
  const lines=[ t('reportTitle'),
    t('repGen')(new Date().toLocaleString(LANG==='zh'?"zh-CN":"en-US")),
    t('repMachine')(machineDisp()),
    t('repBaseAt')(baselineLearnedAt),
    t('repTrigger')(a?a.surprise.toFixed(3):"—", ALERT_TH),
    t('repAnomaly')(FAULT_BIN),
    t('repLoad')(loadPct),
    t('repRul')(r? (r.days>=1? t('rulDays')(r.days.toFixed(0)) : t('rulHrs')(r.hrs.toFixed(0))) : "—"),
    t('repAction'),
    "",
    t('repNote1'),
    t('repNote2') ];
  $("reportbox").innerHTML=`<div class="report">${lines.join("\n")}</div>
    <div class="stat" style="margin-top:6px">${t('reportFoot')}</div>`;
};
$("audit").onclick=()=>{
  const spec=currentSpectrum();
  const a=surpriseOf(spec), b=surpriseOf(spec);
  const same=(a===b);
  const fp1=recallBaselineFP(), fp2=recallBaselineFP();
  let bitsame=true; for(let i=0;i<D;i++){ if(fp1[i]!==fp2[i]){ bitsame=false; break; } }
  const verdict = same&&bitsame ? t('auditPass') : t('auditFail');
  const out=t('auditOut')(a.toFixed(6), b.toFixed(6), same, bitsame, verdict);
  $("auditbox").innerHTML=`<div class="report">${out}</div>`;
};

$("reset").onclick=()=>{
  pause();
  opHours=0; degr=0; loadPct=100; learned=false; alerted=false; surprise=0;
  M=null; baselineSpec=null; baselineLearnedAt=null; alerts=[];
  $("loadSlider").value=100; $("loadVal").textContent="100%"; $("gload").textContent="100%";
  $("ghrs").textContent="0 h"; $("grul").textContent="—";
  $("run").disabled=true; $("pause").disabled=true; $("learn").disabled=false; $("replace").disabled=true;
  $("report").disabled=true; $("audit").disabled=true;
  $("reportbox").innerHTML=""; $("auditbox").innerHTML="";
  $("baseBadge").textContent=t('badgeBase'); $("baseBadge").className="badge ok"; $("baseWhen").textContent="";
  $("baseTxt").innerHTML=t('baseTxtInit');
  $("baseName").textContent=t('baseName');
  updateCfNote();
  renderAlerts(); refreshMem(); setSurprise(0); drawChart(); refreshRUL();
};

// repaint all dynamic text in the current language, preserving demo state
function repaintDynamic(){
  $("baseName").textContent=t('baseName');
  if(!learned){
    $("baseBadge").textContent=t('badgeBase'); $("baseBadge").className="badge ok";
    $("baseTxt").innerHTML=t('baseTxtInit');
  } else {
    $("baseBadge").textContent=t('badgeLearned'); $("baseBadge").className="badge ok";
    if($("baseTxt").dataset.state==='replaced'){ /* keep numeric, re-render below */ }
    $("baseTxt").innerHTML=t('baseTxtLearned')(D);
  }
  setSurprise(surprise);
  refreshMem(); refreshRUL(); renderAlerts(); updateCfNote(); drawChart();
}

// init
applyStatic();
$("baseName").textContent=t('baseName');
$("baseBadge").textContent=t('badgeBase');
$("baseTxt").innerHTML=t('baseTxtInit');
updateCfNote();
refreshMem(); setSurprise(0); drawChart(); refreshRUL();
</script>
