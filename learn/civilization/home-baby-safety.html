<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home / Baby Safety Monitor · on-device, never to the cloud (Millisecond Era)</title>
<style>
  :root { --bg:#0b0f14; --card:#141a21; --line:#283541; --txt:#e9f0f6; --mut:#8da2b5;
          --acc:#36a3ff; --good:#3fdf8f; --warn:#f4c152; --hot:#ff6b6b; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif; }
  header { padding:18px 24px 14px; border-bottom:1px solid var(--line); }
  .brand { color:var(--mut); font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
  h1 { margin:6px 0 0; font-size:21px; font-weight:800; } h1 span{ color:var(--acc); }
  .sub { color:var(--mut); font-size:13px; margin-top:6px; max-width:1120px; }
  .wrap { display:flex; gap:18px; padding:18px 24px; flex-wrap:wrap; align-items:flex-start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:13px; padding:15px; }
  .left { width:430px; } .right{ flex:1; min-width:380px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  button { background:var(--acc); color:#04121f; border:0; border-radius:9px; padding:9px 14px;
        font-size:14px; cursor:pointer; font-weight:700; }
  button.sec { background:#1b2530; border:1px solid var(--line); color:var(--txt); font-weight:600; }
  button.hot { background:var(--hot); color:#1c0606; } button.warn{ background:var(--warn); color:#1c1300; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  canvas#crib { width:100%; background:#11161c; border:1px solid var(--line); border-radius:10px; display:block; }
  .stat { color:var(--mut); font-size:12px; }
  .ok{ color:var(--good); } .bad{ color:var(--hot); } .wn{ color:var(--warn); }
  .meter { height:12px; border-radius:6px; background:#1b2530; overflow:hidden; margin-top:5px; }
  .meter > i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--good),var(--warn),var(--hot)); transition:width .1s; }
  .eye { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .pill { font-size:11px; padding:3px 9px; border-radius:11px; border:1px solid var(--line); background:#0b0f14; color:var(--mut); }
  .pill b{ color:var(--txt); font-weight:700; }
  .pill.alert{ border-color:var(--hot); color:var(--hot); }
  .ev { border:1px solid var(--line); border-radius:11px; padding:11px; margin-bottom:11px; background:#0b0f14; }
  .ev.flash { border-color:var(--hot); box-shadow:0 0 0 2px rgba(255,107,107,.25); }
  .ev .top { display:flex; gap:9px; align-items:center; margin-bottom:7px; }
  .etag { font-weight:800; font-size:14px; letter-spacing:.5px; padding:2px 9px; border-radius:5px; background:linear-gradient(#b3261e,#7a160f); color:#fff; }
  .etag.amber{ background:linear-gradient(#a9710b,#7a4f08); } .etag.blue{ background:linear-gradient(#1565c0,#0d47a1); }
  .etype { color:var(--hot); font-weight:700; } .etime{ color:var(--mut); font-size:12px; margin-left:auto; }
  .thumbs { display:flex; gap:6px; margin:6px 0; } .thumbs img{ width:96px; height:64px; border-radius:5px; border:1px solid var(--line); object-fit:cover; }
  .evbtns { display:flex; gap:7px; margin-top:6px; }
  .report { white-space:pre-wrap; background:#0b0f14; border:1px solid var(--line); border-radius:9px; padding:11px; font:12.5px/1.5 ui-monospace,Menlo,monospace; color:#cfe3f5; margin-top:8px; max-height:240px; overflow:auto; }
  .moat { background:#0b0f14; border:1px solid var(--good); border-radius:11px; padding:11px 13px; margin-top:12px; font-size:13px; }
  .moat b{ color:var(--good); }
  .honest { background:#141a21; border:1px dashed var(--warn); border-radius:11px;
        padding:12px 14px; margin:0 24px 18px; font-size:12.5px; color:#cdd9e4; max-width:1200px; }
  .honest b{ color:var(--warn); } code{ background:#1b2530; padding:1px 6px; border-radius:5px; font-size:12px; }
  .audit { font:12px/1.5 ui-monospace,Menlo,monospace; color:var(--mut); white-space:pre-wrap; }
  /* language toggle */
  .langtoggle{ position:fixed; top:12px; right:14px; z-index:50; display:flex; gap:4px; }
  .langtoggle .lt{ background:#1b2530; border:1px solid var(--line); color:var(--mut); padding:5px 11px;
        border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; }
  .langtoggle .lt.active{ background:var(--acc); color:#04121f; }
</style>
</head>
<body>
<div class="langtoggle">
  <button id="lang-en" class="lt active" onclick="setLang('en')">EN</button>
  <button id="lang-zh" class="lt" onclick="setLang('zh')">中</button>
</div>
<header>
  <div class="brand" data-i18n="brand"></div>
  <h1><span data-i18n-html="h1"></span></h1>
  <div class="sub" data-i18n-html="sub"></div>
</header>

<div class="honest" data-i18n-html="honest"></div>

<div class="wrap">
  <div class="card left">
    <div class="row">
      <button id="play" data-i18n="btnPlay"></button>
      <button id="pause" class="sec" disabled data-i18n="btnPause"></button>
      <button id="reset" class="sec" data-i18n="btnReset"></button>
    </div>
    <canvas id="crib" width="400" height="430"></canvas>
    <div class="eye">
      <span class="pill" id="pState"></span>
      <span class="pill" id="pMotion"></span>
      <span class="pill" id="pPerson"></span>
    </div>
    <div class="stat" style="margin-top:10px"><span data-i18n="surpriseLine"></span><span id="slbl" class="ok"></span></div>
    <div class="meter"><i id="sfill"></i></div>
    <div class="stat" id="live" style="margin-top:8px"></div>
  </div>

  <div class="card right">
    <div class="row">
      <b style="font-size:15px" data-i18n="panelH"></b>
      <span class="stat" id="memstat"></span>
      <button id="genall" class="warn" style="margin-left:auto" disabled data-i18n="btnReport"></button>
      <button id="audit" class="sec" disabled data-i18n="btnAudit"></button>
    </div>
    <div id="evlist"></div>
    <div id="reportbox"></div>
    <div id="auditbox"></div>

    <div class="moat" data-i18n-html="moat"></div>
  </div>
</div>

let LANG = (function(){ try{ return localStorage.getItem('msEraLang') || ((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en'); }catch(e){ return 'en'; } })();
function t(k){ return I18N[LANG][k]; }
function applyStatic(){
  document.getElementById('htmlRoot').lang = LANG;
  document.title = t('docTitle');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18n]; if(typeof v==='string') el.textContent=v; });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18nHtml]; if(typeof v==='string') el.innerHTML=v; });
}
function setLang(l){
  if(l!==LANG){ LANG=l; try{ localStorage.setItem('msEraLang',l); }catch(e){} }
  document.getElementById('lang-en').classList.toggle('active', l==='en');
  document.getElementById('lang-zh').classList.toggle('active', l==='zh');
  applyStatic(); repaintDynamic();
}

// ───────── language-independent identity constants (NEVER translated) ─────────
// These are stable HV keys / state IDs. Display labels live in I18N above and are
// looked up via the maps below — but the IDs themselves must stay byte-identical
// across languages so the determinism / recall claim holds.
const TYPE_PRONE = "PRONE", TYPE_STILL = "STILL", TYPE_STRANGER = "STRANGER";
const TYPES = [TYPE_PRONE, TYPE_STILL, TYPE_STRANGER];   // <-- HV keys via "type:"+type
const ST_FACEUP="FACEUP", ST_PRONE="PRONE";              // posture state IDs (display only)
const MO_NORMAL="NORMAL", MO_STILL="STILL";              // motion state IDs (display only)
const PE_BABY="BABY", PE_STRANGER="STRANGER";            // presence state IDs (display only)
// display-label lookups (language-dependent text for the IDs above)
function typeLabel(id){ return id===TYPE_PRONE? (LANG==='zh'?"俯卧(SIDS风险)":"face-down (SIDS risk)")
                            : id===TYPE_STILL? (LANG==='zh'?"长时间无动作":"no motion for a long time")
                            : (LANG==='zh'?"出现陌生人":"a stranger appeared"); }
function postureLabel(id){ return id===ST_PRONE? t('stProne') : t('stFaceUp'); }
function motionLabel(id){ return id===MO_STILL? t('moStill') : t('moNormal'); }
function presenceLabel(id){ return id===PE_STRANGER? t('peStranger') : t('peBabyOnly'); }

// ───────── HDC core (pure ±1 VSA, verified lineage — identical to dashcam demo) ─────────
const D = 8000;
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function strSeed(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
const _cb=new Map();
function itemHV(key){ if(_cb.has(key)) return _cb.get(key);
  const rng=mulberry32(strSeed(key)), v=new Float32Array(D);
  for(let i=0;i<D;i++) v[i]=rng()<0.5?-1:1; _cb.set(key,v); return v; }
function bind(a,b){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=a[i]*b[i]; return o; }
function cos(a,b){ let d=0,na=0,nb=0; for(let i=0;i<D;i++){ d+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-9); }
// event-record fact = bind(eventType, timeKey); ledger M = Σ facts (real accumulator, exact subtract = forget)
function factHV(type, tkey){ return bind(itemHV("type:"+type), itemHV("t:"+tkey)); }
let M = new Float32Array(D);
function addFact(f){ const h=factHV(f.type,f.tkey); for(let i=0;i<D;i++) M[i]+=h[i]; }
function subFact(f){ const h=factHV(f.type,f.tkey); for(let i=0;i<D;i++) M[i]-=h[i]; }
function recallType(tkey){            // unbind time -> recover event type (deterministic proof it's in M)
  const probe = bind(M, itemHV("t:"+tkey));
  let best=null,bs=-2; for(const ty of TYPES){ const s=cos(probe, itemHV("type:"+ty)); if(s>bs){bs=s;best=ty;} }
  return {type:best, s:bs};
}

// ───────── scene (top-down crib monitor sim) ─────────
const cv=document.getElementById("crib"), ctx=cv.getContext("2d");
const W=cv.width, H=cv.height;
const CX=W/2, CY=H/2-10;                       // baby center
// scripted timeline (frame-keyed). Each event: window [at, at+dur]; surprise = scene-divergence
const SCRIPT=[
  {at:120, dur:70, kind:"prone",   type:TYPE_PRONE,    peak:0.92},
  {at:330, dur:90, kind:"still",   type:TYPE_STILL,    peak:0.80},
  {at:560, dur:70, kind:"stranger",type:TYPE_STRANGER, peak:0.97},
];
let t_sim=0, frame=0, playing=false, surprise=0, lastFlash=-99, evidence=[];
let babyState=ST_FACEUP, motionState=MO_NORMAL, personState=PE_BABY, strangerX=-60, breathPhase=0;

function reset(){
  t_sim=0; frame=0; surprise=0; lastFlash=-99; evidence=[]; breathPhase=0;
  babyState=ST_FACEUP; motionState=MO_NORMAL; personState=PE_BABY; strangerX=-60;
  M=new Float32Array(D);
  renderEvidence(); updateEye(); drawFrame(); setSurprise(0,t('slCalm'));
}

function setSurprise(v,label){ surprise=v; document.getElementById("sfill").style.width=Math.min(100,v*100)+"%";
  const l=document.getElementById("slbl"); l.textContent=label; l.className = v>0.6?"bad":(v>0.3?"wn":"ok"); }

function updateEye(){
  document.getElementById("pState").innerHTML=t('pState')(postureLabel(babyState));
  document.getElementById("pState").className="pill"+(babyState===ST_PRONE?" alert":"");
  document.getElementById("pMotion").innerHTML=t('pMotion')(motionLabel(motionState));
  document.getElementById("pMotion").className="pill"+(motionState!==MO_NORMAL?" alert":"");
  document.getElementById("pPerson").innerHTML=t('pPerson')(presenceLabel(personState));
  document.getElementById("pPerson").className="pill"+(personState!==PE_BABY?" alert":"");
}

function activeEvent(){ for(const e of SCRIPT){ if(frame>=e.at && frame<e.at+e.dur) return e; } return null; }

function step(){
  frame++; t_sim=frame/30; breathPhase+=0.18;
  // default calm state each frame; the scripted event overrides
  babyState=ST_FACEUP; motionState=MO_NORMAL; personState=PE_BABY; strangerX=-60;
  let s=0, ev=activeEvent(), flagType=null;
  if(ev){
    const p=(frame-ev.at)/ev.dur;                 // 0..1 progress through the event window
    // surprise ramps up at onset (the un-predicted change), holds, then we've already captured
    const ramp = Math.min(1, p/0.25);             // quick onset
    s = ev.peak * ramp;
    flagType = ev.type;
    if(ev.kind==="prone"){ babyState=ST_PRONE; motionState=MO_NORMAL; }
    if(ev.kind==="still"){ babyState=ST_FACEUP; motionState=MO_STILL; }
    if(ev.kind==="stranger"){ personState=PE_STRANGER; strangerX=-60 + Math.min(1,p/0.4)*70; }
  }
  // surprise router: capture on spike (change-driven, not absolute threshold) with refractory gap
  if(s>0.6 && frame-lastFlash>50 && flagType){ captureEvent(flagType); lastFlash=frame; }
  setSurprise(s, s>0.6?t('slAlert'):(s>0.3?t('slWatch'):t('slCalm')));
  updateEye(); drawFrame();
  if(frame>700){ pause(); document.getElementById("live").innerHTML=t('liveEnd'); }
}

function drawFrame(){
  ctx.fillStyle="#11161c"; ctx.fillRect(0,0,W,H);
  // crib frame (top-down)
  ctx.strokeStyle="#3a4b59"; ctx.lineWidth=8; roundRect(24,24,W-48,H-48,18); ctx.stroke();
  // mattress
  ctx.fillStyle="#172029"; roundRect(40,40,W-80,H-80,12); ctx.fill();
  // crib slats (subtle)
  ctx.strokeStyle="#222d38"; ctx.lineWidth=2;
  for(let x=70;x<W-50;x+=40){ ctx.beginPath(); ctx.moveTo(x,28); ctx.lineTo(x,42); ctx.moveTo(x,H-42); ctx.lineTo(x,H-28); ctx.stroke(); }
  // mattress label
  ctx.fillStyle="#2a3947"; ctx.font="10px sans-serif"; ctx.textAlign="center";
  ctx.fillText(t('cribLabel'), CX, H-54);
  // baby
  drawBaby();
  // stranger at edge
  if(strangerX>-50) drawStranger(strangerX, CY+40);
}

function drawBaby(){
  const prone = (babyState===ST_PRONE);
  const still = (motionState!==MO_NORMAL);
  // breathing wobble (suppressed when "still")
  const br = still ? 0 : Math.sin(breathPhase)*1.4;
  ctx.save();
  // swaddle / body
  ctx.fillStyle = prone ? "#c46b6b" : "#7fb0d8";
  ctx.strokeStyle = prone ? "#ff6b6b" : "#9fd0ff"; ctx.lineWidth = prone? 3:2;
  roundRect(CX-44, CY-26+br, 88, 84-br, 26); ctx.fill(); ctx.stroke();
  // head
  ctx.beginPath(); ctx.fillStyle = prone ? "#b86060" : "#e7c9a0";
  ctx.arc(CX, CY-46, 26, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle=prone?"#ff6b6b":"#caa97e"; ctx.stroke();
  // face vs back-of-head
  if(prone){
    // face DOWN: show back of head + hair, no face = SIDS risk visual
    ctx.fillStyle="#5a3b24"; ctx.beginPath(); ctx.arc(CX, CY-46, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle="#ff6b6b"; ctx.font="bold 11px sans-serif"; ctx.fillText(t('cribFaceDown'), CX, CY-43);
  } else {
    // face UP: eyes (closed if asleep) + small smile
    ctx.strokeStyle="#5a4632"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(CX-10,CY-50); ctx.lineTo(CX-3,CY-50); ctx.moveTo(CX+3,CY-50); ctx.lineTo(CX+10,CY-50); ctx.stroke();
    ctx.beginPath(); ctx.arc(CX, CY-41, 6, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  }
  // breathing indicator ring
  if(!still && !prone){ ctx.strokeStyle="rgba(63,223,143,.5)"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(CX, CY+6, 50+Math.sin(breathPhase)*4, 0, Math.PI*2); ctx.stroke(); }
  if(still){ ctx.fillStyle="#f4c152"; ctx.font="bold 11px sans-serif"; ctx.textAlign="center";
    ctx.fillText(t('cribNoBreath'), CX, CY+58); }
  ctx.restore();
}

function drawStranger(x,y){
  ctx.save();
  ctx.globalAlpha=0.92;
  ctx.fillStyle="#3a2b3b"; ctx.strokeStyle="#ff6b6b"; ctx.lineWidth=2.5;
  // shadowy figure entering from left edge
  roundRect(x-16, y-30, 40, 80, 10); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.fillStyle="#2c2030"; ctx.arc(x+4, y-40, 16, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#ff6b6b"; ctx.font="bold 10px sans-serif"; ctx.textAlign="center"; ctx.fillText(t('cribStranger'), x+4, y+62);
  ctx.restore();
}

function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function snapThumb(){ const tmp=document.createElement("canvas"); tmp.width=96; tmp.height=64;
  tmp.getContext("2d").drawImage(cv,0,0,W,H,0,0,96,64); return tmp.toDataURL("image/jpeg",0.6); }

function tagClass(type){ if(type===TYPE_PRONE) return ""; if(type===TYPE_STRANGER) return "blue"; return "amber"; }

function captureEvent(type){
  const tkey=Math.floor(t_sim*10)/10;
  const ev={ type, time:fmtTime(tkey), tkey:String(tkey), thumbs:[snapThumb()], removed:false };
  evidence.push(ev); addFact(ev);
  // grab 1-2 follow-up thumbs over next frames (the tiny clip), then DISCARD raw — only this record kept
  let n=0; const grab=()=>{ if(n<2 && ev.thumbs.length<3){ ev.thumbs.push(snapThumb()); n++; setTimeout(grab,130);} else renderEvidence(); };
  setTimeout(grab,130);
  renderEvidence();
  document.getElementById("live").innerHTML=t('captureLive')(typeLabel(type), ev.time);
}
function fmtTime(tk){ const d=new Date(2026,5,11,2,14,Math.floor(tk)); return d.toTimeString().slice(0,8)+"."+String(Math.floor((tk%1)*10)); }

function renderEvidence(){
  const live=evidence.filter(e=>!e.removed);
  document.getElementById("memstat").textContent = live.length? t('memFull')(live.length) : t('memEmpty');
  document.getElementById("genall").disabled = live.length===0;
  document.getElementById("audit").disabled = live.length===0;
  const el=document.getElementById("evlist");
  if(!evidence.length){ el.innerHTML=`<div class="stat">${t('evInit')}</div>`; return; }
  el.innerHTML = evidence.map((e,i)=> e.removed? `<div class="ev"><span class="stat">${t('evRemoved')(typeLabel(e.type), e.time)}</span></div>` :
    `<div class="ev flash"><div class="top"><span class="etag ${tagClass(e.type)}">${t('evTag')}</span> <span class="etype">${typeLabel(e.type)}</span><span class="etime">${e.time}</span></div>
       <div class="thumbs">${e.thumbs.map(t=>`<img src="${t}">`).join("")}</div>
       <div class="stat">${t('evThumbNote')(e.thumbs.length)}</div>
       <div class="evbtns"><button class="sec" onclick="proveIn(${i})">${t('btnReview')}</button>
         <button class="hot" onclick="markFalse(${i})">${t('btnMarkFalse')}</button></div>
       <div class="audit" id="aud${i}"></div></div>`).join("");
}
window.proveIn=(i)=>{ const e=evidence[i]; const r=recallType(e.tkey);
  document.getElementById("aud"+i).textContent = t('proveIn')(typeLabel(r.type), r.s.toFixed(3)); };
window.markFalse=(i)=>{ const e=evidence[i]; if(e.removed) return; subFact(e); e.removed=true; renderEvidence();
  const r=recallType(e.tkey);
  document.getElementById("live").innerHTML=t('markFalseLive')(typeLabel(e.type), e.time, r.s.toFixed(3)); };

document.getElementById("genall").onclick=()=>{
  const live=evidence.filter(e=>!e.removed);
  const lines=[ t('repTitle'),
    t('repGen')(new Date().toLocaleString(LANG==='zh'?"zh-CN":"en-US")), t('repDevice'),
    t('repCount')(live.length), t('repKept'), ""];
  live.forEach((e,k)=> lines.push(t('repLine')(k+1, typeLabel(e.type), e.time, e.thumbs.length)));
  lines.push("", t('repNote'));
  document.getElementById("reportbox").innerHTML = `<div class="report">${lines.join("\n")}</div>
     <div class="stat" style="margin-top:6px">${t('repFoot')}</div>`;
};
document.getElementById("audit").onclick=()=>{
  const live=evidence.filter(e=>!e.removed);
  let out=t('auditHead');
  let allsame=true;
  for(const e of live){ const a=recallType(e.tkey).s, b=recallType(e.tkey).s; const same=(a===b); allsame=allsame&&same;
    out+=t('auditLine')(e.time, typeLabel(e.type), a.toFixed(6), b.toFixed(6), same); }
  out+= live.length? t('auditVerdict')(allsame) : t('auditNone');
  document.getElementById("auditbox").innerHTML=`<div class="report">${out}</div>`;
};

// controls
let timer=null;
function play(){ if(playing) return; playing=true; document.getElementById("play").disabled=true; document.getElementById("pause").disabled=false;
  timer=setInterval(step,33); }
function pause(){ playing=false; document.getElementById("play").disabled=false; document.getElementById("pause").disabled=true; if(timer){clearInterval(timer);timer=null;} }
document.getElementById("play").onclick=play;
document.getElementById("pause").onclick=pause;
document.getElementById("reset").onclick=()=>{ pause(); reset(); document.getElementById("reportbox").innerHTML=""; document.getElementById("auditbox").innerHTML=""; document.getElementById("live").textContent=t('resetLive'); };

// repaint all dynamic text in the current language, preserving demo state
function repaintDynamic(){
  if(!evidence.length){ document.getElementById("live").innerHTML=t('liveInit'); }
  updateEye();
  setSurprise(surprise, surprise>0.6?t('slAlert'):(surprise>0.3?t('slWatch'):t('slCalm')));
  renderEvidence();
  drawFrame();
}

// init
applyStatic();
reset();
document.getElementById("live").innerHTML=t('liveInit');
</script>
