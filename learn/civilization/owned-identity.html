<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Owned Reversible Identity · 自主身份 (Millisecond Era)</title>
<style>
  :root { --bg:#0b0f14; --card:#141a21; --line:#283541; --txt:#e9f0f6; --mut:#8da2b5;
          --acc:#36a3ff; --good:#3fdf8f; --warn:#f4c152; --hot:#ff6b6b; --cool:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"PingFang SC",sans-serif; }
  header { padding:18px 24px 14px; border-bottom:1px solid var(--line); }
  .brand { color:var(--mut); font-size:12px; letter-spacing:.12em; text-transform:uppercase; }
  h1 { margin:6px 0 0; font-size:21px; font-weight:800; } h1 span{ color:var(--acc); }
  .sub { color:var(--mut); font-size:13px; margin-top:6px; max-width:1120px; }
  .wrap { display:flex; gap:18px; padding:18px 24px; flex-wrap:wrap; align-items:flex-start; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:13px; padding:15px; }
  .left { width:440px; } .right{ flex:1; min-width:400px; }
  .row { display:flex; gap:8px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
  select,input[type=text]{ background:#0b0f14; border:1px solid var(--line); color:var(--txt);
        border-radius:8px; padding:8px 10px; font-size:13px; }
  input[type=text]{ width:130px; }
  button { background:var(--acc); color:#04121f; border:0; border-radius:9px; padding:9px 14px;
        font-size:14px; cursor:pointer; font-weight:700; }
  button.sec { background:#1b2530; border:1px solid var(--line); color:var(--txt); font-weight:600; }
  button.hot { background:var(--hot); color:#1c0606; } button.warn{ background:var(--warn); color:#1c1300; }
  button.good { background:var(--good); color:#04140b; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .stat { color:var(--mut); font-size:12px; }
  .ok{ color:var(--good); } .bad{ color:var(--hot); } .wn{ color:var(--warn); }
  .idcard { background:linear-gradient(155deg,#142433,#0b0f14); border:1px solid var(--line);
        border-radius:12px; padding:14px 16px; margin-bottom:12px; position:relative; overflow:hidden; }
  .idcard:before{ content:""; position:absolute; right:-30px; top:-30px; width:120px; height:120px;
        border-radius:50%; background:radial-gradient(circle, rgba(54,163,255,.18), transparent 70%); }
  .idcard .who{ font-size:18px; font-weight:800; } .idcard .meta{ color:var(--mut); font-size:12.5px; margin-top:2px; }
  .commit { font:11.5px/1.5 ui-monospace,Menlo,monospace; color:var(--cool); word-break:break-all;
        background:#0b0f14; border:1px solid var(--line); border-radius:7px; padding:7px 9px; margin-top:9px; }
  .commit b{ color:var(--good); }
  .fam { margin-top:6px; }
  .fam .f { display:flex; gap:8px; align-items:center; padding:6px 0; border-top:1px solid var(--line); font-size:13.5px; }
  .fam .rel { color:var(--acc); font-weight:700; width:54px; }
  .fam .nm { color:var(--txt); font-weight:600; flex:1; }
  .fam .sep { background:#1b2530; border:1px solid var(--line); color:var(--hot); border-radius:7px;
        padding:4px 9px; font-size:12px; font-weight:600; cursor:pointer; }
  .fam .f.gone .nm{ color:var(--mut); text-decoration:line-through; }
  .fam .f.gone .rel{ color:var(--mut); }
  .qcard { border-top:1px dashed var(--line); padding-top:13px; margin-top:13px; }
  .qcard h3 { margin:0 0 8px; font-size:14px; } .qcard h3 b{ color:var(--acc); }
  .ans { background:#0b0f14; border:1px solid var(--line); border-radius:8px; padding:10px; margin-top:7px; min-height:24px; font-size:14px; }
  .ans em{ color:var(--mut); font-style:normal; }
  .scorebar { display:inline-block; height:8px; background:var(--acc); border-radius:4px; vertical-align:middle; margin:0 6px; }
  .meter { height:12px; border-radius:6px; background:#1b2530; overflow:hidden; margin-top:6px; max-width:240px; }
  .meter > i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--hot),var(--warn),var(--good)); transition:width .25s; }
  .audit { font:12px/1.6 ui-monospace,Menlo,monospace; color:var(--mut); white-space:pre-wrap;
        background:#0b0f14; border:1px solid var(--line); border-radius:9px; padding:11px; margin-top:10px; max-height:200px; overflow:auto; }
  .moat { background:#0b0f14; border:1px solid var(--good); border-radius:11px; padding:11px 13px; margin-top:12px; font-size:13px; }
  .moat b{ color:var(--good); }
  .honest { background:#141a21; border:1px dashed var(--warn); border-radius:11px;
        padding:12px 14px; margin:0 24px 18px; font-size:12.5px; color:#cdd9e4; max-width:1200px; }
  .honest b{ color:var(--warn); } code{ background:#1b2530; padding:1px 6px; border-radius:5px; font-size:12px; }
  .telos { background:#0b0f14; border:1px solid var(--line); border-left:3px solid var(--acc);
        border-radius:9px; padding:11px 14px; margin:0 24px 4px; max-width:1200px; font-size:13px; color:#cdd9e4; }
  .telos b{ color:var(--acc); }
  /* language toggle */
  .langtoggle{ position:fixed; top:12px; right:14px; z-index:50; display:flex; gap:4px; }
  .langtoggle .lt{ background:#1b2530; border:1px solid var(--line); color:var(--mut); padding:5px 11px;
        border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; }
  .langtoggle .lt.active{ background:var(--acc); color:#04121f; }
</style>
</head>
<body>
<div class="langtoggle">
  <button id="lang-en" class="lt active" onclick="setLang('en')">EN</button>
  <button id="lang-zh" class="lt" onclick="setLang('zh')">中</button>
</div>
<header>
  <div class="brand" data-i18n="brand"></div>
  <h1><span data-i18n="h1"></span></h1>
  <div class="sub" data-i18n-html="sub"></div>
</header>

<div class="telos" data-i18n-html="telos"></div>

<div class="honest" data-i18n-html="honest"></div>

<div class="wrap">
  <!-- LEFT: the identity record on-device -->
  <div class="card left">
    <div class="row">
      <input type="text" id="nm" value="Hassan A." />
      <input type="text" id="dob" value="1991-03-12" />
      <input type="text" id="fp" value="loop-whorl-7F3A" style="width:160px" />
      <button id="create" data-i18n="btnCreate"></button>
    </div>
    <div class="stat" style="margin-bottom:10px" data-i18n-html="fpNote"></div>

    <div class="idcard" id="idcard" style="display:none">
      <div class="who" id="who">—</div>
      <div class="meta" id="meta">—</div>
      <div class="commit" id="commit">—</div>
      <div class="fam" id="fam"></div>
    </div>

    <div class="row" id="famrow" style="display:none">
      <select id="relSel"></select>
      <input type="text" id="famName" data-i18n-ph="phFamName" />
      <button id="bindFam" class="sec" data-i18n="btnBindFam"></button>
    </div>

    <div class="moat" data-i18n-html="moat"></div>
  </div>

  <!-- RIGHT: verify / separate / migrate -->
  <div class="card right">
    <div class="qcard" style="border-top:0; padding-top:0">
      <h3 data-i18n-html="q1Title"></h3>
      <div class="row">
        <select id="vWho">
          <option value="self" data-i18n="vWhoSelf"></option>
          <option value="other" data-i18n="vWhoOther"></option>
        </select>
        <button id="verify" class="good" disabled data-i18n="btnVerify"></button>
      </div>
      <div class="meter"><i id="vfill"></i></div>
      <div class="ans" id="vAns"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n-html="q2Title"></h3>
      <div class="row">
        <select id="qRel"></select>
        <button id="qFam" class="sec" disabled data-i18n="btnQFam"></button>
      </div>
      <div class="ans" id="qAns"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n-html="sepTitle"></h3>
      <div class="row">
        <button id="sepFather" class="hot" disabled data-i18n="btnSepFather"></button>
        <span class="stat" data-i18n="sepHint"></span>
      </div>
      <div class="ans" id="sAns"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n-html="migTitle"></h3>
      <div class="row">
        <button id="migrate" class="sec" disabled data-i18n="btnMigrate"></button>
      </div>
      <div class="ans" id="mAns"></div>
    </div>

    <div class="qcard">
      <h3 data-i18n="logTitle"></h3>
      <div class="audit" id="log"></div>
    </div>
  </div>
</div>

    // dynamic strings
    anonName: "匿名",
    idCreated: (name,dig)=>`身份建立(端上):${name} · 承诺摘要 ${dig} · 原始指纹未存储`,
    metaLine: (dob)=>`生日 ${dob} &nbsp;·&nbsp; <span class="stat">无国籍/难民身份记录</span>`,
    commitLine: (D,dig)=>`生物特征承诺(<b>只存承诺,不存指纹</b>):<br>HV[D=${D}] · digest <b>${dig}</b>`,
    famHeader: "绑定的家人(身份记忆 M)：",
    famGone: (rel,name)=>`<span class="rel">${rel}</span><span class="nm">${name} · 已分离</span>`,
    famActive: (rel,name)=>`<span class="rel">${rel}</span><span class="nm">${name}</span>`,
    logBind: (rel,name)=>`绑定家人:${rel} = ${name}`,
    vAnsCreate: '点"过境核验":本人指纹 → cos≈1.0;冒名者 → 噪声。原始指纹从不离开设备。',
    sAnsCreate: '父亲已绑定。切断后查"父亲"会降到噪声,其余完好,并写审计日志。',
    qAnsCreate: '试查"父亲" / "母亲" / "兄弟"。',
    mAnsCreate: '迁移后验完整性:确定性重算,两次比特相同。',
    logVerify: (who,s,same)=>`边境核验:出示${who}承诺 → cos=${s} → ${same?"同一人 ✓ 放行":"非同一人 ✗ 拒绝"}(未暴露原始指纹)`,
    whoSelf: "本人", whoOther: "他人",
    vAnsSame: (s,bar)=>`<b class="ok">同一人 ✓</b> cos=<b>${s}</b> ${bar} <span class="stat">和上次过境是同一人 —— 但<b>没有暴露原始指纹</b>,只比对了承诺。</span>`,
    vAnsDiff: (s,bar)=>`<b class="bad">非同一人 ✗</b> cos=<b>${s}</b> ${bar} <span class="stat">出示的承诺与已存承诺不符(冒名者) —— 余弦落在噪声水平。</span>`,
    qAnsFound: (rel,name,bar,s)=>`<b>${rel}</b> = <b class="ok">${name}</b> ${bar} <span class="stat">cos=${s} · unbind(M, ${rel}) 恢复出绑定的家人。</span>`,
    qAnsMissing: (rel,s)=>`<em class="bad">M 里查不到「${rel}」的关联</em> <span class="stat">cos=${s} —— 未绑定,或已被外科式分离。</span>`,
    sAnsNone: "已经没有\"父亲\"关联了。",
    logSep: (date,name,dig,before,ver)=>`分离 ${date}:切断"父亲=${name}"关联(精确减法,可逆操作已记录)。身份承诺摘要 ${dig}=${before} 未变;本人核验仍 cos=${ver}`,
    sAnsDone: (name,goneS,momName,momS,broName,broS,ver)=>`✂ 已<b>外科式切断</b>"父亲=${name}"的关联(精确减法)。
    再查 <b>父亲</b> → <span class="bad">cos=${goneS}(降到噪声=真切断)</span>;
    其余完好:<b>母亲</b>=<span class="ok">${momName} cos=${momS}</span>、<b>兄弟</b>=<span class="ok">${broName} cos=${broS}</span>;
    本人核验仍 <span class="ok">cos=${ver}</span>。
    <span class="stat"> —— 危险关联可被本人精确切断(政权的生物库做不到);可逆操作已写入审计日志。</span>`,
    logMigrate: (d1,d2,d3,same)=>`迁移到新设备:确定性重算承诺摘要 ${d1}==${d2}==${d3} → ${same?"比特一致 ✓ 完整性通过":"不一致 ✗"}`,
    mAnsSame: (d1,d2,d3,c)=>`📲 迁移成功 · <b class="ok">完整性通过 ✓</b>。新设备确定性重算承诺:摘要 <b>${d1}</b> == <b>${d2}</b> == <b>${d3}</b>(比特相同),
       重导承诺 cos=<b>${c}</b>。
       <span class="stat"> —— 核验者只需验"承诺密码学上自洽",无需原始指纹;记录归你,跨设备可携带。</span>`,
    mAnsFail: `<b class="bad">完整性校验失败 ✗</b> —— 摘要不一致,记录可能被篡改。`
  }
};
let LANG = (function(){ try{ return localStorage.getItem('msEraLang') || ((navigator.language||'').toLowerCase().startsWith('zh')?'zh':'en'); }catch(e){ return 'en'; } })();
function t(k){ return I18N[LANG][k]; }
function applyStatic(){
  document.getElementById('htmlRoot').lang = LANG;
  document.title = t('docTitle');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18n]; if(typeof v==='string') el.textContent=v; });
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18nHtml]; if(typeof v==='string') el.innerHTML=v; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ const v=I18N[LANG][el.dataset.i18nPh]; if(typeof v==='string') el.placeholder=v; });
}
function setLang(l){
  if(l!==LANG){ LANG=l; try{ localStorage.setItem('msEraLang',l); }catch(e){} }
  document.getElementById('lang-en').classList.toggle('active', l==='en');
  document.getElementById('lang-zh').classList.toggle('active', l==='zh');
  applyStatic(); repaintDynamic();
}

// ───────── HDC core (pure ±1 VSA, verified lineage) ─────────
const D = 8000;
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function strSeed(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
const _cb=new Map();
function itemHV(key){ if(_cb.has(key)) return _cb.get(key);
  const rng=mulberry32(strSeed(key)), v=new Float32Array(D);
  for(let i=0;i<D;i++) v[i]=rng()<0.5?-1:1; _cb.set(key,v); return v; }
function bind(a,b){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=a[i]*b[i]; return o; }
function cos(a,b){ let d=0,na=0,nb=0; for(let i=0;i<D;i++){ d+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-9); }

// biometric commitment = deterministic HV derived from a (simulated) fingerprint string.
// Store the COMMITMENT, never the raw fingerprint. itemHV is one-way (FNV seed → ±1 codebook).
function commitFromFingerprint(fp){ return itemHV("biometric:"+fp); }
// short auditable hash digest of an HV (for display + integrity check) — deterministic
function hvDigest(v){ let h=2166136261>>>0; for(let i=0;i<D;i++){ const b=v[i]>0?1:0; h^=b; h=Math.imul(h,16777619); }
  // fold in a few sampled coords so digest reflects real content, still one-way for display
  for(let i=0;i<D;i+=997){ h^=(v[i]>0?0x9e:0x37); h=Math.imul(h,16777619); }
  return (h>>>0).toString(16).padStart(8,"0"); }

// identity family memory M = Σ bind(relation, member)  (real accumulator; exact subtract = separate)
function relHV(r){ return itemHV("rel:"+r); }
function memberHV(name){ return itemHV("member:"+name); }
function famHV(rel,name){ return bind(relHV(rel), memberHV(name)); }

// ───────── identity state ─────────
// RELATIONS are LANGUAGE-INDEPENDENT HV keys (fed into relHV/bind/unbind). Display via relLabel().
const RELATIONS=["father","mother","brother","sister"];
function relLabel(r){ return t("rel"+r.charAt(0).toUpperCase()+r.slice(1)); }   // father→relFather
const REL_FATHER="father", REL_MOTHER="mother", REL_BROTHER="brother";          // identity constants
let ID=null;        // { name, dob, fp, commit, M, family:Map(rel->{name,gone}), digest }
let LOG=[];

function logEntry(s){ const ts=new Date().toISOString().slice(0,19).replace("T"," ");
  LOG.push(`[${ts}] ${s}`); renderLog(); }
function renderLog(){ document.getElementById("log").textContent = LOG.length? LOG.join("\n") : t('logEmpty'); }

const $=id=>document.getElementById(id);

function fillRelSelects(){
  // (re)populate relation dropdowns: VALUE = language-independent key, LABEL = localized
  for(const selId of ["relSel","qRel"]){
    const sel=$(selId); const prev=sel.value;
    sel.innerHTML = RELATIONS.map(r=>`<option value="${r}">${relLabel(r)}</option>`).join("");
    if(prev && RELATIONS.includes(prev)) sel.value=prev;
  }
}

function createIdentity(){
  const name=$("nm").value.trim()||t('anonName'), dob=$("dob").value.trim()||"—", fp=$("fp").value.trim()||"fp-default";
  const commit=commitFromFingerprint(fp);
  ID={ name, dob, fp, commit, M:new Float32Array(D), family:new Map(), digest:hvDigest(commit) };
  // seed a couple of family bindings so ★separation has something to act on
  bindFamily(REL_FATHER,"Omar A.", true);
  bindFamily(REL_MOTHER,"Layla A.", true);
  bindFamily(REL_BROTHER,"Yusuf A.", true);
  $("verify").disabled=false; $("qFam").disabled=false; $("sepFather").disabled=false; $("migrate").disabled=false;
  $("idcard").style.display="block"; $("famrow").style.display="flex";
  LOG=[]; logEntry(t('idCreated')(name, ID.digest));
  renderCard();
  $("vAns").innerHTML='<em>'+t('vAnsCreate')+'</em>';
  $("sAns").innerHTML='<em>'+t('sAnsCreate')+'</em>';
  $("qAns").innerHTML='<em>'+t('qAnsCreate')+'</em>';
  $("mAns").innerHTML='<em>'+t('mAnsCreate')+'</em>';
}

function bindFamily(rel,name,silent){
  if(!ID) return;
  const prev=ID.family.get(rel);
  if(prev && !prev.gone){ ID.M=subVec(ID.M, famHV(rel, prev.name)); }   // replace old binding for that role
  ID.M=addVec(ID.M, famHV(rel,name));
  ID.family.set(rel,{name,gone:false});
  if(!silent){ logEntry(t('logBind')(relLabel(rel), name)); renderCard(); }
}
function addVec(M,h){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=M[i]+h[i]; return o; }
function subVec(M,h){ const o=new Float32Array(D); for(let i=0;i<D;i++) o[i]=M[i]-h[i]; return o; }

// unbind family member from M for a given relation → recover member by cosine over known members
function recallFamily(rel){
  const probe=bind(ID.M, relHV(rel));
  // candidate set = all members ever bound (ledger) — realistic cleanup memory
  const cands=[...new Set([...ID.family.values()].map(f=>f.name))];
  let best=null,bs=-2; for(const nm of cands){ const s=cos(probe, memberHV(nm)); if(s>bs){bs=s;best=nm;} }
  return { name:best, s:bs };
}

function renderCard(){
  $("who").textContent=ID.name;
  $("meta").innerHTML=t('metaLine')(ID.dob);
  $("commit").innerHTML=t('commitLine')(D, ID.digest);
  const fam=$("fam");
  const items=[...ID.family.entries()];
  fam.innerHTML = items.length ? `<div class="stat" style="padding-top:8px;border-top:1px solid var(--line)">${t('famHeader')}</div>`+
    items.map(([rel,f])=> f.gone
      ? `<div class="f gone">${t('famGone')(relLabel(rel), f.name)}</div>`
      : `<div class="f">${t('famActive')(relLabel(rel), f.name)}</div>`).join("")
    : "";
}

function scoreBar(s){ const w=Math.max(0,Math.min(60,Math.round(s*120))); return `<span class="scorebar" style="width:${w}px"></span>`; }
function setMeter(v){ $("vfill").style.width=Math.max(0,Math.min(100,v*100))+"%"; }

// ① verify at border
$("create").onclick=createIdentity;
$("verify").onclick=()=>{
  if(!ID) return;
  const who=$("vWho").value;
  const presentedFp = who==="self" ? ID.fp : "arch-2B9C";
  const presented = commitFromFingerprint(presentedFp);
  const s = cos(presented, ID.commit);
  setMeter(s<0?0:s);          // s∈[−1,1]; show positive scale only
  const same = s>0.9;
  logEntry(t('logVerify')(who==="self"?t('whoSelf'):t('whoOther'), s.toFixed(4), same));
  $("vAns").innerHTML = same
    ? t('vAnsSame')(s.toFixed(4), scoreBar(s))
    : t('vAnsDiff')(s.toFixed(4), scoreBar(Math.max(0,s)));
};

// ② query family
$("qFam").onclick=()=>{
  if(!ID) return; const rel=$("qRel").value; const r=recallFamily(rel);
  const bound=ID.family.get(rel);
  const present = bound && !bound.gone && r.s>0.25;
  $("qAns").innerHTML = present
    ? t('qAnsFound')(relLabel(rel), r.name, scoreBar(r.s), r.s.toFixed(3))
    : t('qAnsMissing')(relLabel(rel), r.s.toFixed(3));
};

// ★ surgically separate from father
$("sepFather").onclick=()=>{
  if(!ID) return; const f=ID.family.get(REL_FATHER);
  if(!f || f.gone){ $("sAns").innerHTML='<em>'+t('sAnsNone')+'</em>'; return; }
  const beforeIntegrity = ID.digest;                       // commit digest unchanged by family edits
  ID.M = subVec(ID.M, famHV(REL_FATHER, f.name));          // exact subtraction
  f.gone=true; ID.family.set(REL_FATHER, f);
  const gone=recallFamily(REL_FATHER);                     // now noise
  const mom=recallFamily(REL_MOTHER), bro=recallFamily(REL_BROTHER); // intact
  const ver=cos(commitFromFingerprint(ID.fp), ID.commit);  // identity commit still verifies
  const date=new Date().toISOString().slice(0,10);
  logEntry(t('logSep')(date, f.name, ID.digest, beforeIntegrity, ver.toFixed(4)));
  $("sAns").innerHTML = t('sAnsDone')(f.name, gone.s.toFixed(3), mom.name, mom.s.toFixed(3), bro.name, bro.s.toFixed(3), ver.toFixed(4));
  renderCard();
};

// ③ migrate to new device + verify integrity (deterministic, bit-identical)
$("migrate").onclick=()=>{
  if(!ID) return;
  const d1=hvDigest(ID.commit), d2=hvDigest(ID.commit);    // recompute twice
  const reCommit=commitFromFingerprint(ID.fp);             // re-derive from same fp on "new device"
  const d3=hvDigest(reCommit);
  const same = (d1===d2) && (d2===d3) && cos(reCommit, ID.commit)>0.9999;
  logEntry(t('logMigrate')(d1,d2,d3,same));
  $("mAns").innerHTML = same
    ? t('mAnsSame')(d1,d2,d3, cos(reCommit, ID.commit).toFixed(6))
    : t('mAnsFail');
};

// repaint all dynamic text in the current language, preserving demo state
function repaintDynamic(){
  fillRelSelects();
  renderLog();
  if(!ID){
    $("vAns").innerHTML='<em>'+t('vAnsInit')+'</em>';
    $("qAns").innerHTML='<em>'+t('qAnsInit')+'</em>';
    $("sAns").innerHTML='<em>'+t('sAnsInit')+'</em>';
    $("mAns").innerHTML='<em>'+t('mAnsInit')+'</em>';
  } else {
    renderCard();
    // re-render the answer panels in the new language, preserving current demo state
    const f=ID.family.get(REL_FATHER);
    const father_gone = !f || f.gone;
    // verify panel
    if(!father_gone){
      $("vAns").innerHTML='<em>'+t('vAnsCreate')+'</em>';
    }
    // separation panel reflects whether already separated
    if(father_gone){
      const gone=recallFamily(REL_FATHER);
      const mom=recallFamily(REL_MOTHER), bro=recallFamily(REL_BROTHER);
      const ver=cos(commitFromFingerprint(ID.fp), ID.commit);
      const lastFatherName = f? f.name : "Omar A.";
      $("sAns").innerHTML = t('sAnsDone')(lastFatherName, gone.s.toFixed(3), mom.name, mom.s.toFixed(3), bro.name, bro.s.toFixed(3), ver.toFixed(4));
    } else {
      $("sAns").innerHTML='<em>'+t('sAnsCreate')+'</em>';
    }
    $("qAns").innerHTML='<em>'+t('qAnsCreate')+'</em>';
    $("mAns").innerHTML='<em>'+t('mAnsCreate')+'</em>';
  }
}

// init
applyStatic();
fillRelSelects();
$("vAns").innerHTML='<em>'+t('vAnsInit')+'</em>';
$("qAns").innerHTML='<em>'+t('qAnsInit')+'</em>';
$("sAns").innerHTML='<em>'+t('sAnsInit')+'</em>';
$("mAns").innerHTML='<em>'+t('mAnsInit')+'</em>';
renderLog();
</script>
