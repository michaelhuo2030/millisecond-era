<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>1000 个未来 · 平行可能世界</title>
<style>
:root{--bg:#06070d;--ink:#eef;--dim:#8a8ca6;--hot:#ffd36b}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,"PingFang SC",sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:14px}h1{font-size:19px;margin:2px 0}.sub{color:var(--dim);font-size:13px;margin-bottom:10px}
.main{display:flex;gap:14px;flex-wrap:wrap}.stage{background:#000;border-radius:12px;box-shadow:0 0 0 1px #222}
canvas{display:block;border-radius:12px}.side{flex:1;min-width:240px}
.panel{background:#13141f;border-radius:10px;padding:13px;box-shadow:0 0 0 1px #222;margin-bottom:10px}
.big{font-size:30px;color:var(--hot);font-weight:700;font-variant-numeric:tabular-nums}
.stat{display:flex;justify-content:space-between;color:var(--dim);font-size:12px;padding:1px 0}.stat b{color:var(--ink)}
.row{margin:8px 0}.row label{display:flex;justify-content:space-between;color:var(--dim);font-size:12px}input[type=range]{width:100%;accent-color:#ffd36b}
button{background:#262838;color:var(--ink);border:1px solid #33354a;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;margin-right:6px}
.tag{display:inline-block;padding:1px 6px;border-radius:5px;background:#241f12;color:var(--hot);font-size:11px}
</style></head><body><div class="wrap">
<h1>1000 个未来 · 平行可能世界 <span class="tag">Tier 7</span></h1>
<div class="sub">从一个起点出发，每一步都分叉出多个"如果"。慢速 AI 一次只能写一个续写；这里同一秒里展开了<b>成千上万个平行的未来</b>，看可能性之树爆开。</div>
<div class="main">
  <div class="stage"><canvas id="cv" width="640" height="520"></canvas></div>
  <div class="side">
    <div class="panel"><div class="big" id="leaves">0</div><div style="color:var(--dim);font-size:12px">个被探索的未来</div>
      <div class="stat" style="margin-top:6px"><span>探索深度</span><b id="depth">0</b> 步</div>
      <div class="stat"><span>速度</span><b id="rate">0/秒</b></div>
      <div class="stat"><span>对比 慢速AI</span><b>1 个续写/2秒</b></div></div>
    <div class="panel">
      <button id="go">🌱 重新生长</button><button id="play">⏸暂停</button>
      <div class="row"><label>每步分叉 <span id="vk">3</span></label><input id="k" type="range" min="2" max="4" value="3"></div>
      <div class="row"><label>生长速度 <span id="vsp">120</span> 节点/帧</label><input id="sp" type="range" min="20" max="600" value="120"></div>
      <div style="color:var(--dim);font-size:12px">每个叶子 = 一个可能的未来。分叉越多，可能性空间爆炸越快——这正是确定性慢速推理给不了的"广度"。</div>
    </div>
  </div>
</div></div><script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');const W=640,H=520,CAP=6000;
let px,py,par,depthArr,nodeN,frontier,maxd,running=true,t0,lastN;
const P={k:3,sp:120};
function init(){px=new Float32Array(CAP);py=new Float32Array(CAP);par=new Int32Array(CAP);depthArr=new Int16Array(CAP);
  px[0]=W/2;py[0]=18;par[0]=-1;depthArr[0]=0;nodeN=1;frontier=[0];maxd=0;t0=performance.now();lastN=0;
  ctx.fillStyle='#06070d';ctx.fillRect(0,0,W,H);}
function grow(budget){let added=0;
  while(added<budget && frontier.length && nodeN<CAP){
    const next=[];
    for(const p of frontier){
      const kk=P.k;
      for(let c=0;c<kk;c++){ if(nodeN>=CAP)break;
        const d=depthArr[p]+1; const spreadx=(W*0.46)/(d+1);
        const nx=Math.max(6,Math.min(W-6, px[p]+(Math.random()-0.5)*spreadx*1.6));
        const ny=18+d*(H-30)/16;
        px[nodeN]=nx;py[nodeN]=ny;par[nodeN]=p;depthArr[nodeN]=d;
        // draw edge + node now (incremental)
        ctx.strokeStyle='rgba(255,211,107,0.18)';ctx.beginPath();ctx.moveTo(px[p],py[p]);ctx.lineTo(nx,ny);ctx.stroke();
        ctx.fillStyle=`hsl(${(d*24)%360},70%,62%)`;ctx.fillRect(nx-1.3,ny-1.3,2.6,2.6);
        next.push(nodeN);nodeN++;added++;if(d>maxd)maxd=d;
      }
      if(nodeN>=CAP)break;
    }
    frontier=next;
    if(depthArr[nodeN-1]>15){frontier=[];}  // cap depth, stop
  }
  return added;
}
function loop(){
  if(running && frontier.length && nodeN<CAP) grow(P.sp);
  const el=(performance.now()-t0)/1000;
  document.getElementById('leaves').textContent=nodeN.toLocaleString();
  document.getElementById('depth').textContent=maxd;
  document.getElementById('rate').textContent=Math.round((nodeN-lastN)/0.016).toLocaleString()+'/秒';lastN=nodeN;
  requestAnimationFrame(loop);
}
function bind(id,key,f){const e=document.getElementById(id),l=document.getElementById('v'+id);e.addEventListener('input',()=>{P[key]=f(+e.value);if(l)l.textContent=e.value;});}
bind('k','k',v=>v);bind('sp','sp',v=>v);
document.getElementById('go').addEventListener('click',init);
document.getElementById('play').addEventListener('click',e=>{running=!running;e.target.textContent=running?'⏸暂停':'▶播放';});
init();requestAnimationFrame(loop);
</script></body></html>
