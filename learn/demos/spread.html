<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>思想的传播 · 两个想法争夺一个社会</title>
<style>
:root{--bg:#06070d;--ink:#eef;--dim:#8a8ca6;--hot:#ffd36b}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,"PingFang SC",sans-serif}
.wrap{max-width:1080px;margin:0 auto;padding:14px}h1{font-size:19px;margin:2px 0}.sub{color:var(--dim);font-size:13px;margin-bottom:10px}
.main{display:flex;gap:14px;flex-wrap:wrap}.stage{background:#000;border-radius:12px;box-shadow:0 0 0 1px #222}
canvas{display:block;border-radius:12px;cursor:crosshair;image-rendering:pixelated}.side{flex:1;min-width:240px}
.panel{background:#13141f;border-radius:10px;padding:13px;box-shadow:0 0 0 1px #222;margin-bottom:10px}
.bar{height:22px;border-radius:6px;overflow:hidden;display:flex;margin:6px 0}.bar i{display:block;height:100%}
.stat{display:flex;justify-content:space-between;color:var(--dim);font-size:12px;padding:1px 0}.stat b{color:var(--ink)}
.row{margin:8px 0}.row label{display:flex;justify-content:space-between;color:var(--dim);font-size:12px}input[type=range]{width:100%;accent-color:#ffd36b}
button{background:#262838;color:var(--ink);border:1px solid #33354a;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;margin-right:6px}
.tag{display:inline-block;padding:1px 6px;border-radius:5px;background:#241f12;color:var(--hot);font-size:11px}
</style></head><body><div class="wrap">
<h1>思想的传播 · 两个想法争夺一个社会 <span class="tag">Tier 8</span></h1>
<div class="sub">蓝、红两个想法各从一处出发，沿邻居一传十、十传百。慢速世界要几代人；这里同一秒就看完整场争夺——<b>点画布可以播下新的想法种子</b>。</div>
<div class="main">
  <div class="stage"><canvas id="cv" width="500" height="500"></canvas></div>
  <div class="side">
    <div class="panel"><div style="color:var(--dim);font-size:12px">采纳比例</div>
      <div class="bar" id="bar"><i id="bblue" style="background:#5aa9ff;width:50%"></i><i id="bred" style="background:#ff6b6b;width:50%"></i></div>
      <div class="stat"><span>🔵 想法A</span><b id="pblue">—</b></div>
      <div class="stat"><span>🔴 想法B</span><b id="pred">—</b></div>
      <div class="stat"><span>未决</span><b id="pgrey">—</b></div>
      <div class="stat"><span>已传播代数</span><b id="gen">0</b></div></div>
    <div class="panel">
      <button id="reset">↺ 重置</button><button id="play">⏸暂停</button>
      <div class="row"><label>传播速度 <span id="vsp">3</span> 代/帧</label><input id="sp" type="range" min="1" max="12" value="3"></div>
      <div class="row"><label>说服力 <span id="vp">55</span>%</label><input id="p" type="range" min="20" max="95" value="55"></div>
      <div style="color:var(--dim);font-size:12px">这是社会学的"投票者模型"：每个人偶尔被邻居说服。速度让你把一场需要几代人的思想战，在几秒里看完结局——还能反复重播、改参数。</div>
    </div>
  </div>
</div></div><script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');const S=100,cell=5;let g,gen,running=true,P={sp:3,p:0.55};
function init(){g=new Int8Array(S*S);gen=0; // 0=undecided,1=blue,2=red
  seed(S*0.3|0,S*0.5|0,1);seed(S*0.7|0,S*0.5|0,2);draw();}
function seed(cx,cy,v){for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){const x=cx+dx,y=cy+dy;if(x>=0&&x<S&&y>=0&&y<S)g[x*S+y]=v;}}
function stepGen(){const ng=g.slice();
  for(let n=0;n<S*S;n++){ const x=n/S|0,y=n%S;
    // pick a random neighbor; if it holds an idea and persuades, adopt
    const dx=(Math.random()*3|0)-1,dy=(Math.random()*3|0)-1;const nx=x+dx,ny=y+dy;
    if(nx<0||nx>=S||ny<0||ny>=S)continue;const nb=g[nx*S+ny];
    if(nb!==0 && Math.random()<P.p) ng[n]=nb;
  }
  g=ng;gen++;
}
const COL=[[20,22,34],[90,169,255],[255,107,107]];
function draw(){const im=ctx.createImageData(S,S);for(let n=0;n<S*S;n++){const c=COL[g[n]];const i=n*4;im.data[i]=c[0];im.data[i+1]=c[1];im.data[i+2]=c[2];im.data[i+3]=255;}
  // scale up via temp canvas
  const t=document.createElement('canvas');t.width=S;t.height=S;t.getContext('2d').putImageData(im,0,0);
  ctx.imageSmoothingEnabled=false;ctx.drawImage(t,0,0,S*cell,S*cell);}
function stats(){let b=0,r=0;for(let n=0;n<S*S;n++){if(g[n]===1)b++;else if(g[n]===2)r++;}const tot=S*S;
  document.getElementById('pblue').textContent=(b/tot*100).toFixed(0)+'%';
  document.getElementById('pred').textContent=(r/tot*100).toFixed(0)+'%';
  document.getElementById('pgrey').textContent=((tot-b-r)/tot*100).toFixed(0)+'%';
  document.getElementById('gen').textContent=gen;
  document.getElementById('bblue').style.width=(b/tot*100)+'%';document.getElementById('bred').style.width=(r/tot*100)+'%';}
function loop(){if(running)for(let k=0;k<P.sp;k++)stepGen();draw();stats();requestAnimationFrame(loop);}
function bind(id,key,f){const e=document.getElementById(id),l=document.getElementById('v'+id);e.addEventListener('input',()=>{P[key]=f(+e.value);if(l)l.textContent=e.value;});}
bind('sp','sp',v=>v);bind('p','p',v=>{document.getElementById('vp').textContent=v;return v/100;});
document.getElementById('reset').addEventListener('click',init);
document.getElementById('play').addEventListener('click',e=>{running=!running;e.target.textContent=running?'⏸暂停':'▶播放';});
cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect();const x=(e.clientX-r.left)/cell|0,y=(e.clientY-r.top)/cell|0;seed(x,y,Math.random()<0.5?1:2);});
init();requestAnimationFrame(loop);
</script>  <script src="../../site-nav.js"></script>
</body></html>
